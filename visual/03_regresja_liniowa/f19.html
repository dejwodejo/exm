<figure class="viz" id="f19">
  <div class="viz-head">
    <p class="viz-title">Zmienna binarna: regresja liniowa vs logistyczna</p>
    <p class="viz-sub">Dane binarne (y ∈ {0, 1}) rozłożone wzdłuż x. Po lewej prosta OLS wychodzi poza [0, 1] — predykcje &lt; 0 i &gt; 1 nie są prawdopodobieństwami. Po prawej sigmoida σ(z) = 1/(1 + e⁻ᶻ) zawsze mieści się w [0, 1].</p>
  </div>
  <div class="viz-body">
    <svg id="f19-svg" viewBox="0 0 700 330" role="img" aria-label="Po lewej regresja liniowa na danych binarnych z zaznaczonymi obszarami predykcji poniżej 0 i powyżej 1; po prawej regresja logistyczna z sigmoidą mieszczącą się w przedziale od 0 do 1"></svg>
  </div>
  <figcaption><b>Sedno:</b> prosta OLS daje predykcje spoza [0, 1] (nonsens jako prawdopodobieństwo), dlatego do klasyfikacji binarnej używa się regresji logistycznej, której sigmoida ściska wynik do przedziału [0, 1].</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f19-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  var W=700,H=330,T=52,B=44, xmax=10, ymin=-0.35, ymax=1.35;
  function mul(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
  // stały układ punktów binarnych: klasa 0 przy małych x, klasa 1 przy dużych x, z nakładaniem
  function makeData(){
    var r=mul(20240705), pts=[], i, x;
    for(i=0;i<22;i++){x=0.4+r()*4.9; pts.push([x,0]);}      // większość klasy 0
    for(i=0;i<22;i++){x=4.7+r()*4.9; pts.push([x,1]);}      // większość klasy 1
    for(i=0;i<3;i++){x=4.8+r()*3.4; pts.push([x,0]);}       // trochę nakładania
    for(i=0;i<3;i++){x=1.6+r()*3.4; pts.push([x,1]);}
    return pts;
  }
  var DATA=makeData();
  // prosta liniowa: celowo wychodzi poza [0,1]
  var LM=0.16, LB=-0.25;                                    // ŷ = 0.16x − 0.25
  var xUnder=(-LB)/LM;                                      // ŷ = 0  → x ≈ 1.56
  var xOver=(1-LB)/LM;                                      // ŷ = 1  → x ≈ 7.81
  // sigmoida: σ(k(x−x0))
  var K=1.35, X0=5.0;
  function sig(x){return 1/(1+Math.exp(-K*(x-X0)));}

  function panel(ox0,ox1,mode){
    var y0=H-B,y1=T;
    var cx=function(x){return ox0+x/xmax*(ox1-ox0);};
    var cy=function(v){return y0-(v-ymin)/(ymax-ymin)*(y0-y1);};
    var GRID=cvar("--v-grid"),AX=cvar("--v-axis"),MUT=cvar("--muted"),INK=cvar("--ink"),
        INK2=cvar("--ink2"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),
        AM=cvar("--v-amber"),BG=cvar("--bg2");
    var g,i,x;
    // tło panelu
    svg.appendChild(E("rect",{x:ox0,y:y1,width:ox1-ox0,height:y0-y1,fill:BG,opacity:0.5}));
    // poziome linie odniesienia i etykiety y (0, 0.5, 1)
    var yt=[0,0.5,1];
    for(i=0;i<yt.length;i++){
      var dash=(yt[i]===0||yt[i]===1);
      svg.appendChild(E("line",{x1:ox0,y1:cy(yt[i]),x2:ox1,y2:cy(yt[i]),stroke:dash?MUT:GRID,
        "stroke-width":dash?1.3:1,"stroke-dasharray":dash?"5 4":"","opacity":dash?0.85:1}));
      svg.appendChild(E("text",{x:ox0-6,y:cy(yt[i])+3.5,"text-anchor":"end","font-size":9,fill:MUT},yt[i]===0.5?"0,5":String(yt[i])));
    }
    for(g=0;g<=xmax;g+=2){svg.appendChild(E("text",{x:cx(g),y:y0+15,"text-anchor":"middle","font-size":9,fill:MUT},String(g)));}

    if(mode==="lin"){
      // obszar predykcji < 0 (między prostą a 0, dla x < xUnder)
      svg.appendChild(E("path",{d:"M"+cx(0)+" "+cy(0)+" L"+cx(0)+" "+cy(LB)+" L"+cx(xUnder)+" "+cy(0)+" Z",
        fill:OR,"fill-opacity":0.18,stroke:"none"}));
      // obszar predykcji > 1 (między prostą a 1, dla x > xOver)
      svg.appendChild(E("path",{d:"M"+cx(xOver)+" "+cy(1)+" L"+cx(xmax)+" "+cy(1)+" L"+cx(xmax)+" "+cy(LM*xmax+LB)+" Z",
        fill:OR,"fill-opacity":0.18,stroke:"none"}));
    }

    // osie
    svg.appendChild(E("line",{x1:ox0,y1:y0,x2:ox1,y2:y0,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("line",{x1:ox0,y1:y0,x2:ox0,y2:y1,stroke:AX,"stroke-width":1.3}));

    if(mode==="lin"){
      // prosta OLS (poza panelem obcinamy do zakresu rysowania)
      svg.appendChild(E("line",{x1:cx(0),y1:cy(LB),x2:cx(xmax),y2:cy(LM*xmax+LB),
        stroke:OR,"stroke-width":2.6,"stroke-linecap":"round"}));
      // etykiety obszarów nonsensu
      svg.appendChild(E("text",{x:cx(0)+6,y:cy(-0.14),"font-size":9.5,"font-weight":700,fill:OR},"predykcja < 0 (!)"));
      svg.appendChild(E("text",{x:cx(xmax)-4,y:cy(1.20),"text-anchor":"end","font-size":9.5,"font-weight":700,fill:OR},"predykcja > 1 (!)"));
      svg.appendChild(E("text",{x:cx(6.6),y:cy(LM*6.6+LB)-7,"text-anchor":"middle","font-size":10,"font-weight":700,fill:OR,transform:"rotate(-9 "+cx(6.6)+" "+cy(LM*6.6+LB)+")"},"prosta OLS ŷ = β₀ + β₁x"));
    } else {
      // próg decyzyjny 0.5
      svg.appendChild(E("line",{x1:ox0,y1:cy(0.5),x2:ox1,y2:cy(0.5),stroke:AM,"stroke-width":1.3,"stroke-dasharray":"4 3","opacity":0.9}));
      svg.appendChild(E("text",{x:ox1-4,y:cy(0.5)-4,"text-anchor":"end","font-size":9,fill:AM,"font-weight":700},"próg 0,5"));
      // sigmoida
      var d="";
      for(i=0;i<=120;i++){x=i/120*xmax; d+=(i?"L":"M")+cx(x).toFixed(1)+" "+cy(sig(x)).toFixed(1);}
      svg.appendChild(E("path",{d:d,fill:"none",stroke:TE,"stroke-width":2.8,"stroke-linecap":"round"}));
      svg.appendChild(E("text",{x:cx(8.4),y:cy(sig(8.4))-8,"text-anchor":"middle","font-size":10,"font-weight":700,fill:TE},"σ(z) = 1/(1+e⁻ᶻ)"));
    }

    // punkty binarne (na wierzchu), lekki jitter poziomy dla czytelności
    var rj=mul(mode==="lin"?111:222);
    for(i=0;i<DATA.length;i++){
      x=DATA[i][0]; var yv=DATA[i][1];
      svg.appendChild(E("circle",{cx:cx(x).toFixed(1),cy:(cy(yv)+(rj()-0.5)*4).toFixed(1),r:3.4,
        fill:BL,"fill-opacity":0.55,stroke:BG,"stroke-width":0.8}));
    }

    // tytuł panelu + os x
    svg.appendChild(E("text",{x:(ox0+ox1)/2,y:T-30,"text-anchor":"middle","font-size":12,"font-weight":700,fill:INK2},
      mode==="lin"?"Regresja liniowa":"Regresja logistyczna"));
    svg.appendChild(E("text",{x:(ox0+ox1)/2,y:T-15,"text-anchor":"middle","font-size":10,fill:MUT},
      mode==="lin"?"predykcje wychodzą poza [0, 1] — nonsens":"predykcje w [0, 1] = P(y=1 | x)"));
    svg.appendChild(E("text",{x:(ox0+ox1)/2,y:H-6,"text-anchor":"middle","font-size":10,fill:MUT},"x"));
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    panel(46,338,"lin");
    panel(392,686,"log");
  }
  document.addEventListener("themechange",render);
  render();
})();
</script>
