<figure class="viz" id="f15">
  <div class="viz-head">
    <p class="viz-title">Autokorelacja reszt i statystyka Durbina-Watsona</p>
    <p class="viz-sub">Reszty w kolejności obserwacji (czas). Gdy błędy są niezależne, znaki reszt zmieniają się losowo i DW≈2. Przy dodatniej autokorelacji reszty „pamiętają" poprzednie — tworzą długie serie tego samego znaku, a DW dąży do 0. Przesuwaj suwak ρ (siła autokorelacji) i obserwuj DW = Σ(eₜ−eₜ₋₁)²/Σeₜ².</p>
  </div>
  <div class="viz-body">
    <svg id="f15-svg" viewBox="0 0 680 360" role="img" aria-label="Wykres reszt względem numeru obserwacji: linia z kropkami i linia zera; przy dodatniej autokorelacji długie serie reszt tego samego znaku, a statystyka Durbina-Watsona spada z 2 do 0"></svg>
  </div>
  <div class="viz-controls">
    <label>Siła autokorelacji ρ
      <input id="f15-rho" type="range" min="0" max="0.95" step="0.01" value="0.8">
      <span class="val" id="f15-rhov">0.80</span>
    </label>
    <span class="toggle" id="f15-mode" role="button" tabindex="0" aria-pressed="false">Reszty niezależne (ρ = 0)</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      <b>DW = <span id="f15-dw">–</span></b> · <b id="f15-verdict">–</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> statystyka Durbina-Watsona mierzy zależność sąsiednich reszt: DW≈2 oznacza brak autokorelacji, DW→0 silną autokorelację dodatnią (a DW→4 — ujemną, naprzemienne znaki). Autokorelacja nie obciąża β, ale zaniża błędy standardowe, więc testy t/F stają się zawodne (typowe w danych czasowych).</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f15-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  function mul(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}
  var W=680,H=360,L=52,R=22,T=52,B=48, x0=L,x1=W-R,y0=H-B,y1=T, N=60, ymax=3.2, SEED=20260705;
  var cx=function(i){return x0+i/(N-1)*(x1-x0);};
  var cy=function(v){return (y0+y1)/2 - v/ymax*((y0-y1)/2);};

  var slider=document.getElementById("f15-rho"),
      mode=document.getElementById("f15-mode");

  // generuj reszty AR(1) o jednostkowej wariancji: e_t = ρ·e_{t-1} + √(1−ρ²)·z_t
  function makeResid(rho){
    var r=mul(SEED), e=new Array(N), k=Math.sqrt(1-rho*rho);
    e[0]=gauss(r);
    for(var i=1;i<N;i++) e[i]=rho*e[i-1]+k*gauss(r);
    return e;
  }
  function durbinWatson(e){
    var num=0,den=0,i;
    for(i=0;i<N;i++){den+=e[i]*e[i]; if(i>0){var d=e[i]-e[i-1]; num+=d*d;}}
    return den>0?num/den:0;
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var indep=mode.getAttribute("aria-pressed")==="true";
    var rho=indep?0:parseFloat(slider.value);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),
        AM=cvar("--v-amber"),BG=cvar("--bg2");
    var e=makeResid(rho), dw=durbinWatson(e);
    var problem=rho>=0.4;
    var AC=problem?OR:BL;

    // siatka pozioma + etykiety y
    var g,gv;
    for(g=-3;g<=3;g++){gv=g; svg.appendChild(E("line",{x1:x0,y1:cy(gv),x2:x1,y2:cy(gv),stroke:GRID,"stroke-width":gv===0?0:1}));
      svg.appendChild(E("text",{x:x0-8,y:cy(gv)+3.5,"text-anchor":"end","font-size":10,fill:MUT},String(gv)));}
    // etykiety x
    for(g=0;g<=N-1;g+=10){svg.appendChild(E("text",{x:cx(g),y:y0+16,"text-anchor":"middle","font-size":10,fill:MUT},String(g)));}

    // osie
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x1,y2:y0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x0,y2:y1,stroke:AX,"stroke-width":1.4}));

    // linia zera (odniesienie) — pogrubiona, kolor akcentu ostrzegawczego
    svg.appendChild(E("line",{x1:x0,y1:cy(0),x2:x1,y2:cy(0),stroke:AM,"stroke-width":2.2}));

    // łamana reszt
    var d="",i;
    for(i=0;i<N;i++) d+=(i?"L":"M")+cx(i).toFixed(1)+" "+cy(e[i]).toFixed(1);
    svg.appendChild(E("path",{d:d,fill:"none",stroke:AC,"stroke-width":1.7,"stroke-linejoin":"round",opacity:.85}));
    // kropki
    for(i=0;i<N;i++) svg.appendChild(E("circle",{cx:cx(i).toFixed(1),cy:cy(e[i]).toFixed(1),r:2.8,fill:AC,stroke:BG,"stroke-width":1}));

    // podpisy osi
    svg.appendChild(E("text",{x:(x0+x1)/2,y:H-6,"text-anchor":"middle","font-size":11,fill:MUT},"czas / numer obserwacji t"));
    svg.appendChild(E("text",{x:16,y:(y0+y1)/2,"text-anchor":"middle","font-size":11,fill:MUT,transform:"rotate(-90 16 "+((y0+y1)/2)+")"},"reszta eₜ"));

    // tytuł panelu zależny od stanu
    svg.appendChild(E("text",{x:(x0+x1)/2,y:T-30,"text-anchor":"middle","font-size":12.5,"font-weight":700,fill:INK2},
      problem?"Dodatnia autokorelacja — długie serie tego samego znaku":"Reszty ~ niezależne — znaki zmieniają się losowo"));

    // pasek skali DW: 0 ——— 2 ——— 4
    var bx0=x1-186, bx1=x1, by=T-14, bw=bx1-bx0;
    var dwPos=function(v){return bx0+Math.max(0,Math.min(4,v))/4*bw;};
    svg.appendChild(E("line",{x1:bx0,y1:by,x2:bx1,y2:by,stroke:MUT,"stroke-width":2}));
    // strefa OK wokół 2
    svg.appendChild(E("line",{x1:dwPos(1.6),y1:by,x2:dwPos(2.4),y2:by,stroke:TE,"stroke-width":5,opacity:.55}));
    [0,2,4].forEach(function(v){svg.appendChild(E("line",{x1:dwPos(v),y1:by-4,x2:dwPos(v),y2:by+4,stroke:MUT,"stroke-width":1.4}));
      svg.appendChild(E("text",{x:dwPos(v),y:by-8,"text-anchor":"middle","font-size":9,fill:MUT},String(v)));});
    // znacznik bieżącego DW
    svg.appendChild(E("polygon",{points:(dwPos(dw))+","+(by+3)+" "+(dwPos(dw)-5)+","+(by+13)+" "+(dwPos(dw)+5)+","+(by+13),fill:AC,stroke:BG,"stroke-width":1}));
    svg.appendChild(E("text",{x:(bx0+bx1)/2,y:by+24,"text-anchor":"middle","font-size":9,fill:MUT},"skala Durbina-Watsona"));

    // odczyty
    document.getElementById("f15-rhov").textContent=rho.toFixed(2);
    document.getElementById("f15-dw").textContent=dw.toFixed(2);
    var verdict;
    if(dw>=1.6) verdict="brak autokorelacji";
    else if(dw>=0.9) verdict="słaba/umiarkowana autokorelacja";
    else verdict="silna dodatnia autokorelacja";
    var vEl=document.getElementById("f15-verdict");
    vEl.textContent=verdict;
    vEl.style.color=dw>=1.6?cvar("--v-teal"):cvar("--v-orange");
  }

  slider.addEventListener("input",function(){
    if(mode.getAttribute("aria-pressed")==="true"){mode.setAttribute("aria-pressed","false");}
    render();
  });
  function toggleMode(){
    var on=mode.getAttribute("aria-pressed")==="true";
    mode.setAttribute("aria-pressed",on?"false":"true");
    if(!on) slider.value="0"; // wejście w tryb niezależny
    render();
  }
  mode.addEventListener("click",toggleMode);
  mode.addEventListener("keydown",function(ev){if(ev.key===" "||ev.key==="Enter"){ev.preventDefault();toggleMode();}});

  document.addEventListener("themechange",render);
  render();
})();
</script>
