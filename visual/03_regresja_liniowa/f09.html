<figure class="viz" id="f09">
  <div class="viz-head">
    <p class="viz-title">R² zawsze rośnie, R²_adj karze zbędne cechy</p>
    <p class="viz-sub">Dokładamy do modelu kolejne predyktory. Pierwsze <b>T</b> niosą prawdziwy sygnał; wszystko powyżej to szum („cechy-śmieci"). R² pnie się monotonicznie ku 1, bo dopasowuje się nawet do przypadkowych cech. R²_adj = 1 − (1−R²)(n−1)/(n−p−1) osiąga szczyt przy prawdziwej liczbie cech, a potem spada. Przesuń suwaki liczby cech p i wielkości próby n.</p>
  </div>
  <div class="viz-body">
    <svg id="f09-svg" viewBox="0 0 680 360" role="img" aria-label="Wykres dwóch krzywych w funkcji liczby predyktorów p: R² rosnące monotonicznie ku 1 oraz R²_adj, które rośnie do szczytu przy prawdziwej liczbie cech, a następnie maleje; zaznaczony szczyt R²_adj oraz prawdziwa liczba cech"></svg>
  </div>
  <div class="viz-controls">
    <label>Liczba cech w modelu p
      <input id="f09-p" type="range" min="1" max="60" step="1" value="8">
      <span class="val" id="f09-pv">8</span>
    </label>
    <label>Wielkość próby n
      <input id="f09-n" type="range" min="15" max="80" step="1" value="30">
      <span class="val" id="f09-nv">30</span>
    </label>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      <b>R² = <span id="f09-r2">–</span></b> · <b>R²_adj = <span id="f09-adj">–</span></b> · <span id="f09-note">–</span>
    </span>
  </div>
  <figcaption><b>Sedno:</b> R² nigdy nie spada po dodaniu cechy, więc samo w sobie zachęca do przeładowania modelu; R²_adj płaci karę za każdy dodatkowy parametr — rośnie tylko, gdy nowa cecha wnosi więcej niż sam szum, a jego szczyt wskazuje właściwą złożoność modelu.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f09-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  var W=680,H=360,L=52,R=22,T=54,B=44, x0=L,x1=W-R,y0=H-B,y1=T;
  var RHO2=0.80, TRUE=3;                 // prawdziwy R² z sygnału i prawdziwa liczba cech
  var sP=document.getElementById("f09-p"), sN=document.getElementById("f09-n");

  function r2(p,n){ return p<=TRUE ? RHO2*p/TRUE : RHO2+(1-RHO2)*(p-TRUE)/(n-1); }
  function adj(p,n){ return 1-(1-r2(p,n))*(n-1)/(n-p-1); }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),
        AM=cvar("--v-amber"),BG=cvar("--bg2");
    var n=parseInt(sN.value,10);
    var xmax=n-4;                         // n-p-1>=3, mianownik bezpieczny
    var p=Math.min(parseInt(sP.value,10),xmax);
    var i;

    // zakres osi y z danych
    var lo=1,hi=0;
    for(i=1;i<=xmax;i++){var a=adj(i,n),r=r2(i,n);
      if(a<lo)lo=a; if(r<lo)lo=r; if(a>hi)hi=a; if(r>hi)hi=r;}
    var pad=(hi-lo)*0.08; var ymin=Math.max(0,lo-pad), ymax=Math.min(1,hi+pad);

    var cx=function(v){return x0+(v-1)/(xmax-1)*(x1-x0);};
    var cy=function(v){return y0-(v-ymin)/(ymax-ymin)*(y0-y1);};

    // szczyt R²_adj
    var pk=1,pkv=-1;
    for(i=1;i<=xmax;i++){var av=adj(i,n); if(av>pkv){pkv=av;pk=i;}}

    // siatka pozioma + etykiety y
    var steps=5,g;
    for(g=0;g<=steps;g++){var yv=ymin+(ymax-ymin)*g/steps;
      svg.appendChild(E("line",{x1:x0,y1:cy(yv),x2:x1,y2:cy(yv),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:x0-8,y:cy(yv)+3.5,"text-anchor":"end","font-size":10,fill:MUT},yv.toFixed(2)));}

    // etykiety x
    var xstep=Math.max(1,Math.round((xmax-1)/6));
    for(g=1;g<=xmax;g+=xstep){
      svg.appendChild(E("text",{x:cx(g),y:y0+16,"text-anchor":"middle","font-size":10,fill:MUT},String(g)));}

    // strefa cech-śmieci (p > TRUE)
    if(TRUE<xmax){
      svg.appendChild(E("rect",{x:cx(TRUE),y:y1,width:x1-cx(TRUE),height:y0-y1,
        fill:MUT,"fill-opacity":0.06}));
    }

    // prawdziwa liczba cech
    svg.appendChild(E("line",{x1:cx(TRUE),y1:y0,x2:cx(TRUE),y2:y1,stroke:TE,"stroke-width":1.6,"stroke-dasharray":"5 4"}));
    svg.appendChild(E("text",{x:cx(TRUE)+5,y:y1+12,"font-size":10,"font-weight":700,fill:TE},"prawdziwa liczba cech (T="+TRUE+")"));

    // osie
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x1,y2:y0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x0,y2:y1,stroke:AX,"stroke-width":1.4}));

    // krzywe
    function poly(fn,col,wd){
      var d="";
      for(i=1;i<=xmax;i++){d+=(i===1?"M":"L")+cx(i).toFixed(1)+" "+cy(fn(i,n)).toFixed(1);}
      svg.appendChild(E("path",{d:d,fill:"none",stroke:col,"stroke-width":wd,"stroke-linejoin":"round","stroke-linecap":"round"}));
    }
    poly(r2,BL,2.6);
    poly(adj,OR,2.6);

    // znacznik szczytu R²_adj
    svg.appendChild(E("circle",{cx:cx(pk),cy:cy(adj(pk,n)),r:6,fill:"none",stroke:AM,"stroke-width":2.4}));
    svg.appendChild(E("circle",{cx:cx(pk),cy:cy(adj(pk,n)),r:2.4,fill:AM}));
    svg.appendChild(E("text",{x:cx(pk),y:cy(adj(pk,n))-12,"text-anchor":"middle","font-size":10,"font-weight":700,fill:AM},"szczyt R²_adj (p="+pk+")"));

    // aktualne p: pionowa linia + punkty
    svg.appendChild(E("line",{x1:cx(p),y1:y0,x2:cx(p),y2:y1,stroke:MUT,"stroke-width":1,"stroke-dasharray":"2 3",opacity:.85}));
    svg.appendChild(E("circle",{cx:cx(p),cy:cy(r2(p,n)),r:5.5,fill:BL,stroke:BG,"stroke-width":2}));
    svg.appendChild(E("circle",{cx:cx(p),cy:cy(adj(p,n)),r:5.5,fill:OR,stroke:BG,"stroke-width":2}));

    // legenda
    var lx=x0+14, ly=y1+6;
    svg.appendChild(E("line",{x1:lx,y1:ly,x2:lx+22,y2:ly,stroke:BL,"stroke-width":2.6,"stroke-linecap":"round"}));
    svg.appendChild(E("text",{x:lx+28,y:ly+4,"font-size":11,fill:INK2,"font-weight":700},"R²"));
    svg.appendChild(E("line",{x1:lx+70,y1:ly,x2:lx+92,y2:ly,stroke:OR,"stroke-width":2.6,"stroke-linecap":"round"}));
    svg.appendChild(E("text",{x:lx+98,y:ly+4,"font-size":11,fill:INK2,"font-weight":700},"R²_adj"));

    // podpisy osi
    svg.appendChild(E("text",{x:(x0+x1)/2,y:H-6,"text-anchor":"middle","font-size":11,fill:MUT},"liczba cech w modelu  p"));
    svg.appendChild(E("text",{x:14,y:(y0+y1)/2,"text-anchor":"middle","font-size":11,fill:MUT,transform:"rotate(-90 14 "+((y0+y1)/2)+")"},"wartość"));

    // odczyty
    document.getElementById("f09-pv").textContent=p;
    document.getElementById("f09-nv").textContent=n;
    document.getElementById("f09-r2").textContent=r2(p,n).toFixed(3);
    document.getElementById("f09-adj").textContent=adj(p,n).toFixed(3);
    var note=document.getElementById("f09-note");
    if(p<pk){note.textContent="cechy jeszcze pomagają — R²_adj rośnie"; note.style.color=TE;}
    else if(p===pk){note.textContent="optimum — szczyt R²_adj"; note.style.color=AM;}
    else{note.textContent="za szczytem — dodajesz szum, R²_adj spada"; note.style.color=OR;}
    // dosuwamy suwak jeśli przekroczył bezpieczny zakres przy małym n
    if(parseInt(sP.value,10)!==p){sP.value=p;}
  }

  sP.addEventListener("input",render);
  sN.addEventListener("input",render);
  document.addEventListener("themechange",render);
  render();
})();
</script>
