<figure class="viz" id="f12">
  <div class="viz-head">
    <p class="viz-title">Eksploracja danych przed budową modelu</p>
    <p class="viz-sub">Zanim dopasujemy regresję, oglądamy dane: macierz korelacji (heatmapa) ujawnia siłę i znak zależności między cechami oraz redundancję (współliniowość), a wykres rozrzutu z dopasowaną prostą pozwala ocenić, czy związek jest w ogóle liniowy.</p>
  </div>
  <div class="viz-body">
    <svg id="f12-svg" viewBox="0 0 700 360" role="img" aria-label="Po lewej: macierz korelacji 4×4 cech jako heatmapa na skali dwubiegunowej — silna korelacja dodatnia pomarańczowa, ujemna niebieska, bliska zeru neutralna; wartości wpisane w komórki. Po prawej: wykres rozrzutu powierzchni i ceny z dopasowaną prostą pokazujący wyraźną zależność liniową"></svg>
  </div>
  <figcaption><b>Sedno:</b> heatmapa korelacji pokazuje, które cechy niosą tę samą informację (redundancja/współliniowość) i jak mocno wiążą się z celem, a wykres rozrzutu z linią trendu pozwala sprawdzić, czy zależność jest liniowa — czyli czy regresja liniowa jest w ogóle właściwym narzędziem.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f12-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  var W=700,H=360;
  // seeded PRNG + gauss (stały układ przy przełączaniu motywu)
  function mul(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}
  // parsowanie koloru CSS -> [r,g,b]
  function parseC(s){s=s.trim();var m;if(s.charAt(0)==="#"){if(s.length===4)return[parseInt(s.charAt(1)+s.charAt(1),16),parseInt(s.charAt(2)+s.charAt(2),16),parseInt(s.charAt(3)+s.charAt(3),16)];return[parseInt(s.slice(1,3),16),parseInt(s.slice(3,5),16),parseInt(s.slice(5,7),16)];}m=s.match(/rgba?\(([^)]+)\)/);if(m){var p=m[1].split(",");return[+p[0],+p[1],+p[2]];}return[128,128,128];}
  function mix(a,b,t){return "rgb("+Math.round(a[0]+(b[0]-a[0])*t)+","+Math.round(a[1]+(b[1]-a[1])*t)+","+Math.round(a[2]+(b[2]-a[2])*t)+")";}

  // cechy i macierz korelacji (jak w przykładzie eksploracyjnym)
  var LAB=["powierzchnia","pokoje","piętro","cena"];
  var COR=[[1.00,0.00,-0.04,0.89],
           [0.00,1.00,-0.12,0.32],
           [-0.04,-0.12,1.00,-0.05],
           [0.89,0.32,-0.05,1.00]];

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),BG=cvar("--bg2");
    var cBL=parseC(BL),cOR=parseC(OR),cN=parseC(BG);
    function cell(v){var t=Math.abs(v);return mix(cN,v>=0?cOR:cBL,t);}

    /* ===================== LEWY PANEL: heatmapa ===================== */
    var n=4, cs=48, gx0=92, gy0=64;
    var gx1=gx0+n*cs, gy1=gy0+n*cs;
    svg.appendChild(E("text",{x:(gx0+gx1)/2,y:28,"text-anchor":"middle","font-size":13,"font-weight":700,fill:INK2},"Macierz korelacji"));
    svg.appendChild(E("text",{x:(gx0+gx1)/2,y:45,"text-anchor":"middle","font-size":10,fill:MUT},"rozpoznanie zależności i redundancji cech"));

    var i,j,v,x,y;
    for(i=0;i<n;i++){
      for(j=0;j<n;j++){
        v=COR[i][j];
        x=gx0+j*cs; y=gy0+i*cs;
        svg.appendChild(E("rect",{x:x,y:y,width:cs,height:cs,fill:cell(v),stroke:BG,"stroke-width":2}));
        var strong=Math.abs(v)>0.55;
        svg.appendChild(E("text",{x:x+cs/2,y:y+cs/2+4,"text-anchor":"middle","font-size":11,
          "font-weight":strong?700:400,fill:strong?"#fff":INK},v.toFixed(2)));
      }
    }
    // etykiety wierszy (z prawej wyrównane, po lewej od siatki)
    for(i=0;i<n;i++){
      svg.appendChild(E("text",{x:gx0-8,y:gy0+i*cs+cs/2+3.5,"text-anchor":"end","font-size":9.5,fill:MUT},LAB[i]));
    }
    // etykiety kolumn (pod siatką, obrócone)
    for(j=0;j<n;j++){
      var cxj=gx0+j*cs+cs/2;
      svg.appendChild(E("text",{x:cxj,y:gy1+10,"text-anchor":"end","font-size":9.5,fill:MUT,
        transform:"rotate(-35 "+cxj+" "+(gy1+10)+")"},LAB[j]));
    }

    // mini-pasek skali (colorbar) po prawej stronie heatmapy
    var bx=gx1+16, bw=12, bTop=gy0, bBot=gy1, gid="f12grad";
    var defs=E("defs",{});
    var lg=E("linearGradient",{id:gid,x1:"0",y1:"0",x2:"0",y2:"1"});
    lg.appendChild(E("stop",{offset:"0%","stop-color":mix(cN,cOR,1)}));    // +1 góra
    lg.appendChild(E("stop",{offset:"50%","stop-color":mix(cN,cOR,0)}));   // 0 środek
    lg.appendChild(E("stop",{offset:"100%","stop-color":mix(cN,cBL,1)}));  // -1 dół
    defs.appendChild(lg); svg.appendChild(defs);
    svg.appendChild(E("rect",{x:bx,y:bTop,width:bw,height:bBot-bTop,fill:"url(#"+gid+")",stroke:GRID,"stroke-width":1}));
    svg.appendChild(E("text",{x:bx+bw+4,y:bTop+4,"font-size":8.5,fill:MUT},"+1"));
    svg.appendChild(E("text",{x:bx+bw+4,y:(bTop+bBot)/2+3,"font-size":8.5,fill:MUT},"0"));
    svg.appendChild(E("text",{x:bx+bw+4,y:bBot,"font-size":8.5,fill:MUT},"−1"));

    /* ===================== PRAWY PANEL: scatter + linia ===================== */
    var px0=408, px1=684, py0=290, py1=76;          // obszar rysowania
    var xmn=5, xmx=115, ymn=60000, ymx=440000;       // powierzchnia [m²], cena [PLN]
    var sx=function(xx){return px0+(xx-xmn)/(xmx-xmn)*(px1-px0);};
    var sy=function(yy){return py0-(yy-ymn)/(ymx-ymn)*(py0-py1);};

    svg.appendChild(E("text",{x:(px0+px1)/2,y:28,"text-anchor":"middle","font-size":13,"font-weight":700,fill:INK2},"Rozrzut + linia trendu"));
    svg.appendChild(E("text",{x:(px0+px1)/2,y:45,"text-anchor":"middle","font-size":10,fill:MUT},"wizualna ocena liniowości zależności"));

    // siatka pozioma + etykiety y
    var yt=[100000,200000,300000,400000],k;
    for(k=0;k<yt.length;k++){
      svg.appendChild(E("line",{x1:px0,y1:sy(yt[k]),x2:px1,y2:sy(yt[k]),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:px0-6,y:sy(yt[k])+3.5,"text-anchor":"end","font-size":8.5,fill:MUT},(yt[k]/1000)+"k"));
    }
    var xt=[20,40,60,80,100];
    for(k=0;k<xt.length;k++){
      svg.appendChild(E("text",{x:sx(xt[k]),y:py0+15,"text-anchor":"middle","font-size":8.5,fill:MUT},String(xt[k])));
    }

    // dane: cena ~ liniowa funkcja powierzchni + szum (widoczna liniowość)
    var r=mul(20260705), a0=95000, b0=3050, i2, X=[], Y=[], N=90;
    for(i2=0;i2<N;i2++){
      var xx=10+r()*98;
      var yy=a0+b0*xx+gauss(r)*26000;
      if(yy<ymn)yy=ymn; if(yy>ymx)yy=ymx;
      X.push(xx); Y.push(yy);
    }
    // OLS na wygenerowanych punktach (dopasowana prosta)
    var sX=0,sY=0,sXY=0,sXX=0;
    for(i2=0;i2<N;i2++){sX+=X[i2];sY+=Y[i2];sXY+=X[i2]*Y[i2];sXX+=X[i2]*X[i2];}
    var b=(sXY-sX*sY/N)/(sXX-sX*sX/N), a=sY/N-b*sX/N;

    // punkty
    for(i2=0;i2<N;i2++){
      svg.appendChild(E("circle",{cx:sx(X[i2]).toFixed(1),cy:sy(Y[i2]).toFixed(1),r:3.1,fill:BL,"fill-opacity":0.7}));
    }
    // dopasowana prosta OLS (obcięta do obszaru)
    svg.appendChild(E("line",{x1:sx(xmn),y1:sy(a+b*xmn),x2:sx(xmx),y2:sy(a+b*xmx),
      stroke:OR,"stroke-width":2.6,"stroke-linecap":"round"}));
    svg.appendChild(E("text",{x:px1-4,y:sy(a+b*xmx)-8,"text-anchor":"end","font-size":10,"font-weight":700,fill:OR},"ŷ = β₀ + β₁·x"));

    // osie
    svg.appendChild(E("line",{x1:px0,y1:py0,x2:px1,y2:py0,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("line",{x1:px0,y1:py0,x2:px0,y2:py1,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("text",{x:(px0+px1)/2,y:H-8,"text-anchor":"middle","font-size":10,fill:MUT},"powierzchnia [m²]"));
    svg.appendChild(E("text",{x:px0-30,y:(py0+py1)/2,"text-anchor":"middle","font-size":10,fill:MUT,
      transform:"rotate(-90 "+(px0-30)+" "+((py0+py1)/2)+")"},"cena [PLN]"));

    // adnotacja o korelacji pow.–cena spinająca oba panele
    svg.appendChild(E("text",{x:px0,y:py1-14,"font-size":9.5,fill:INK2},"r = 0.89 → silna, dodatnia, w przybliżeniu liniowa"));
  }

  document.addEventListener("themechange",render);
  render();
})();
</script>
