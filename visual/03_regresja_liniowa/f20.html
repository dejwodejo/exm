<figure class="viz" id="f20">
  <div class="viz-head">
    <p class="viz-title">Surowe vs standaryzowane współczynniki</p>
    <p class="viz-sub">Te same 3 predyktory, ten sam model. Po lewej surowe β̂ — długości słupków są mylące, bo cechy mają różne jednostki i skale (m², sztuki, km). Po prawej β̂ po standaryzacji cech (odjęcie średniej, podział przez odchylenie) — magnitudy są bezpośrednio porównywalne i pokazują faktyczną „siłę wpływu”.</p>
  </div>
  <div class="viz-body">
    <svg id="f20-svg" viewBox="0 0 700 300" role="img" aria-label="Dwa poziome wykresy słupkowe tych samych trzech predyktorów: po lewej surowe współczynniki o różnych skalach, po prawej standaryzowane współczynniki na wspólnej skali"></svg>
  </div>
  <figcaption><b>Sedno:</b> tylko standaryzowane współczynniki wolno porównywać między sobą jako „siłę wpływu” — na surowych „największy” słupek (Pokoje) wynika z jednostek, a nie z rzeczywistej ważności cechy (naprawdę dominuje Powierzchnia).</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f20-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  var W=700,H=300;
  function fmt(v){var s=v<0?"−":"", a=Math.abs(Math.round(v)).toString();
    return s+a.replace(/\B(?=(\d{3})+(?!\d))/g," ");}

  function panel(ox0,ox1,title,sub,data,note){
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BG=cvar("--bg2");
    var px0=ox0+10, px1=ox1-10;
    // skala własna panelu (surowe i standaryzowane mają inne rzędy wielkości)
    var vmin=0,vmax=0,i;
    for(i=0;i<data.length;i++){vmin=Math.min(vmin,data[i].v);vmax=Math.max(vmax,data[i].v);}
    vmax*=1.30; vmin*=1.30; if(vmax===0)vmax=1; if(vmin===0)vmin=-1;
    var xOf=function(v){return px0+(v-vmin)/(vmax-vmin)*(px1-px0);};
    var zx=xOf(0);
    // tytuł + podtytuł panelu
    svg.appendChild(E("text",{x:(ox0+ox1)/2,y:22,"text-anchor":"middle","font-size":13,"font-weight":700,fill:INK2},title));
    svg.appendChild(E("text",{x:(ox0+ox1)/2,y:38,"text-anchor":"middle","font-size":10.5,fill:MUT},sub));
    // wiersze
    var startY=72, step=66, barH=22;
    var topY=startY, botY=startY+(data.length-1)*step+barH+8;
    // linia zera (oś kategorii)
    svg.appendChild(E("line",{x1:zx,y1:topY-6,x2:zx,y2:botY,stroke:AX,"stroke-width":1.5}));
    svg.appendChild(E("text",{x:zx,y:botY+14,"text-anchor":"middle","font-size":9.5,fill:MUT},"0"));
    for(i=0;i<data.length;i++){
      var d=data[i], AC=cvar(d.color);
      var labY=startY+i*step, barTop=labY+7, mid=barTop+barH/2;
      // etykieta cechy nad słupkiem
      svg.appendChild(E("text",{x:ox0+2,y:labY,"font-size":10.5,"font-weight":600,fill:INK},d.lab));
      // słupek
      var bx=Math.min(zx,xOf(d.v)), bw=Math.abs(xOf(d.v)-zx);
      svg.appendChild(E("rect",{x:bx,y:barTop,width:Math.max(0.5,bw),height:barH,rx:2.5,
        fill:AC,"fill-opacity":0.82,stroke:AC,"stroke-width":1}));
      // wartość przy końcu słupka
      if(d.v>=0)
        svg.appendChild(E("text",{x:xOf(d.v)+6,y:mid+3.5,"font-size":11,"font-weight":700,fill:INK},fmt(d.v)));
      else
        svg.appendChild(E("text",{x:xOf(d.v)-6,y:mid+3.5,"text-anchor":"end","font-size":11,"font-weight":700,fill:INK},fmt(d.v)));
      // adnotacja pod kluczowym słupkiem
      if(note && note.idx===i){
        svg.appendChild(E("text",{x:zx+6,y:barTop+barH+11,"font-size":9.5,"font-style":"italic","font-weight":700,fill:note.warn?cvar("--v-orange"):cvar("--v-blue")},note.txt));
      }
    }
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var raw=[
      {lab:"Powierzchnia  [m²]", v:3100,  color:"--v-blue"},
      {lab:"Pokoje  [szt.]",     v:18353, color:"--v-teal"},
      {lab:"Odległość  [km]",    v:-4559, color:"--v-orange"}
    ];
    var std=[
      {lab:"Powierzchnia", v:43177,  color:"--v-blue"},
      {lab:"Pokoje",       v:18069,  color:"--v-teal"},
      {lab:"Odległość",    v:-18081, color:"--v-orange"}
    ];
    panel(20, 350, "Surowe  β̂ᵢ", "różne jednostki → długości nieporównywalne",
          raw, {idx:1, warn:true, txt:"pozornie największy wpływ"});
    panel(370, 690, "Standaryzowane  β̂ᵢ", "wspólna skala → porównywalne",
          std, {idx:0, warn:false, txt:"faktycznie największy wpływ"});
    // separator między panelami
    svg.appendChild(E("line",{x1:360,y1:52,x2:360,y2:H-20,stroke:cvar("--v-grid"),"stroke-width":1,"stroke-dasharray":"3 4"}));
  }

  document.addEventListener("themechange",render);
  render();
})();
</script>
