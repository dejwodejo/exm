<figure class="viz" id="f13">
  <div class="viz-head">
    <p class="viz-title">Przedział ufności (CI) vs przedział predykcji (PI)</p>
    <p class="viz-sub">CI opisuje niepewność co do <i>średniej</i> odpowiedzi E[y|x] — kurczy się jak 1/√n i jest najwęższy w x̄ („kokarda”). PI opisuje niepewność co do <i>pojedynczej nowej</i> obserwacji — zawiera dodatkowo szum ε (~±2σ), więc pozostaje szeroki niezależnie od n. Przesuń suwak liczności próby n.</p>
  </div>
  <div class="viz-body">
    <svg id="f13-svg" viewBox="0 0 680 340" role="img" aria-label="Prosta regresji z dwoma pasmami: wąskie pasmo CI dla średniej, kurczące się wraz z n i najwęższe w środku, oraz szerokie pasmo PI dla nowej obserwacji, pozostające szerokie"></svg>
  </div>
  <div class="viz-controls">
    <label>Liczność próby n
      <input id="f13-n" type="range" min="8" max="500" step="1" value="30">
      <span class="val" id="f13-nv">30</span>
    </label>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      w x̄: CI = <b id="f13-ci">–</b> · PI = <b id="f13-pi">–</b> · <b id="f13-rel">PI ⊃ CI</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> CI dotyczy średniej i można go zwężać zwiększając n; PI dotyczy nowej obserwacji i jego szerokość jest ograniczona od dołu przez σ (nieredukowalny szum). Dlatego PI zawsze zawiera CI: PI ⊃ CI.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f13-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  function mul(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}

  var W=680,H=340,L=44,R=20,T=18,B=42, x0=L,x1=W-R,y0=H-B,y1=T;
  var xlo=1, xhi=10, xDlo=0.5, xDhi=10.5, ymax=28;
  var a0=2, b0=2.1, sig=2.2, tcrit=2.0;      // model: ŷ = 2 + 2.1x, σ ≈ 2.2, t ≈ 2
  var xbar=(xlo+xhi)/2, Vx=(xhi-xlo)*(xhi-xlo)/12; // wariancja x dla równomiernego rozkładu
  var cx=function(x){return x0+(x-xDlo)/(xDhi-xDlo)*(x1-x0);};
  var cy=function(v){return y0-v/ymax*(y0-y1);};

  var slider=document.getElementById("f13-n");

  // szerokości połówkowe pasm
  function ciHalf(x,n){return tcrit*sig*Math.sqrt(1/n + (x-xbar)*(x-xbar)/(n*Vx));}
  function piHalf(x,n){return tcrit*sig*Math.sqrt(1 + 1/n + (x-xbar)*(x-xbar)/(n*Vx));}

  function bandPath(n,halfFn){
    var up="",dn="",i,xx,yc,hw,steps=48;
    for(i=0;i<=steps;i++){xx=xlo+i/steps*(xhi-xlo); yc=a0+b0*xx; hw=halfFn(xx,n);
      up+=(i?"L":"M")+cx(xx).toFixed(1)+" "+cy(Math.min(ymax,yc+hw)).toFixed(1);}
    for(i=steps;i>=0;i--){xx=xlo+i/steps*(xhi-xlo); yc=a0+b0*xx; hw=halfFn(xx,n);
      dn+="L"+cx(xx).toFixed(1)+" "+cy(Math.max(0,yc-hw)).toFixed(1);}
    return up+dn+"Z";
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var n=parseInt(slider.value,10);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),BG=cvar("--bg2");
    var g;

    // siatka + osie
    for(g=0;g<=ymax;g+=7){svg.appendChild(E("line",{x1:x0,y1:cy(g),x2:x1,y2:cy(g),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:x0-8,y:cy(g)+3.5,"text-anchor":"end","font-size":10,fill:MUT},String(g)));}
    for(g=2;g<=10;g+=2){svg.appendChild(E("text",{x:cx(g),y:y0+16,"text-anchor":"middle","font-size":10,fill:MUT},String(g)));}

    // PI — szerokie pasmo (nowa obserwacja): pomarańcz, niska nieprzezroczystość
    svg.appendChild(E("path",{d:bandPath(n,piHalf),fill:OR,"fill-opacity":0.14,stroke:OR,"stroke-opacity":0.45,"stroke-width":1}));
    // CI — wąskie pasmo (średnia warunkowa): turkus, wyższa nieprzezroczystość
    svg.appendChild(E("path",{d:bandPath(n,ciHalf),fill:TE,"fill-opacity":0.34,stroke:TE,"stroke-opacity":0.7,"stroke-width":1}));

    // dane: n punktów wokół prostej (rysujemy ograniczoną liczbę, matematyka pasm używa pełnego n)
    var r=mul(20260705), shown=Math.min(n,150), i, x, y;
    for(i=0;i<shown;i++){x=xlo+r()*(xhi-xlo); y=a0+b0*x+gauss(r)*sig; if(y<0)y=0; if(y>ymax)y=ymax;
      svg.appendChild(E("circle",{cx:cx(x).toFixed(1),cy:cy(y).toFixed(1),r:2.8,fill:BL,"fill-opacity":0.6}));}

    // prosta OLS
    svg.appendChild(E("line",{x1:cx(xlo),y1:cy(a0+b0*xlo),x2:cx(xhi),y2:cy(a0+b0*xhi),stroke:INK,"stroke-width":2.6,"stroke-linecap":"round"}));

    // pionowa linia w x̄ (najwęższe miejsce kokardy)
    svg.appendChild(E("line",{x1:cx(xbar),y1:y0,x2:cx(xbar),y2:y1,stroke:MUT,"stroke-width":1,"stroke-dasharray":"4 4",opacity:.6}));
    svg.appendChild(E("text",{x:cx(xbar),y:y1+10,"text-anchor":"middle","font-size":10,fill:MUT},"x̄"));

    // osie
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x1,y2:y0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x0,y2:y1,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("text",{x:(x0+x1)/2,y:H-6,"text-anchor":"middle","font-size":11,fill:MUT},"x"));

    // legenda
    var lx=x0+12, ly=y1+8, sw=18;
    function key(yy,col,op,lab){
      svg.appendChild(E("rect",{x:lx,y:yy-8,width:sw,height:10,rx:2,fill:col,"fill-opacity":op,stroke:col,"stroke-opacity":0.6,"stroke-width":1}));
      svg.appendChild(E("text",{x:lx+sw+6,y:yy,"font-size":10.5,fill:INK2},lab));
    }
    svg.appendChild(E("line",{x1:lx,y1:ly-4,x2:lx+sw,y2:ly-4,stroke:INK,"stroke-width":2.6,"stroke-linecap":"round"}));
    svg.appendChild(E("text",{x:lx+sw+6,y:ly,"font-size":10.5,fill:INK2},"ŷ = β₀ + β₁x"));
    key(ly+16,TE,0.34,"CI — średnia E[y|x] (∝ 1/√n)");
    key(ly+32,OR,0.14,"PI — nowa obserwacja (~±2σ)");

    // odczyty
    document.getElementById("f13-nv").textContent=n;
    document.getElementById("f13-ci").textContent="±"+ciHalf(xbar,n).toFixed(2);
    document.getElementById("f13-pi").textContent="±"+piHalf(xbar,n).toFixed(2);
    document.getElementById("f13-rel").textContent="PI ⊃ CI";
  }

  slider.addEventListener("input",render);
  document.addEventListener("themechange",render);
  render();
})();
</script>
