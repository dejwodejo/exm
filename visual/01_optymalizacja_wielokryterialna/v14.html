<figure class="viz" id="v14">
  <div class="viz-head">
    <p class="viz-title">Przestrzeń kryteriów: front Pareto, dominacja i pułapka sumy ważonej</p>
    <p class="viz-sub">Najedź na punkt (lub przejdź Tab), aby zobaczyć stożek dominacji i status. Przesuń wagę w₁, aby zobaczyć, którego punktu frontu dotyka poziomica sumy ważonej — punkt wklęsły C jest zawsze pomijany.</p>
  </div>
  <div class="viz-body">
    <svg id="v14-svg" viewBox="0 0 680 340" role="img" aria-label="Przestrzeń dwóch minimalizowanych kryteriów z frontem Pareto, stożkiem dominacji, punktem idealnym i nadir oraz poziomicą sumy ważonej"></svg>
  </div>
  <div class="viz-controls">
    <label>Waga w₁ (dla kryterium f₁)
      <input id="v14-w" type="range" min="0" max="1" step="0.01" value="0.50">
      <span class="val" id="v14-wv">0.50</span>
    </label>
    <span class="toggle" id="v14-ws" role="button" tabindex="0" aria-pressed="true">Poziomica sumy ważonej</span>
    <span class="toggle" id="v14-eps" role="button" tabindex="0" aria-pressed="false">ε-ograniczenie dla C</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      w=(<b id="v14-w1">–</b>, <b id="v14-w2">–</b>) · poziomica dotyka: <b id="v14-touch">–</b> · <b style="color:var(--v-amber)">pomija C (wklęsły)</b>
    </span>
    <span style="display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;color:var(--ink2);align-items:center">
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:11px;height:11px;border-radius:50%;background:var(--v-blue);display:inline-block"></span>front Pareto (niezdominowane)</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:11px;height:11px;border-radius:50%;border:1.5px solid var(--muted);display:inline-block"></span>zdominowane</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:18px;height:0;border-top:2px dashed var(--muted);display:inline-block"></span>otoczka wypukła</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:18px;height:0;border-top:2.5px solid var(--v-orange);display:inline-block"></span>poziomica</span>
      <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:11px;height:11px;background:var(--v-amber);display:inline-block"></span>punkt wklęsły C</span>
    </span>
  </div>
  <figcaption><b>Sedno:</b> suma ważona „widzi" tylko otoczkę wypukłą zbioru kryteriów — hiperpłaszczyzna o normalnej <b>w</b> styka się z Y jedynie w jej wierzchołkach. Rozwiązanie C leży we wklęsłym fragmencie frontu i jest <b>nieosiągalne dla żadnych dodatnich wag</b>; do jego wygenerowania trzeba ε-ograniczeń lub metryki Czebyszewa.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v14-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}

  var W=680,H=340,L=50,R=24,T=20,B=46;
  var x0=L,x1=W-R,y0=H-B,y1=T, DMAX=10;
  function xm(v){return x0+v/DMAX*(x1-x0);}
  function ym(v){return y0-v/DMAX*(y0-y1);}
  function clamp(v){return v<0?0:(v>DMAX?DMAX:v);}

  // ilustracyjny zbiór rozwiązań w przestrzeni kryteriów (min f1, min f2)
  var PTS=[
    {id:"A",f1:1.0,f2:8.5},
    {id:"B",f1:2.3,f2:5.0},
    {id:"C",f1:4.0,f2:4.2},   // wklęsły punkt frontu — pułapka sumy ważonej
    {id:"D",f1:6.0,f2:2.6},
    {id:"E",f1:7.5,f2:1.9},
    {id:"F",f1:9.0,f2:1.5},
    {id:"G",f1:4.5,f2:6.6},
    {id:"H",f1:6.8,f2:4.6},
    {id:"I",f1:3.0,f2:7.2},
    {id:"J",f1:8.0,f2:3.4},
    {id:"K",f1:5.5,f2:5.4}
  ];
  function byId(id){for(var i=0;i<PTS.length;i++)if(PTS[i].id===id)return PTS[i];return null;}
  var FRONT=["A","B","C","D","E","F"];      // pełny front Pareto (z wklęsłym C)
  var HULL =["A","B","D","E","F"];          // otoczka wypukła — to widzi suma ważona

  function isDominated(p){
    for(var i=0;i<PTS.length;i++){var q=PTS[i];
      if(q!==p && q.f1<=p.f1 && q.f2<=p.f2 && (q.f1<p.f1||q.f2<p.f2)) return true;}
    return false;
  }
  // punkt idealny i nadir (po zbiorze Pareto)
  var yI={f1:1.0,f2:1.5}, yN={f1:9.0,f2:8.5};

  function wsOpt(w){var best=PTS[0],bv=1e9;
    for(var i=0;i<PTS.length;i++){var g=w*PTS[i].f1+(1-w)*PTS[i].f2;
      if(g<bv-1e-9){bv=g;best=PTS[i];}} return best;}

  function isoSeg(w,best){
    var we=Math.min(Math.max(w,1e-4),1-1e-4);
    var c=we*best.f1+(1-we)*best.f2, cand=[];
    var a=c/(1-we);            if(a>=-1e-9&&a<=DMAX+1e-9)cand.push({f1:0,f2:clamp(a)});
    var b=(c-DMAX*we)/(1-we);  if(b>=-1e-9&&b<=DMAX+1e-9)cand.push({f1:DMAX,f2:clamp(b)});
    var d=c/we;                if(d>=-1e-9&&d<=DMAX+1e-9)cand.push({f1:clamp(d),f2:0});
    var e=(c-DMAX*(1-we))/we;  if(e>=-1e-9&&e<=DMAX+1e-9)cand.push({f1:clamp(e),f2:DMAX});
    var u=[];cand.forEach(function(p){if(!u.some(function(q){return Math.abs(q.f1-p.f1)<1e-6&&Math.abs(q.f2-p.f2)<1e-6;}))u.push(p);});
    return [u[0],u[1]];
  }

  var hover=null;

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),
        AM=cvar("--v-amber"),BG=cvar("--bg2");
    var w=parseFloat(document.getElementById("v14-w").value);
    var wsOn=document.getElementById("v14-ws").getAttribute("aria-pressed")==="true";
    var epsOn=document.getElementById("v14-eps").getAttribute("aria-pressed")==="true";

    // siatka
    for(var g=0;g<=DMAX;g+=2){
      svg.appendChild(E("line",{x1:xm(g),y1:y0,x2:xm(g),y2:y1,stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("line",{x1:x0,y1:ym(g),x2:x1,y2:ym(g),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:xm(g),y:y0+15,"text-anchor":"middle","font-size":9.5,fill:MUT},String(g)));
      if(g>0)svg.appendChild(E("text",{x:x0-8,y:ym(g)+3.5,"text-anchor":"end","font-size":9.5,fill:MUT},String(g)));
    }

    // stożek dominacji przy najechanym punkcie
    if(hover){
      var hp=byId(hover);
      // obszar zdominowany PRZEZ punkt (gorsze w obu) — prawy-górny
      svg.appendChild(E("rect",{x:xm(hp.f1),y:y1,width:x1-xm(hp.f1),height:ym(hp.f2)-y1,
        fill:OR,opacity:0.12}));
      svg.appendChild(E("rect",{x:xm(hp.f1),y:y1,width:x1-xm(hp.f1),height:ym(hp.f2)-y1,
        fill:"none",stroke:OR,"stroke-width":1,"stroke-dasharray":"3 3",opacity:0.6}));
      // obszar DOMINUJĄCY punkt (lepsze w obu) — lewy-dolny
      svg.appendChild(E("rect",{x:x0,y:ym(hp.f2),width:xm(hp.f1)-x0,height:y0-ym(hp.f2),
        fill:TE,opacity:0.12}));
      svg.appendChild(E("rect",{x:x0,y:ym(hp.f2),width:xm(hp.f1)-x0,height:y0-ym(hp.f2),
        fill:"none",stroke:TE,"stroke-width":1,"stroke-dasharray":"3 3",opacity:0.6}));
      svg.appendChild(E("text",{x:x1-6,y:y1+14,"text-anchor":"end","font-size":10,fill:OR,"font-weight":700},"zdominowane przez "+hp.id));
      svg.appendChild(E("text",{x:x0+6,y:y0-6,"text-anchor":"start","font-size":10,fill:TE,"font-weight":700},"dominują "+hp.id));
    }

    // otoczka wypukła (widziana przez sumę ważoną) — przerywana
    var hd="";HULL.forEach(function(id,i){var p=byId(id);hd+=(i?"L":"M")+xm(p.f1).toFixed(1)+" "+ym(p.f2).toFixed(1);});
    svg.appendChild(E("path",{d:hd,fill:"none",stroke:MUT,"stroke-width":1.6,"stroke-dasharray":"5 4",opacity:0.85}));

    // pełny front Pareto (przez wklęsły C) — ciągła linia
    var fd="";FRONT.forEach(function(id,i){var p=byId(id);fd+=(i?"L":"M")+xm(p.f1).toFixed(1)+" "+ym(p.f2).toFixed(1);});
    svg.appendChild(E("path",{d:fd,fill:"none",stroke:BL,"stroke-width":2.4,"stroke-linecap":"round","stroke-linejoin":"round"}));

    // punkt idealny i nadir (marker + ramka frontu)
    svg.appendChild(E("rect",{x:xm(yI.f1),y:ym(yN.f2),width:xm(yN.f1)-xm(yI.f1),height:ym(yI.f2)-ym(yN.f2),
      fill:"none",stroke:INK2,"stroke-width":1,"stroke-dasharray":"2 4",opacity:0.5}));
    // idealny
    svg.appendChild(E("path",{d:"M"+(xm(yI.f1)-5)+" "+ym(yI.f2)+"L"+(xm(yI.f1)+5)+" "+ym(yI.f2)+"M"+xm(yI.f1)+" "+(ym(yI.f2)-5)+"L"+xm(yI.f1)+" "+(ym(yI.f2)+5),stroke:TE,"stroke-width":2}));
    svg.appendChild(E("text",{x:xm(yI.f1)+9,y:ym(yI.f2)+12,"font-size":10,fill:TE,"font-weight":700},"idealny yᴵ"));
    // nadir
    svg.appendChild(E("path",{d:"M"+(xm(yN.f1)-5)+" "+ym(yN.f2)+"L"+(xm(yN.f1)+5)+" "+ym(yN.f2)+"M"+xm(yN.f1)+" "+(ym(yN.f2)-5)+"L"+xm(yN.f1)+" "+(ym(yN.f2)+5),stroke:INK2,"stroke-width":2}));
    svg.appendChild(E("text",{x:xm(yN.f1)-9,y:ym(yN.f2)-6,"text-anchor":"end","font-size":10,fill:INK2,"font-weight":700},"nadir yᴺ"));

    // poziomica sumy ważonej + wskazany punkt
    var opt=null;
    if(wsOn){
      opt=wsOpt(w);
      var seg=isoSeg(w,opt);
      if(seg[0]&&seg[1]){
        svg.appendChild(E("line",{x1:xm(seg[0].f1),y1:ym(seg[0].f2),x2:xm(seg[1].f1),y2:ym(seg[1].f2),
          stroke:OR,"stroke-width":2.4,"stroke-linecap":"round"}));
      }
      svg.appendChild(E("circle",{cx:xm(opt.f1),cy:ym(opt.f2),r:9,fill:"none",stroke:OR,"stroke-width":2.2}));
    }

    // ε-ograniczenie: dla min f1 przy f2 <= f2(C) punkt C jest osiągalny mimo wklęsłości frontu
    if(epsOn){
      var cpt=byId("C"), epsY=ym(cpt.f2);
      var defs=E("defs",{});
      var marker=E("marker",{id:"v14-arrow-te",viewBox:"0 0 10 10",refX:"9",refY:"5",markerWidth:"5",markerHeight:"5",orient:"auto-start-reverse"});
      marker.appendChild(E("path",{d:"M 0 0 L 10 5 L 0 10 z",fill:TE}));
      defs.appendChild(marker); svg.appendChild(defs);
      svg.appendChild(E("rect",{x:x0,y:epsY,width:x1-x0,height:y0-epsY,fill:TE,opacity:.075}));
      svg.appendChild(E("line",{x1:x0,y1:epsY,x2:x1,y2:epsY,stroke:TE,"stroke-width":1.8,"stroke-dasharray":"6 4"}));
      svg.appendChild(E("line",{x1:x1-36,y1:epsY+24,x2:xm(cpt.f1)+12,y2:epsY+24,stroke:TE,"stroke-width":2,"marker-end":"url(#v14-arrow-te)"}));
      svg.appendChild(E("text",{x:x1-8,y:epsY-8,"text-anchor":"end","font-size":10.5,"font-weight":700,fill:TE},"ε₂ = f₂(C); min f₁ ⇒ C"));
    }

    // punkty rozwiązań
    PTS.forEach(function(p){
      var dom=isDominated(p), isC=(p.id==="C"), isHov=(hover===p.id);
      var sx=xm(p.f1), sy=ym(p.f2);
      if(isC){
        svg.appendChild(E("rect",{x:sx-5.5,y:sy-5.5,width:11,height:11,fill:AM,stroke:BG,"stroke-width":1.6}));
        if(isHov)svg.appendChild(E("rect",{x:sx-8.5,y:sy-8.5,width:17,height:17,fill:"none",stroke:AM,"stroke-width":1.6}));
      } else if(dom){
        svg.appendChild(E("circle",{cx:sx,cy:sy,r:4.5,fill:BG,stroke:MUT,"stroke-width":1.6}));
        if(isHov)svg.appendChild(E("circle",{cx:sx,cy:sy,r:7.5,fill:"none",stroke:INK,"stroke-width":1.6}));
      } else {
        svg.appendChild(E("circle",{cx:sx,cy:sy,r:5.5,fill:BL,stroke:BG,"stroke-width":1.6}));
        if(isHov)svg.appendChild(E("circle",{cx:sx,cy:sy,r:8.5,fill:"none",stroke:BL,"stroke-width":1.6}));
      }
      // etykieta id
      var lx=sx+(dom?9:-9), la=(dom?"start":"end");
      svg.appendChild(E("text",{x:lx,y:sy-7,"text-anchor":la,"font-size":10,"font-weight":700,
        fill:isC?AM:(dom?INK2:BL)},p.id));
      // przezroczysty duży cel do najechania / fokusu
      var hit=E("circle",{cx:sx,cy:sy,r:13,fill:"transparent",tabindex:"0",role:"button",
        "aria-label":p.id+": "+(dom?"zdominowany":(isC?"niezdominowany, wklęsły fragment frontu":"niezdominowany, front Pareto"))+", f1="+p.f1.toFixed(1)+", f2="+p.f2.toFixed(1)});
      hit.style.cursor="pointer"; hit.style.outline="none";
      (function(id){
        hit.addEventListener("mouseenter",function(){hover=id;render();});
        hit.addEventListener("mouseleave",function(){hover=null;render();});
        hit.addEventListener("focus",function(){hover=id;render();});
        hit.addEventListener("blur",function(){hover=null;render();});
      })(p.id);
      svg.appendChild(hit);
    });

    if(epsOn){
      var c2=byId("C");
      var clx=xm(c2.f1)+18, cly=ym(c2.f2)-20;
      svg.appendChild(E("circle",{cx:xm(c2.f1),cy:ym(c2.f2),r:13,fill:"none",stroke:TE,"stroke-width":2.4}));
      svg.appendChild(E("rect",{x:clx-5,y:cly-14,width:122,height:20,rx:4,fill:BG,opacity:.94,stroke:TE,"stroke-width":1}));
      svg.appendChild(E("text",{x:clx,y:cly,"font-size":10.5,"font-weight":700,fill:TE},"C z ε-ograniczenia"));
    }

    // etykieta najechanego statusu
    if(hover){
      var p=byId(hover), dom=isDominated(p);
      var txt=p.id+": "+(dom?"zdominowany":(p.id==="C"?"niezdominowany · wklęsły (poza otoczką)":"niezdominowany (front Pareto)"));
      var tx=xm(p.f1)+12, ty=ym(p.f2)+16; if(tx>x1-150)tx=xm(p.f1)-12;
      var anc=(tx>xm(p.f1))?"start":"end";
      svg.appendChild(E("text",{x:tx,y:ty,"text-anchor":anc,"font-size":10.5,"font-weight":700,
        fill:dom?INK2:(p.id==="C"?AM:BL)},txt));
    }

    // osie ze strzałkami
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x1,y2:y0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x0,y2:y1,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("path",{d:"M"+(x1)+" "+y0+"l-7 -3.5 l0 7 z",fill:AX}));
    svg.appendChild(E("path",{d:"M"+x0+" "+y1+"l-3.5 7 l7 0 z",fill:AX}));
    svg.appendChild(E("text",{x:x1-4,y:y0+30,"text-anchor":"end","font-size":11,fill:INK2},"f₁ (min) →"));
    svg.appendChild(E("text",{x:x0+6,y:y1+3,"text-anchor":"start","font-size":11,fill:INK2},"↑ f₂ (min)"));

    // odczyty na żywo
    document.getElementById("v14-wv").textContent=w.toFixed(2);
    document.getElementById("v14-w1").textContent=w.toFixed(2);
    document.getElementById("v14-w2").textContent=(1-w).toFixed(2);
    document.getElementById("v14-touch").textContent=wsOn?(opt.id+" ("+opt.f1.toFixed(1)+", "+opt.f2.toFixed(1)+")"):"—";
  }

  document.getElementById("v14-w").addEventListener("input",render);
  var ws=document.getElementById("v14-ws");
  function toggleWs(){ws.setAttribute("aria-pressed",ws.getAttribute("aria-pressed")==="true"?"false":"true");render();}
  ws.addEventListener("click",toggleWs);
  ws.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();toggleWs();}});
  var eps=document.getElementById("v14-eps");
  function toggleEps(){eps.setAttribute("aria-pressed",eps.getAttribute("aria-pressed")==="true"?"false":"true");render();}
  eps.addEventListener("click",toggleEps);
  eps.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();toggleEps();}});
  document.addEventListener("themechange",render);
  render();
})();
</script>
