<figure class="viz" id="v12">
  <div class="viz-head">
    <p class="viz-title">PCA vs LDA: rzut dwóch chmur klas na jedną oś</p>
    <p class="viz-sub">Ta sama para chmur, dwa kierunki rzutu. PC1 goni maksymalną wariancję (klasy się nakładają), oś LDA maksymalizuje separację klas (klasy się rozdzielają). Przełącz preset albo obróć oś ręcznie suwakiem.</p>
  </div>
  <div class="viz-body">
    <svg id="v12-svg" viewBox="0 0 680 340" role="img" aria-label="Dwie chmury punktów dwóch klas i histogram ich rzutu na wybraną oś — PC1 kontra oś LDA"></svg>
  </div>
  <div class="viz-controls">
    <span class="toggle" id="v12-pca" role="button" tabindex="0" aria-pressed="true">Oś PC1 (maks. wariancja)</span>
    <span class="toggle" id="v12-lda" role="button" tabindex="0" aria-pressed="false">Oś LDA (maks. separacja)</span>
    <label>Kąt osi α
      <input id="v12-a" type="range" min="0" max="179" step="1" value="30">
      <span class="val" id="v12-av">30°</span>
    </label>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      Fisher J=<b id="v12-j">–</b> · <b id="v12-sep">–</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> PCA jest nienadzorowane i wybiera oś największej wariancji — a ta może zignorować informację dyskryminacyjną. LDA używa etykiet i rzutuje na kierunek maksymalizujący iloraz Fishera \(w^\top\Sigma_B w / w^\top\Sigma_W w\), więc klasy rozjeżdżają się na osi 1D nawet gdy PC1 je zlewa.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v12-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}

  // --- deterministyczne dane: dwie chmury elipsy wydłużone wzdłuż d1, przesunięte wzdłuż d2 ---
  var A1=30*Math.PI/180;                 // kierunek wydłużenia chmur
  var d1=[Math.cos(A1),Math.sin(A1)];    // wysoka wariancja wewnątrzklasowa
  var d2=[-Math.sin(A1),Math.cos(A1)];   // kierunek separacji klas (prostopadły)
  function genClass(sign,phL,phS){
    var pts=[],n=26,i;
    for(i=0;i<n;i++){
      var u=(i/(n-1))*2-1;
      var lng=u*2.15 + Math.sin(i*1.7+phL)*0.28;      // rozrzut wzdłuż d1
      var srt=Math.sin(i*2.5+phS)*0.42 + sign*0.78;   // rozrzut + przesunięcie średniej wzdłuż d2
      pts.push([d1[0]*lng+d2[0]*srt, d1[1]*lng+d2[1]*srt]);
    }
    return pts;
  }
  var clsA=genClass(1,0.0,0.4), clsB=genClass(-1,0.6,2.1);
  var all=clsA.concat(clsB);

  // --- 2x2 kowariancja / rozproszenie i kierunki własne ---
  function meanOf(p){var mx=0,my=0,i;for(i=0;i<p.length;i++){mx+=p[i][0];my+=p[i][1];}return [mx/p.length,my/p.length];}
  function scatter(p,m){var a=0,b=0,c=0,i;for(i=0;i<p.length;i++){var dx=p[i][0]-m[0],dy=p[i][1]-m[1];a+=dx*dx;b+=dx*dy;c+=dy*dy;}return [a,b,c];}
  function angNorm(t){while(t<0)t+=Math.PI;while(t>=Math.PI)t-=Math.PI;return t;}
  // PCA: wektor własny największej wartości własnej kowariancji CAŁOŚCI
  var mAll=meanOf(all), Sall=scatter(all,mAll);
  function topEig(S){var a=S[0],b=S[1],c=S[2];var tr=a+c,det=a*c-b*b;
    var l1=tr/2+Math.sqrt(Math.max(0,tr*tr/4-det));var vx,vy;
    if(Math.abs(b)>1e-9){vx=l1-c;vy=b;}else{if(a>=c){vx=1;vy=0;}else{vx=0;vy=1;}}
    return angNorm(Math.atan2(vy,vx));}
  var pcaAng=topEig(Sall);
  // LDA (2 klasy): w = Sw^{-1}(mA - mB)
  var mA=meanOf(clsA), mB=meanOf(clsB);
  var sA=scatter(clsA,mA), sB=scatter(clsB,mB);
  var Sw=[sA[0]+sB[0], sA[1]+sB[1], sA[2]+sB[2]];
  var ldaAng=(function(){var a=Sw[0],b=Sw[1],c=Sw[2],det=a*c-b*b;
    var dx=mA[0]-mB[0],dy=mA[1]-mB[1];
    var wx=(c*dx-b*dy)/det, wy=(-b*dx+a*dy)/det;
    return angNorm(Math.atan2(wy,wx));})();
  var pcaDeg=Math.round(pcaAng*180/Math.PI), ldaDeg=Math.round(ldaAng*180/Math.PI);

  // --- geometria SVG ---
  var W=680,H=340;
  var scScale=42, scCx=190, scCy=150;                 // panel scatter
  var HX0=400,HX1=655,HY0=252,HY1=64;                  // panel histogram
  var RANGE=2.8, NB=22, binw=(2*RANGE)/NB;             // wspólny, stały zakres rzutu
  var el=function(id){return document.getElementById(id);};
  var slider=el("v12-a"), pcaBtn=el("v12-pca"), ldaBtn=el("v12-lda");

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),AX=cvar("--v-axis"),
        BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),AM=cvar("--v-amber"),BG=cvar("--bg2");
    var deg=parseInt(slider.value,10), a=deg*Math.PI/180;
    var isPca=Math.abs(deg-pcaDeg)<=0, isLda=Math.abs(deg-ldaDeg)<=0;
    var axCol = isPca?TE : (isLda?AM : INK2);
    var axName = isPca?"PC1 — maks. wariancja" : (isLda?"oś LDA — maks. separacja" : "oś ręczna α="+deg+"°");

    // ---- panel 1: scatter ----
    svg.appendChild(E("text",{x:44,y:34,"font-size":11.5,"font-weight":700,fill:INK},"Dwie klasy w 2D"));
    // osie pomocnicze
    svg.appendChild(E("line",{x1:scCx-150,y1:scCy,x2:scCx+150,y2:scCy,stroke:GRID,"stroke-width":1}));
    svg.appendChild(E("line",{x1:scCx,y1:scCy-118,x2:scCx,y2:scCy+118,stroke:GRID,"stroke-width":1}));
    // oś rzutu (kierunek w danych -> ekran z odbiciem y)
    var dxs=Math.cos(a), dys=-Math.sin(a), Lp=2.7*scScale;
    svg.appendChild(E("line",{x1:scCx-dxs*Lp,y1:scCy-dys*Lp,x2:scCx+dxs*Lp,y2:scCy+dys*Lp,stroke:axCol,"stroke-width":2.4,"stroke-linecap":"round"}));
    // grot
    var hx=scCx+dxs*Lp, hy=scCy+dys*Lp, ph=6;
    svg.appendChild(E("path",{d:"M"+hx+" "+hy+"L"+(hx-dxs*11-dys*ph)+" "+(hy-dys*11+dxs*ph)+"L"+(hx-dxs*11+dys*ph)+" "+(hy-dys*11-dxs*ph)+"Z",fill:axCol}));
    svg.appendChild(E("text",{x:hx+dxs*4,y:hy+dys*4+(dys>=0?14:-8),"text-anchor":"middle","font-size":10.5,"font-weight":700,fill:axCol},"oś rzutu"));
    // punkty: klasa A = koło (blue), klasa B = kwadrat (orange)
    function px(p){return scCx+p[0]*scScale;}
    function py(p){return scCy-p[1]*scScale;}
    var i;
    for(i=0;i<clsA.length;i++)svg.appendChild(E("circle",{cx:px(clsA[i]).toFixed(1),cy:py(clsA[i]).toFixed(1),r:3.4,fill:BL,opacity:.9}));
    for(i=0;i<clsB.length;i++)svg.appendChild(E("rect",{x:(px(clsB[i])-3).toFixed(1),y:(py(clsB[i])-3).toFixed(1),width:6,height:6,fill:OR,opacity:.9}));
    // rzuty jako stopki na osi (pokazują kolaps do 1D)
    for(i=0;i<clsA.length;i++){var tA=clsA[i][0]*Math.cos(a)+clsA[i][1]*Math.sin(a);
      svg.appendChild(E("circle",{cx:(scCx+dxs*tA*scScale).toFixed(1),cy:(scCy+dys*tA*scScale).toFixed(1),r:1.8,fill:BL,opacity:.5}));}
    for(i=0;i<clsB.length;i++){var tB=clsB[i][0]*Math.cos(a)+clsB[i][1]*Math.sin(a);
      svg.appendChild(E("circle",{cx:(scCx+dxs*tB*scScale).toFixed(1),cy:(scCy+dys*tB*scScale).toFixed(1),r:1.8,fill:OR,opacity:.5}));}
    // legenda
    svg.appendChild(E("circle",{cx:52,cy:322,r:3.4,fill:BL}));
    svg.appendChild(E("text",{x:60,y:325,"font-size":10.5,fill:INK2},"Klasa A"));
    svg.appendChild(E("rect",{x:118,y:319,width:6,height:6,fill:OR}));
    svg.appendChild(E("text",{x:128,y:325,"font-size":10.5,fill:INK2},"Klasa B"));

    // ---- panel 2: histogram rzutów ----
    // liczenie binów
    var hA=new Array(NB), hB=new Array(NB);
    for(i=0;i<NB;i++){hA[i]=0;hB[i]=0;}
    function bin(t){var idx=Math.floor((t+RANGE)/binw);return idx<0?0:(idx>=NB?NB-1:idx);}
    var pA=[],pB=[];
    for(i=0;i<clsA.length;i++){var t=clsA[i][0]*Math.cos(a)+clsA[i][1]*Math.sin(a);pA.push(t);hA[bin(t)]++;}
    for(i=0;i<clsB.length;i++){var t2=clsB[i][0]*Math.cos(a)+clsB[i][1]*Math.sin(a);pB.push(t2);hB[bin(t2)]++;}
    var mx=1;for(i=0;i<NB;i++){if(hA[i]>mx)mx=hA[i];if(hB[i]>mx)mx=hB[i];}
    var bw=(HX1-HX0)/NB, hh=HY0-HY1;
    svg.appendChild(E("text",{x:HX0,y:34,"font-size":11.5,"font-weight":700,fill:INK},"Histogram rzutu na oś ("+axName.split(" — ")[0]+")"));
    // ramka / baseline
    svg.appendChild(E("line",{x1:HX0,y1:HY0,x2:HX1,y2:HY0,stroke:AX,"stroke-width":1.3}));
    // linia zero rzutu
    var zx=HX0+((0+RANGE)/(2*RANGE))*(HX1-HX0);
    svg.appendChild(E("line",{x1:zx,y1:HY1,x2:zx,y2:HY0,stroke:GRID,"stroke-width":1,"stroke-dasharray":"3 3"}));
    for(i=0;i<NB;i++){
      var bx=HX0+i*bw;
      if(hA[i]>0){var ha=hA[i]/mx*hh;svg.appendChild(E("rect",{x:(bx+0.6).toFixed(1),y:(HY0-ha).toFixed(1),width:(bw-1.2).toFixed(1),height:ha.toFixed(1),fill:BL,"fill-opacity":.55}));}
      if(hB[i]>0){var hb=hB[i]/mx*hh;svg.appendChild(E("rect",{x:(bx+0.6).toFixed(1),y:(HY0-hb).toFixed(1),width:(bw-1.2).toFixed(1),height:hb.toFixed(1),fill:OR,"fill-opacity":.55,stroke:OR,"stroke-width":.6,"stroke-opacity":.5}));}
    }
    svg.appendChild(E("text",{x:(HX0+HX1)/2,y:HY0+18,"text-anchor":"middle","font-size":10.5,fill:MUT},"współrzędna na osi rzutu →"));

    // --- statystyki Fishera na rzucie 1D ---
    function mv(arr){var s=0,j;for(j=0;j<arr.length;j++)s+=arr[j];var m=s/arr.length,v=0;for(j=0;j<arr.length;j++)v+=(arr[j]-m)*(arr[j]-m);return [m,v/arr.length];}
    var sa=mv(pA), sb=mv(pB);
    var J=(sa[0]-sb[0])*(sa[0]-sb[0])/(sa[1]+sb[1]+1e-9);
    var sep = J<0.3 ? "klasy się NAKŁADAJĄ" : (J>1.2 ? "klasy ROZDZIELONE" : "częściowa separacja");
    el("v12-av").textContent=deg+"°";
    el("v12-j").textContent=J.toFixed(2);
    var sepEl=el("v12-sep"); sepEl.textContent=sep; sepEl.style.color = J<0.3?OR:(J>1.2?TE:INK2);
    pcaBtn.setAttribute("aria-pressed", isPca?"true":"false");
    ldaBtn.setAttribute("aria-pressed", isLda?"true":"false");
  }

  function setDeg(d){slider.value=d;render();}
  slider.addEventListener("input",render);
  function bind(btn,d){
    btn.addEventListener("click",function(){setDeg(d);});
    btn.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();setDeg(d);}});
  }
  bind(pcaBtn,pcaDeg); bind(ldaBtn,ldaDeg);
  document.addEventListener("themechange",render);
  render();
})();
</script>
