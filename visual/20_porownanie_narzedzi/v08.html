<figure class="viz" id="v08">
  <div class="viz-head">
    <p class="viz-title">Krajobraz narzędzi: skala danych × latencja</p>
    <p class="viz-sub">Rejony tła to paradygmaty (nie jedna diagonalna strzałka). Najedź na narzędzie lub kafelek, aby zobaczyć opis i typowe zastosowanie. Przełącznik przyciemnia nieistotne rejony.</p>
  </div>
  <div class="viz-body">
    <svg id="v08-svg" viewBox="0 0 680 340" role="img" aria-label="Mapa pozycyjna narzędzi przetwarzania danych na osiach skala danych i latencja"></svg>
  </div>
  <div class="viz-controls">
    <span class="toggle" id="v08-all" role="button" tabindex="0" aria-pressed="true">Wszystko</span>
    <span class="toggle" id="v08-batch" role="button" tabindex="0" aria-pressed="false">Batch</span>
    <span class="toggle" id="v08-stream" role="button" tabindex="0" aria-pressed="false">Real-time / streaming</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)" id="v08-readout">Najedź na narzędzie lub rejon…</span>
  </div>
  <figcaption><b>Sedno:</b> wybór narzędzia to dwie niezależne osie — <b>skala danych</b> (single-node GB → rozproszony klaster PB) i <b>latencja</b> (batch: minuty–godziny → OLTP/streaming: milisekundy). Każdy paradygmat zajmuje swój rejon; nie ma jednego „lepszego” kierunku, jest dopasowanie do wymagań.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v08-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}

  var W=680,H=340,L=54,R=16,T=16,B=44;
  var x0=L,x1=W-R,y0=H-B,y1=T;
  function mx(sx){return x0+sx/10*(x1-x0);}      // skala 0..10 (single-node → rozproszony)
  function my(sy){return y0-sy/10*(y0-y1);}       // latencja 0 (batch, dół) .. 10 (real-time, góra)

  var mode="all"; // all | batch | stream

  // Rejony (paradygmaty) — kolory wyłącznie z tokenów
  var regions=[
    {sx0:0,   sx1:4,  sy0:0,   sy1:4.2, tok:"--v-blue",   mode:"batch",  label:"Single-node in-memory", sub:"pandas · Polars · DuckDB"},
    {sx0:4.2, sx1:10, sy0:0,   sy1:3.5, tok:"--v-orange", mode:"batch",  label:"Rozproszony batch",     sub:"Spark · MapReduce"},
    {sx0:4.2, sx1:10, sy0:3.7, sy1:6.6, tok:"--v-teal",   mode:"batch",  label:"Hurtownia MPP / OLAP",  sub:"BigQuery · Snowflake · ClickHouse"},
    {sx0:4.2, sx1:10, sy0:6.8, sy1:10,  tok:"--v-amber",  mode:"stream", label:"Streaming",             sub:"Flink · Kafka Streams"},
    {sx0:0,   sx1:4,  sy0:6.8, sy1:10,  tok:"--v-blue",   mode:"stream", label:"OLTP / RDBMS",          sub:"PostgreSQL · NewSQL"}
  ];

  // Narzędzia (punkty) — sx skala, sy latencja
  var tools=[
    {sx:0.9, sy:1.6, tok:"--v-blue",   mode:"batch",  short:"pandas",     name:"pandas / R",            use:"in-memory <10 GB, eksploracja i prototypy"},
    {sx:2.9, sy:2.9, tok:"--v-blue",   mode:"batch",  short:"DuckDB",     name:"DuckDB / Polars",       use:"kolumnowy 10 GB–1 TB, OLAP bez klastra"},
    {sx:4.6, sy:1.5, tok:"--v-orange", mode:"batch",  short:"Dask",       name:"Dask / Ray",            use:"out-of-core, dane > RAM, niski budżet"},
    {sx:6.9, sy:2.1, tok:"--v-orange", mode:"batch",  short:"Spark",      name:"Apache Spark",          use:"TB–PB ETL, MLlib; DAG + in-memory RDD"},
    {sx:8.9, sy:0.8, tok:"--v-orange", mode:"batch",  short:"MapReduce",  name:"Hadoop MapReduce",      use:"legacy: shuffle & sort, checkpoint na HDFS"},
    {sx:5.3, sy:5.2, tok:"--v-teal",   mode:"batch",  short:"ClickHouse", name:"ClickHouse",            use:"vectorized SIMD, sub-sekundowe OLAP"},
    {sx:7.9, sy:5.0, tok:"--v-teal",   mode:"batch",  short:"BigQuery",   name:"BigQuery / Snowflake",  use:"MPP SQL i BI, separacja compute/storage"},
    {sx:5.0, sy:7.4, tok:"--v-amber",  mode:"stream", short:"Spark SS",   name:"Spark Structured Streaming", use:"micro-batch, latencja ~sekundy"},
    {sx:7.1, sy:8.8, tok:"--v-amber",  mode:"stream", short:"Flink",      name:"Apache Flink",          use:"true streaming, watermarks, exactly-once"},
    {sx:8.9, sy:9.2, tok:"--v-amber",  mode:"stream", short:"Kafka",      name:"Kafka Streams",         use:"event-driven, CEP, latencja <1 s"},
    {sx:1.4, sy:8.6, tok:"--v-blue",   mode:"stream", short:"Postgres",   name:"PostgreSQL",            use:"OLTP wierszowy, ACID, latencja <10 ms"},
    {sx:3.4, sy:8.4, tok:"--v-blue",   mode:"stream", short:"NewSQL",     name:"Spanner / CockroachDB", use:"rozproszone OLTP z gwarancjami ACID"}
  ];

  var tip=null; // grupa tooltipa (rysowana na wierzchu)

  function dim(m){return mode!=="all"&&m!==mode;}

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),
        GRID=cvar("--v-grid"),AX=cvar("--v-axis"),BG=cvar("--bg2");

    // delikatne linie odniesienia
    for(var g=2;g<=8;g+=2){
      svg.appendChild(E("line",{x1:mx(g),y1:y1,x2:mx(g),y2:y0,stroke:GRID,"stroke-width":1,opacity:.5}));
      svg.appendChild(E("line",{x1:x0,y1:my(g),x2:x1,y2:my(g),stroke:GRID,"stroke-width":1,opacity:.5}));
    }

    // rejony tła
    regions.forEach(function(rg){
      var col=cvar(rg.tok), d=dim(rg.mode);
      var rx=mx(rg.sx0), ry=my(rg.sy1), rw=mx(rg.sx1)-mx(rg.sx0), rh=my(rg.sy0)-my(rg.sy1);
      var r=E("rect",{x:rx+2,y:ry+2,width:rw-4,height:rh-4,rx:9,fill:col,"fill-opacity":d?.04:.13,
                      stroke:col,"stroke-opacity":d?.18:.55,"stroke-width":1.3});
      r.style.cursor="default";
      r.addEventListener("mouseenter",function(){readout(rg.label+" — "+rg.sub);});
      r.addEventListener("mouseleave",function(){readout(null);});
      svg.appendChild(r);
      svg.appendChild(E("text",{x:rx+11,y:ry+18,"font-size":11.5,"font-weight":700,
                      fill:d?MUT:INK,"fill-opacity":d?.5:1},rg.label));
      svg.appendChild(E("text",{x:rx+11,y:ry+31,"font-size":9.5,fill:col,"fill-opacity":d?.4:.95},rg.sub));
    });

    // osie
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x1,y2:y0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x0,y2:y1,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("text",{x:(x0+x1)/2,y:H-10,"text-anchor":"middle","font-size":11,fill:MUT},
                    "skala danych:  single-node (GB)  →  rozproszony klaster (PB)"));
    var yl=E("text",{x:16,y:(y0+y1)/2,"text-anchor":"middle","font-size":11,fill:MUT,
                    transform:"rotate(-90 16 "+((y0+y1)/2).toFixed(1)+")"},"latencja:  batch (min–godz)  →  real-time (ms)");
    svg.appendChild(yl);

    // punkty narzędzi
    tools.forEach(function(tl,i){
      var col=cvar(tl.tok), d=dim(tl.mode), px=mx(tl.sx), py=my(tl.sy);
      var c=E("circle",{cx:px,cy:py,r:6,fill:col,"fill-opacity":d?.22:1,stroke:BG,"stroke-width":2,
                        tabindex:"0",role:"img","aria-label":tl.name+": "+tl.use});
      c.style.cursor="pointer";
      c.style.outline="none";
      c.addEventListener("mouseenter",function(){showTip(i);});
      c.addEventListener("mouseleave",function(){hideTip();});
      c.addEventListener("focus",function(){showTip(i);});
      c.addEventListener("blur",function(){hideTip();});
      svg.appendChild(c);
      svg.appendChild(E("text",{x:px,y:py+16,"text-anchor":"middle","font-size":9.5,"font-weight":600,
                      fill:d?MUT:INK2,"fill-opacity":d?.45:1,"pointer-events":"none"},tl.short));
    });

    tip=E("g",{"pointer-events":"none"});
    svg.appendChild(tip);
  }

  function readout(txt){
    document.getElementById("v08-readout").textContent=txt||"Najedź na narzędzie lub rejon…";
  }

  function showTip(i){
    hideTip();
    var tl=tools[i], INK=cvar("--ink"),MUT=cvar("--muted"),BG=cvar("--bg2"),RULE=cvar("--rule"),col=cvar(tl.tok);
    var px=mx(tl.sx), py=my(tl.sy);
    var lines=[tl.name,tl.use];
    var w=Math.max(tl.name.length*6.4, tl.use.length*5.5)+18, h=36;
    var tx=Math.max(x0, Math.min(px-w/2, x1-w));
    var ty=py-h-11; if(ty<y1) ty=py+13;
    tip.appendChild(E("rect",{x:tx,y:ty,width:w,height:h,rx:7,fill:BG,stroke:RULE,"stroke-width":1.2,
                    style:"filter:drop-shadow(0 2px 5px rgba(0,0,0,.18))"}));
    tip.appendChild(E("rect",{x:tx,y:ty,width:3.5,height:h,rx:1.5,fill:col}));
    tip.appendChild(E("text",{x:tx+11,y:ty+15,"font-size":11,"font-weight":700,fill:INK},lines[0]));
    tip.appendChild(E("text",{x:tx+11,y:ty+29,"font-size":10,fill:MUT},lines[1]));
    readout(tl.name+" — "+tl.use);
  }
  function hideTip(){while(tip.firstChild)tip.removeChild(tip.firstChild);readout(null);}

  var btns={all:document.getElementById("v08-all"),batch:document.getElementById("v08-batch"),stream:document.getElementById("v08-stream")};
  function setMode(m){
    mode=m;
    for(var k in btns)btns[k].setAttribute("aria-pressed",k===m?"true":"false");
    render();
  }
  Object.keys(btns).forEach(function(k){
    btns[k].addEventListener("click",function(){setMode(k);});
    btns[k].addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();setMode(k);}});
  });

  document.addEventListener("themechange",render);
  render();
})();
</script>
