<figure class="viz" id="v17">
  <div class="viz-head">
    <p class="viz-title">Podpis cyfrowy: prywatny podpisuje, publiczny weryfikuje</p>
    <p class="viz-sub">Uproszczony liczbowy przykład RSA pokazuje kolejność działań, nie wzory do zapamiętania. Przechodź krok po kroku; włącz „manipulację”, by zobaczyć, dlaczego zmieniony dokument nie przechodzi weryfikacji.</p>
  </div>
  <div class="viz-body">
    <svg id="v17-svg" viewBox="0 0 680 340" role="img" aria-label="Diagram sekwencji podpisu cyfrowego: nadawca liczy hash i podpisuje kluczem prywatnym, odbiorca weryfikuje kluczem publicznym"></svg>
  </div>
  <div class="viz-controls">
    <label>Krok
      <input id="v17-step" type="range" min="1" max="6" step="1" value="1">
      <span class="val" id="v17-stepv">1 / 6</span>
    </label>
    <span class="toggle" id="v17-tamp" role="button" tabindex="0" aria-pressed="false">Manipulacja wiadomością</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)" id="v17-desc">–</span>
  </div>
  <figcaption><b>Sedno:</b> klucz publiczny odwraca operację prywatnego (\(\sigma^e \equiv h(m)^{ed} \equiv h(m)\)), więc zgodność skrótów daje integralność, autentyczność i niezaprzeczalność; zmiana choćby bitu wiadomości zmienia \(h(m')\) i podpis zostaje odrzucony.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v17-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}

  var cxL=155, cxR=525, bxL=55, bxR=425, BW=200;
  // stała, poprawna arytmetyka toy-RSA (patrz podpis figury)
  var HM=4, SIG=49, REC=4; // h(m)=4, sigma=4^27 mod55=49, sigma^3 mod55=4

  function box(x,y,w,h,color,active,shown,lines){
    var g=E("g",{opacity:shown?1:0.24});
    g.appendChild(E("rect",{x:x,y:y,width:w,height:h,rx:7,fill:cvar("--bg2"),stroke:color,"stroke-width":active?2.6:1.4}));
    if(active) g.appendChild(E("rect",{x:x,y:y,width:4,height:h,rx:2,fill:color}));
    for(var i=0;i<lines.length;i++){
      var ln=lines[i];
      g.appendChild(E("text",{x:x+13,y:y+17+i*16,"font-size":ln.mono?11.5:12,
        "font-family":ln.mono?cvar("--mono"):"inherit","font-weight":ln.bold?700:400,
        fill:ln.fill||cvar("--ink")},ln.t));
    }
    svg.appendChild(g);
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var step=parseInt(document.getElementById("v17-step").value,10);
    var tamp=document.getElementById("v17-tamp").getAttribute("aria-pressed")==="true";
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),AX=cvar("--v-axis"),
        BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),AM=cvar("--v-amber"),BG=cvar("--bg2");
    var rh = tamp?9:4;                 // hash policzony przez odbiorcę
    var accept = (REC===rh);           // weryfikacja: odzyskany skrót == własny skrót
    var vcol = accept?TE:OR;

    // arrowhead
    var defs=E("defs",{}); var mk=E("marker",{id:"v17-ah",markerWidth:8,markerHeight:8,refX:6.5,refY:3,orient:"auto"});
    mk.appendChild(E("path",{d:"M0 0L7 3L0 6Z",fill:INK2})); defs.appendChild(mk); svg.appendChild(defs);

    // aktorzy + linie życia
    [[cxL,"NADAWCA"],[cxR,"ODBIORCA"]].forEach(function(a){
      svg.appendChild(E("rect",{x:a[0]-62,y:12,width:124,height:26,rx:6,fill:BG,stroke:AX,"stroke-width":1.4}));
      svg.appendChild(E("text",{x:a[0],y:29,"text-anchor":"middle","font-size":12.5,"font-weight":700,fill:INK},a[1]));
      svg.appendChild(E("line",{x1:a[0],y1:42,x2:a[0],y2:264,stroke:AX,"stroke-width":1.2,"stroke-dasharray":"4 5",opacity:.7}));
    });

    // KROK 1 — hash nadawcy
    box(bxL,52,BW,34,TE,step===1,step>=1,[
      {t:"1 · Hash wiadomości",bold:true,fill:TE},
      {t:"h(m) = "+HM,mono:true}
    ]);
    // KROK 2 — podpis kluczem PRYWATNYM
    box(bxL,94,BW,50,OR,step===2,step>=2,[
      {t:"2 · Podpis — klucz PRYWATNY",bold:true,fill:OR},
      {t:"σ = h(m)^d mod N",mono:true},
      {t:"= 4^27 mod 55 = "+SIG,mono:true}
    ]);
    // KROK 3 — transmisja (m, σ)
    svg.appendChild(E("line",{x1:cxL,y1:157,x2:cxR-7,y2:157,stroke:INK2,"stroke-width":1.8,
      "marker-end":"url(#v17-ah)",opacity:step>=3?1:0.24}));
    svg.appendChild(E("text",{x:(cxL+cxR)/2,y:150,"text-anchor":"middle","font-size":11.5,"font-weight":700,
      fill:INK,opacity:step>=3?1:0.24},"3 · wyślij (m, σ)"));
    if(step>=3 && tamp){
      svg.appendChild(E("text",{x:(cxL+cxR)/2,y:172,"text-anchor":"middle","font-size":11,"font-weight":700,fill:OR},
        "⚠ wiadomość zmieniona w kanale"));
    }
    // KROK 4 — hash odebranej wiadomości
    box(bxR,182,BW,34,tamp?OR:TE,step===4,step>=4,[
      {t:"4 · Hash odebranej wiad.",bold:true,fill:tamp?OR:TE},
      {t:"h(m') = "+rh+(tamp?"  (≠ oryginału)":""),mono:true,fill:tamp?OR:cvar("--ink")}
    ]);
    // KROK 5 — weryfikacja kluczem PUBLICZNYM
    box(bxR,224,BW,50,BL,step===5,step>=5,[
      {t:"5 · Weryfikacja — klucz PUBLICZNY",bold:true,fill:BL},
      {t:"σ^e mod N",mono:true},
      {t:"= 49^3 mod 55 = "+REC,mono:true}
    ]);

    // KROK 6 — werdykt + triada
    var vy=284, vh=48;
    if(step>=6){
      svg.appendChild(E("rect",{x:bxL,y:vy,width:570,height:vh,rx:7,fill:BG,stroke:vcol,"stroke-width":2.4}));
      svg.appendChild(E("rect",{x:bxL,y:vy,width:5,height:vh,rx:2,fill:vcol}));
      svg.appendChild(E("text",{x:bxL+16,y:vy+20,"font-size":11.5,"font-family":cvar("--mono"),fill:INK2},
        "σ^e mod N = "+REC+"   vs   h(m') = "+rh));
      svg.appendChild(E("text",{x:bxL+560,y:vy+20,"text-anchor":"end","font-size":13.5,"font-weight":800,fill:vcol},
        accept?"✓ ZGODNE — podpis WAŻNY":"✗ NIEZGODNE — podpis ODRZUCONY"));
      var tri=["integralność","autentyczność","niezaprzeczalność"], xs=[bxL+16,bxL+215,bxL+405];
      for(var i=0;i<3;i++){
        svg.appendChild(E("text",{x:xs[i],y:vy+40,"font-size":11.5,"font-weight":700,fill:vcol},
          (accept?"✓ ":"✗ ")+tri[i]));
      }
    } else {
      svg.appendChild(E("rect",{x:bxL,y:vy,width:570,height:vh,rx:7,fill:"none",stroke:AX,"stroke-width":1.2,
        "stroke-dasharray":"5 5",opacity:.55}));
      svg.appendChild(E("text",{x:(bxL+625)/2,y:vy+28,"text-anchor":"middle","font-size":12,fill:MUT},
        "6 · Werdykt: porównanie skrótów (przejdź do kroku 6)"));
    }

    // odczyt na żywo
    document.getElementById("v17-stepv").textContent=step+" / 6";
    var desc=["Nadawca liczy skrót h(m) wiadomości.",
      "Nadawca szyfruje skrót kluczem PRYWATNYM → podpis σ.",
      "Kanałem jawnym idą wiadomość i podpis (m, σ).",
      "Odbiorca liczy własny skrót h(m') odebranej wiadomości.",
      "Odbiorca odszyfrowuje σ kluczem PUBLICZNYM → odzyskuje skrót nadawcy.",
      accept?"Skróty zgodne → integralność + autentyczność + niezaprzeczalność."
             :"Skróty niezgodne → integralność złamana, weryfikacja PADA."][step-1];
    document.getElementById("v17-desc").textContent=desc;
  }

  document.getElementById("v17-step").addEventListener("input",render);
  var tg=document.getElementById("v17-tamp");
  function toggleTamp(){tg.setAttribute("aria-pressed",tg.getAttribute("aria-pressed")==="true"?"false":"true");render();}
  tg.addEventListener("click",toggleTamp);
  tg.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();toggleTamp();}});
  document.addEventListener("themechange",render);
  render();
})();
</script>
