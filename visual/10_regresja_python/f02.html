<figure class="viz" id="f02">
  <div class="viz-head">
    <p class="viz-title">MSE vs MAE — jak reszty ciągną prostą: OLS kontra odporny LAD</p>
    <p class="viz-sub">OLS minimalizuje Σeᵢ² (kwadraty), więc duża reszta liczy się nieproporcjonalnie mocno; LAD minimalizuje Σ|eᵢ| (wartości bezwzględne) i traktuje błędy liniowo. Przeciągnij pomarańczowy outlier w pionie (albo użyj suwaka) i patrz, jak prosta OLS goni outlier, a odporna prosta LAD prawie nie drgnie.</p>
  </div>
  <div class="viz-body">
    <svg id="f02-svg" viewBox="0 0 680 340" role="img" aria-label="Chmura punktów z dwiema dopasowanymi prostymi: wrażliwa na outliery prosta OLS (min sumy kwadratów reszt) i odporna prosta LAD (min sumy wartości bezwzględnych reszt); ruchomy outlier przeciąga prostą OLS w swoją stronę"></svg>
  </div>
  <div class="viz-controls">
    <label>Położenie outliera (y)
      <input id="f02-oy" type="range" min="0.5" max="10.5" step="0.1" value="9.6">
      <span class="val" id="f02-oyv">9.6</span>
    </label>
    <span class="toggle" id="f02-res" role="button" tabindex="0" aria-pressed="false">Pokaż reszty do obu prostych</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      <b style="color:var(--v-orange)">OLS</b> Σe²=<b id="f02-ols-sse">–</b> · Σ|e|=<span id="f02-ols-sae">–</span>
      &nbsp;·&nbsp;
      <b style="color:var(--v-teal)">LAD</b> Σe²=<span id="f02-lad-sse">–</span> · Σ|e|=<b id="f02-lad-sae">–</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> ponieważ kwadrat karze duże reszty o wiele mocniej niż moduł, jeden outlier dominuje kryterium OLS i przeciąga prostą w swoją stronę — LAD (Σ|e|) jest znacznie odporniejszy, bo koszt rośnie tylko liniowo.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f02-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  var W=680,H=340,L=44,R=20,T=18,B=42, x0=L,x1=W-R,y0=H-B,y1=T, xmax=10, ymax=11;
  var cx=function(x){return x0+x/xmax*(x1-x0);};
  var cy=function(v){return y0-v/ymax*(y0-y1);};
  var invy=function(py){return (y0-py)/(y0-y1)*ymax;};

  // 6 inlierów blisko prostej + 1 ruchomy outlier o stałym x
  var INL=[[1.0,1.9],[2.2,3.0],[3.4,4.1],[5.0,5.6],[6.4,7.0],[8.6,8.9]];
  var OX=4.5;

  // dopasowanie OLS (min Σe²) — postać zamknięta
  function ols(P){
    var n=P.length,sx=0,sy=0,sxy=0,sxx=0,i;
    for(i=0;i<n;i++){sx+=P[i][0];sy+=P[i][1];sxy+=P[i][0]*P[i][1];sxx+=P[i][0]*P[i][0];}
    var b=(sxy-sx*sy/n)/(sxx-sx*sx/n), a=sy/n-b*sx/n;
    return {a:a,b:b};
  }
  // ważone LS (pomocnicze dla IRLS)
  function wls(P,w){
    var n=P.length,Sw=0,Swx=0,Swy=0,Swxx=0,Swxy=0,i,wi,xi,yi;
    for(i=0;i<n;i++){wi=w[i];xi=P[i][0];yi=P[i][1];
      Sw+=wi;Swx+=wi*xi;Swy+=wi*yi;Swxx+=wi*xi*xi;Swxy+=wi*xi*yi;}
    var den=Sw*Swxx-Swx*Swx;
    if(Math.abs(den)<1e-12) return ols(P);
    var b=(Sw*Swxy-Swx*Swy)/den, a=(Swy-b*Swx)/Sw;
    return {a:a,b:b};
  }
  // LAD (min Σ|e|) przez iteracyjnie ważone najmniejsze kwadraty: w_i = 1/|e_i|
  function lad(P){
    var f=ols(P),w=[],i,e,it;
    for(it=0;it<60;it++){
      for(i=0;i<P.length;i++){e=P[i][1]-(f.a+f.b*P[i][0]);w[i]=1/Math.max(Math.abs(e),1e-3);}
      f=wls(P,w);
    }
    return f;
  }
  function sse(P,f){var s=0,i,e;for(i=0;i<P.length;i++){e=P[i][1]-(f.a+f.b*P[i][0]);s+=e*e;}return s;}
  function sae(P,f){var s=0,i;for(i=0;i<P.length;i++){s+=Math.abs(P[i][1]-(f.a+f.b*P[i][0]));}return s;}

  var slider=document.getElementById("f02-oy"),
      resT=document.getElementById("f02-res");

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var showRes=resT.getAttribute("aria-pressed")==="true";
    var oy=parseFloat(slider.value);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),
        AM=cvar("--v-amber"),BG=cvar("--bg2");
    var all=INL.concat([[OX,oy]]);
    var fO=ols(all), fL=lad(all);

    // siatka + osie
    var g;
    for(g=0;g<=ymax;g+=2){svg.appendChild(E("line",{x1:x0,y1:cy(g),x2:x1,y2:cy(g),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:x0-8,y:cy(g)+4,"text-anchor":"end","font-size":10,fill:MUT},String(g)));}
    for(g=0;g<=xmax;g+=2){svg.appendChild(E("text",{x:cx(g),y:y0+16,"text-anchor":"middle","font-size":10,fill:MUT},String(g)));}
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x1,y2:y0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x0,y2:y1,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("text",{x:(x0+x1)/2,y:H-6,"text-anchor":"middle","font-size":11,fill:MUT},"x"));

    // opcjonalne reszty do obu prostych
    if(showRes){
      var j,P,x,y,yhO,yhL;
      for(j=0;j<all.length;j++){
        P=all[j];x=P[0];y=P[1];yhO=fO.a+fO.b*x;yhL=fL.a+fL.b*x;
        svg.appendChild(E("line",{x1:cx(x)-2.5,y1:cy(y),x2:cx(x)-2.5,y2:cy(yhO),stroke:OR,"stroke-width":1.4,opacity:.55}));
        svg.appendChild(E("line",{x1:cx(x)+2.5,y1:cy(y),x2:cx(x)+2.5,y2:cy(yhL),stroke:TE,"stroke-width":1.4,opacity:.55}));
      }
    }

    // prosta LAD (odporna) — rysowana pod OLS
    svg.appendChild(E("line",{x1:cx(0),y1:cy(fL.a),x2:cx(xmax),y2:cy(fL.a+fL.b*xmax),
      stroke:TE,"stroke-width":2.6,"stroke-linecap":"round","stroke-dasharray":"7 4"}));
    // prosta OLS (wrażliwa)
    svg.appendChild(E("line",{x1:cx(0),y1:cy(fO.a),x2:cx(xmax),y2:cy(fO.a+fO.b*xmax),
      stroke:OR,"stroke-width":2.8,"stroke-linecap":"round"}));

    // punkty
    var i,Q,isOut;
    for(i=0;i<all.length;i++){
      Q=all[i];isOut=(i===all.length-1);
      svg.appendChild(E("circle",{cx:cx(Q[0]),cy:cy(Q[1]),r:isOut?7:5,
        fill:isOut?AM:BL,stroke:BG,"stroke-width":2,
        style:isOut?"cursor:ns-resize":""}));
    }
    svg.appendChild(E("text",{x:cx(OX),y:cy(oy)-12,"text-anchor":"middle","font-size":10.5,"font-weight":700,fill:AM},"outlier ↕"));

    // legenda
    var lx=x0+12, ly=T+8;
    svg.appendChild(E("rect",{x:lx-6,y:ly-6,width:206,height:44,rx:6,fill:BG,stroke:GRID,"stroke-width":1,opacity:.94}));
    svg.appendChild(E("line",{x1:lx,y1:ly+8,x2:lx+26,y2:ly+8,stroke:OR,"stroke-width":2.8,"stroke-linecap":"round"}));
    svg.appendChild(E("text",{x:lx+32,y:ly+11.5,"font-size":10.5,"font-weight":700,fill:INK2},"OLS — min Σeᵢ² (wrażliwy)"));
    svg.appendChild(E("line",{x1:lx,y1:ly+26,x2:lx+26,y2:ly+26,stroke:TE,"stroke-width":2.6,"stroke-dasharray":"7 4","stroke-linecap":"round"}));
    svg.appendChild(E("text",{x:lx+32,y:ly+29.5,"font-size":10.5,"font-weight":700,fill:INK2},"LAD — min Σ|eᵢ| (odporny)"));

    // odczyty
    document.getElementById("f02-oyv").textContent=oy.toFixed(1);
    document.getElementById("f02-ols-sse").textContent=sse(all,fO).toFixed(2);
    document.getElementById("f02-ols-sae").textContent=sae(all,fO).toFixed(2);
    document.getElementById("f02-lad-sse").textContent=sse(all,fL).toFixed(2);
    document.getElementById("f02-lad-sae").textContent=sae(all,fL).toFixed(2);
  }

  // suwak
  slider.addEventListener("input",render);
  // przełącznik reszt
  function toggleRes(){resT.setAttribute("aria-pressed",resT.getAttribute("aria-pressed")==="true"?"false":"true");render();}
  resT.addEventListener("click",toggleRes);
  resT.addEventListener("keydown",function(ev){if(ev.key===" "||ev.key==="Enter"){ev.preventDefault();toggleRes();}});

  // przeciąganie outliera w pionie
  var dragging=false;
  function toData(ev){
    var r=svg.getBoundingClientRect();
    var py=(ev.clientY-r.top)/r.height*H;
    return Math.max(0.5,Math.min(10.5,invy(py)));
  }
  function nearOutlier(ev){
    var r=svg.getBoundingClientRect();
    var px=(ev.clientX-r.left)/r.width*W, py=(ev.clientY-r.top)/r.height*H;
    var dx=px-cx(OX), dy=py-cy(parseFloat(slider.value));
    return Math.sqrt(dx*dx+dy*dy)<22;
  }
  svg.addEventListener("pointerdown",function(ev){
    if(nearOutlier(ev)){dragging=true;svg.setPointerCapture(ev.pointerId);
      slider.value=toData(ev).toFixed(1);render();ev.preventDefault();}
  });
  svg.addEventListener("pointermove",function(ev){
    if(dragging){slider.value=toData(ev).toFixed(1);render();}
  });
  function endDrag(){dragging=false;}
  svg.addEventListener("pointerup",endDrag);
  svg.addEventListener("pointercancel",endDrag);

  document.addEventListener("themechange",render);
  render();
})();
</script>
