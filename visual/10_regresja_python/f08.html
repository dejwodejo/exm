<figure class="viz" id="f08">
  <div class="viz-head">
    <p class="viz-title">„Liniowy w parametrach", nie w zmiennych</p>
    <p class="viz-sub">Dodanie cechy x² pozwala prostej regresji opisać krzywiznę. Model nadal jest liniowy, bo współczynniki występują tylko jako mnożniki cech; model staje się nieliniowy w parametrach, gdy współczynnik trafia np. do wykładnika.</p>
  </div>
  <div class="viz-body">
    <svg id="f08-svg" viewBox="0 0 700 350" role="img" aria-label="Dwa wykresy rozrzutu z dopasowanymi krzywymi: po lewej parabola ŷ = β₀ + β₁x + β₂x² opisana jako model liniowy w parametrach, po prawej krzywa wykładnicza y = β₀ e^{β₁x} opisana jako model nieliniowy w parametrach"></svg>
  </div>
  <figcaption><b>Sedno:</b> „liniowa” odnosi się do sposobu użycia współczynników, nie do kształtu wykresu. Cechy mogą zawierać potęgi, o ile współczynniki nadal tylko je mnożą i sumują.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f08-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  function mul(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}
  var W=700,H=350,T=64,B=40, xmin=0.5, xmax=5;

  function panel(ox0,ox1,accent,curveCol,ymax,f,sig,seed,title,sub,linear){
    var y0=H-B,y1=T;
    var cx=function(x){return ox0+(x-xmin)/(xmax-xmin)*(ox1-ox0);};
    var cy=function(v){return y0-v/ymax*(y0-y1);};
    var GRID=cvar("--v-grid"),AX=cvar("--v-axis"),MUT=cvar("--muted"),INK=cvar("--ink"),
        INK2=cvar("--ink2"),AC=cvar(accent),CC=cvar(curveCol),
        OK=cvar("--v-teal"),NO=cvar("--v-orange"),BG=cvar("--bg2");
    var g,i,xx,step=ymax/5;
    // siatka pozioma
    for(g=0;g<=ymax+1e-6;g+=step){
      svg.appendChild(E("line",{x1:ox0,y1:cy(g),x2:ox1,y2:cy(g),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:ox0-6,y:cy(g)+3.5,"text-anchor":"end","font-size":9,fill:MUT},String(Math.round(g))));
    }
    // etykiety x
    for(g=1;g<=5;g+=1){svg.appendChild(E("text",{x:cx(g),y:y0+15,"text-anchor":"middle","font-size":9,fill:MUT},String(g)));}
    // dopasowana krzywa
    var d="";
    for(i=0;i<=80;i++){xx=xmin+i/80*(xmax-xmin); d+=(i?"L":"M")+cx(xx).toFixed(1)+" "+cy(Math.min(ymax,f(xx))).toFixed(1);}
    svg.appendChild(E("path",{d:d,fill:"none",stroke:CC,"stroke-width":2.8,"stroke-linecap":"round","stroke-linejoin":"round"}));
    // punkty
    var r=mul(seed);
    for(i=0;i<44;i++){var x=xmin+r()*(xmax-xmin), y=f(x)+gauss(r)*sig; if(y<0)y=0; if(y>ymax)y=ymax;
      svg.appendChild(E("circle",{cx:cx(x).toFixed(1),cy:cy(y).toFixed(1),r:3,fill:AC,"fill-opacity":0.68}));}
    // osie
    svg.appendChild(E("line",{x1:ox0,y1:y0,x2:ox1,y2:y0,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("line",{x1:ox0,y1:y0,x2:ox0,y2:y1,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("text",{x:(ox0+ox1)/2,y:H-6,"text-anchor":"middle","font-size":10,fill:MUT},"x"));
    // tytuł: wzór + opis
    svg.appendChild(E("text",{x:(ox0+ox1)/2,y:T-44,"text-anchor":"middle","font-size":13,"font-weight":700,fill:INK2},title));
    var badgeCol=linear?OK:NO, badgeTxt=linear?"NADAL model liniowy":"NIE jest regresją liniową";
    svg.appendChild(E("text",{x:(ox0+ox1)/2,y:T-28,"text-anchor":"middle","font-size":10,fill:MUT},sub));
    // plakietka statusu
    var bw=linear?150:158, bh=17, bx=(ox0+ox1)/2-bw/2, by=T-24;
    svg.appendChild(E("rect",{x:bx,y:by,width:bw,height:bh,rx:8,fill:badgeCol,"fill-opacity":0.14,stroke:badgeCol,"stroke-width":1}));
    svg.appendChild(E("text",{x:(ox0+ox1)/2,y:by+12.5,"text-anchor":"middle","font-size":10,"font-weight":700,fill:badgeCol},(linear?"✓ ":"✗ ")+badgeTxt));
    // adnotacja wewnątrz panelu
    if(linear){
      svg.appendChild(E("text",{x:ox0+8,y:y1+16,"font-size":10,"font-weight":700,fill:INK},"ŷ = β₀·1 + β₁·x + β₂·x²"));
      svg.appendChild(E("text",{x:ox0+8,y:y1+30,"font-size":9.5,fill:INK2},"każde β — współczynnik przy"));
      svg.appendChild(E("text",{x:ox0+8,y:y1+43,"font-size":9.5,fill:INK2},"kolumnie X = [1, x, x²]  →  Xβ"));
    }else{
      svg.appendChild(E("text",{x:ox0+8,y:y1+16,"font-size":10,"font-weight":700,fill:INK},"y = β₀ · e^{β₁x}"));
      svg.appendChild(E("text",{x:ox0+8,y:y1+30,"font-size":9.5,fill:INK2},"β₁ tkwi w wykładniku —"));
      svg.appendChild(E("text",{x:ox0+8,y:y1+43,"font-size":9.5,fill:INK2},"nie zapiszesz tego jako Xβ"));
    }
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    // lewy panel: parabola — liniowa w β
    panel(46,336,"--v-blue","--v-teal",15,
      function(x){return 1.0+0.25*x+0.46*x*x;}, 0.85, 20260705,
      "ŷ = β₀ + β₁x + β₂x²","nieliniowa w x, ALE liniowa w β",true);
    // prawy panel: krzywa wykładnicza — nieliniowa w β
    panel(410,700-18,"--v-amber","--v-orange",25,
      function(x){return 3.6*Math.exp(0.37*x);}, 1.35, 76543210,
      "y = β₀ · e^{β₁x}","nieliniowa w parametrze β₁",false);
  }
  document.addEventListener("themechange",render);
  render();
})();
</script>
