<figure class="viz" id="f03r2">
  <div class="viz-head">
    <p class="viz-title">R²: ile wariancji y wyjaśnia model</p>
    <p class="viz-sub">Ta sama prosta zależność, coraz większy szum. Przeciągnij suwak: przy małym rozrzucie punkty leżą na prostej OLS i R² ≈ 0,99; gdy szum rośnie, chmura się rozjeżdża, prosta niewiele wyjaśnia i R² spada w stronę 0. Pasek po prawej pokazuje rozkład SStot = SSreg + SSres — R² to udział części wyjaśnionej.</p>
  </div>
  <div class="viz-body">
    <svg id="f03r2-svg" viewBox="0 0 680 360" role="img" aria-label="Wykres rozrzutu z prostą OLS i linią średniej; suwak reguluje poziom szumu, a odczyt R² zmienia się od około 0,99 przy ciasnych punktach do około 0,05 przy rozproszonej chmurze"></svg>
  </div>
  <div class="viz-controls">
    <label>Poziom szumu σ
      <input id="f03r2-noise" type="range" min="0.4" max="16" step="0.1" value="1.4">
      <span class="val" id="f03r2-noisev">1.4</span>
    </label>
    <span class="toggle" id="f03r2-mean" role="button" tabindex="0" aria-pressed="true">Pokaż linię średniej ȳ</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      <b>R² = <span id="f03r2-r2">–</span></b> · <span id="f03r2-zone">–</span>
    </span>
  </div>
  <figcaption><b>Sedno:</b> R² = SSreg/SStot = 1 − SSres/SStot to <i>udział</i> wariancji y wyjaśniony przez model — dąży do 1, gdy reszty maleją, i do 0, gdy prosta wyjaśnia tyle co sama średnia ȳ.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f03r2-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  var W=680,H=360,L=46,R=176,T=26,B=40, x0=L,x1=W-R,y0=H-B,y1=T, xmax=10, a0=2, b0=1.4, N=42;
  function mul(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}
  // stały, ziarnowany układ punktów: x jitterowany + ustalony szum jednostkowy z (skalowany przez σ)
  var X=[],Z=[],r=mul(499955),i;
  for(i=0;i<N;i++){X.push(0.3+(i+0.5)/N*9.2+(r()-0.5)*0.55); Z.push(gauss(r));}
  function ols(P){
    var n=P.length,sx=0,sy=0,sxy=0,sxx=0,k;
    for(k=0;k<n;k++){sx+=P[k][0];sy+=P[k][1];sxy+=P[k][0]*P[k][1];sxx+=P[k][0]*P[k][0];}
    var b=(sxy-sx*sy/n)/(sxx-sx*sx/n), a=sy/n-b*sx/n;
    return {a:a,b:b};
  }
  function niceNum(v){var e=Math.floor(Math.log(v)/Math.LN10),f=v/Math.pow(10,e),nf;
    if(f<1.5)nf=1;else if(f<3)nf=2;else if(f<7)nf=5;else nf=10;return nf*Math.pow(10,e);}
  var slider=document.getElementById("f03r2-noise"),
      meanBtn=document.getElementById("f03r2-mean");

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var sigma=parseFloat(slider.value);
    var showMean=meanBtn.getAttribute("aria-pressed")==="true";
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),
        AM=cvar("--v-amber"),BG=cvar("--bg2");

    // dane i dopasowanie
    var P=[],k;
    for(k=0;k<N;k++)P.push([X[k],a0+b0*X[k]+sigma*Z[k]]);
    var fit=ols(P);
    var ybar=0; for(k=0;k<N;k++)ybar+=P[k][1]; ybar/=N;
    var SStot=0,SSres=0,e;
    for(k=0;k<N;k++){SStot+=(P[k][1]-ybar)*(P[k][1]-ybar); e=P[k][1]-(fit.a+fit.b*P[k][0]); SSres+=e*e;}
    var R2=SStot>0?Math.max(0,1-SSres/SStot):0;
    var SSreg=Math.max(0,SStot-SSres);

    // dynamiczna skala y: obejmij punkty, prostą i średnią
    var lo=ybar,hi=ybar;
    for(k=0;k<N;k++){if(P[k][1]<lo)lo=P[k][1];if(P[k][1]>hi)hi=P[k][1];}
    var le=fit.a,re=fit.a+fit.b*xmax;
    lo=Math.min(lo,le,re);hi=Math.max(hi,le,re);
    var pad=(hi-lo)*0.08+0.5; lo-=pad; hi+=pad;
    var step=niceNum((hi-lo)/5);
    var tlo=Math.floor(lo/step)*step, thi=Math.ceil(hi/step)*step;
    lo=Math.min(lo,tlo); hi=Math.max(hi,thi);
    var cx=function(x){return x0+x/xmax*(x1-x0);};
    var cy=function(v){return y0-(v-lo)/(hi-lo)*(y0-y1);};

    // siatka pozioma + etykiety y
    var g;
    for(g=tlo;g<=thi+1e-9;g+=step){
      svg.appendChild(E("line",{x1:x0,y1:cy(g),x2:x1,y2:cy(g),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:x0-7,y:cy(g)+3.5,"text-anchor":"end","font-size":9.5,fill:MUT},String(Math.round(g))));
    }
    for(g=0;g<=xmax;g+=2)svg.appendChild(E("text",{x:cx(g),y:y0+15,"text-anchor":"middle","font-size":9.5,fill:MUT},String(g)));
    // osie
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x1,y2:y0,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x0,y2:y1,stroke:AX,"stroke-width":1.3}));

    // linia średniej ȳ (poziom bazowy SStot)
    if(showMean){
      svg.appendChild(E("line",{x1:x0,y1:cy(ybar),x2:x1,y2:cy(ybar),stroke:MUT,"stroke-width":1.4,"stroke-dasharray":"5 4",opacity:.85}));
      svg.appendChild(E("text",{x:x0+6,y:cy(ybar)-5,"font-size":10,fill:MUT},"ȳ = "+ybar.toFixed(1)));
    }

    // punkty
    for(k=0;k<N;k++)svg.appendChild(E("circle",{cx:cx(P[k][0]).toFixed(1),cy:cy(P[k][1]).toFixed(1),r:4,fill:BL,"fill-opacity":0.78,stroke:BG,"stroke-width":1}));
    // prosta OLS
    svg.appendChild(E("line",{x1:cx(0),y1:cy(fit.a),x2:cx(xmax),y2:cy(re),stroke:OR,"stroke-width":2.8,"stroke-linecap":"round"}));
    svg.appendChild(E("text",{x:cx(xmax)-4,y:cy(re)-7,"text-anchor":"end","font-size":10.5,"font-weight":700,fill:OR},"prosta OLS ŷ"));
    svg.appendChild(E("text",{x:(x0+x1)/2,y:H-4,"text-anchor":"middle","font-size":11,fill:MUT},"x"));
    svg.appendChild(E("text",{x:12,y:(y0+y1)/2,"text-anchor":"middle","font-size":11,fill:MUT,transform:"rotate(-90 12 "+((y0+y1)/2)+")"},"y"));

    // strefa jakości dopasowania
    var zc,zt;
    if(R2>=0.85){zc=TE;zt="Wysokie R²";}
    else if(R2>=0.40){zc=AM;zt="Średnie R²";}
    else{zc=OR;zt="Niskie R²";}

    // panel po prawej: duży odczyt R² + pasek dekompozycji SS
    var px=x1+22, pw=W-14-px;
    svg.appendChild(E("text",{x:px,y:T+8,"font-size":11,"font-weight":700,fill:INK2},"R²"));
    svg.appendChild(E("text",{x:px,y:T+40,"font-size":30,"font-weight":800,fill:zc},R2.toFixed(2)));
    svg.appendChild(E("rect",{x:px,y:T+52,width:pw,height:18,rx:4,fill:zc,"fill-opacity":0.16,stroke:zc,"stroke-width":1}));
    svg.appendChild(E("text",{x:px+pw/2,y:T+65,"text-anchor":"middle","font-size":10.5,"font-weight":700,fill:zc},zt));

    // pionowy pasek SStot = SSreg + SSres
    var bx=px+8, bw=26, bt=T+92, bh=y0-bt-6;
    var fracReg=SStot>0?SSreg/SStot:0;
    var hReg=bh*fracReg;
    svg.appendChild(E("text",{x:px,y:bt-8,"font-size":10.5,"font-weight":700,fill:INK2},"SStot"));
    // część niewyjaśniona (góra) SSres
    svg.appendChild(E("rect",{x:bx,y:bt,width:bw,height:(bh-hReg).toFixed(1),fill:MUT,"fill-opacity":0.30,stroke:MUT,"stroke-width":1}));
    // część wyjaśniona (dół) SSreg
    svg.appendChild(E("rect",{x:bx,y:(bt+bh-hReg).toFixed(1),width:bw,height:hReg.toFixed(1),fill:zc,"fill-opacity":0.55,stroke:zc,"stroke-width":1}));
    // opisy części
    var lx=bx+bw+8;
    svg.appendChild(E("text",{x:lx,y:bt+(bh-hReg)/2-2,"font-size":9.5,fill:MUT},"SSres"));
    svg.appendChild(E("text",{x:lx,y:bt+(bh-hReg)/2+9,"font-size":9,fill:MUT},"(niewyjaśn.)"));
    svg.appendChild(E("text",{x:lx,y:bt+bh-hReg/2-2,"font-size":9.5,"font-weight":700,fill:zc},"SSreg"));
    svg.appendChild(E("text",{x:lx,y:bt+bh-hReg/2+9,"font-size":9,fill:zc},"= R²·SStot"));

    // odczyty
    document.getElementById("f03r2-noisev").textContent=sigma.toFixed(1);
    document.getElementById("f03r2-r2").textContent=R2.toFixed(3);
    var zspan=document.getElementById("f03r2-zone");
    zspan.textContent=zt; zspan.style.color=zc; zspan.style.fontWeight=700;
  }

  slider.addEventListener("input",render);
  function toggleMean(){meanBtn.setAttribute("aria-pressed",meanBtn.getAttribute("aria-pressed")==="true"?"false":"true");render();}
  meanBtn.addEventListener("click",toggleMean);
  meanBtn.addEventListener("keydown",function(ev){if(ev.key===" "||ev.key==="Enter"){ev.preventDefault();toggleMean();}});
  document.addEventListener("themechange",render);
  render();
})();
</script>
