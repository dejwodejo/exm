<figure class="viz" id="f05">
  <div class="viz-head">
    <p class="viz-title">Diagnostyka reszt — dobrze vs źle</p>
    <p class="viz-sub">Cztery wykresy reszt eᵢ względem wartości dopasowanych ŷ. Zdrowy model to bezkształtna chmura wokół linii 0; każdy widoczny wzór (lejek, wygięcie, skrajne punkty) sygnalizuje złamane założenie.</p>
  </div>
  <div class="viz-body">
    <svg id="f05-svg" viewBox="0 0 700 452" role="img" aria-label="Cztery miniwykresy reszt względem wartości dopasowanych: zdrowy losowy rozrzut, heteroskedastyczność w kształcie lejka, nieliniowość w kształcie U oraz outlier z grubym ogonem"></svg>
  </div>
  <figcaption><b>Sedno:</b> wykres reszt vs ŷ to najszybszy test założeń — szukasz <i>braku</i> wzorca; lejek to heteroskedastyczność, wygięcie (U) to brak liniowości, a pojedyncze skrajne punkty to outliery / gruby ogon.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f05-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  function mul(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}
  var N=40;

  function panel(pL,pR,pT,pB,accent,kind,title,sub,ok,badge,seed){
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BG=cvar("--bg2"),AC=cvar(accent);
    var mid=(pT+pB)/2, half=(pB-pT)/2;
    var cx=function(x){return pL+x/10*(pR-pL);};
    var cy=function(v){var c=v; if(c>1)c=1; if(c<-1)c=-1; return mid-c*half;};
    var i,x,t,v;

    // tło panelu z delikatnym akcentem (dobrze/źle)
    svg.appendChild(E("rect",{x:pL-30,y:pT-40,width:(pR-pL)+42,height:(pB-pT)+62,rx:8,
      fill:AC,"fill-opacity":ok?0.055:0.045,stroke:AC,"stroke-opacity":0.35,"stroke-width":1}));

    // plakietka poprawny / problem
    var bw=badge.length*6.4+22, bx=pL-30+8, by=pT-40+8;
    svg.appendChild(E("rect",{x:bx,y:by,width:bw,height:17,rx:8.5,fill:AC,"fill-opacity":ok?0.9:0.85}));
    svg.appendChild(E("text",{x:bx+bw/2,y:by+12,"text-anchor":"middle","font-size":10,"font-weight":700,fill:BG},(ok?"✓ ":"✗ ")+badge));

    // tytuł + podtytuł
    svg.appendChild(E("text",{x:pR,y:pT-27,"text-anchor":"end","font-size":12.5,"font-weight":700,fill:INK2},title));
    svg.appendChild(E("text",{x:pR,y:pT-13,"text-anchor":"end","font-size":10,fill:MUT},sub));

    // pomocnicze linie ±½ (siatka)
    svg.appendChild(E("line",{x1:pL,y1:cy(0.5),x2:pR,y2:cy(0.5),stroke:GRID,"stroke-width":1,"stroke-dasharray":"2 4"}));
    svg.appendChild(E("line",{x1:pL,y1:cy(-0.5),x2:pR,y2:cy(-0.5),stroke:GRID,"stroke-width":1,"stroke-dasharray":"2 4"}));

    // linia zerowa (odniesienie eᵢ = 0) w kolorze panelu
    svg.appendChild(E("line",{x1:pL,y1:mid,x2:pR,y2:mid,stroke:AC,"stroke-width":2,"stroke-linecap":"round"}));

    // dla nieliniowości: przerywany trend U pod punktami
    if(kind==="nonlin"){
      var d="";
      for(i=0;i<=48;i++){t=i/48; v=0.72*(Math.pow(2*(t-0.5),2)-0.5);
        d+=(i?"L":"M")+cx(t*10).toFixed(1)+" "+cy(v).toFixed(1);}
      svg.appendChild(E("path",{d:d,fill:"none",stroke:AC,"stroke-width":1.8,"stroke-dasharray":"6 4","stroke-opacity":0.85}));
    }

    // punkty
    var r=mul(seed);
    var bigIdx={};
    if(kind==="outlier"){bigIdx={4:0.94,13:-0.9,21:0.82,33:-0.74};}
    for(i=0;i<N;i++){
      x=0.4+r()*9.2; t=x/10;
      if(kind==="ok"){ v=gauss(r)*0.30; }
      else if(kind==="hetero"){ v=gauss(r)*(0.05+0.55*t); }
      else if(kind==="nonlin"){ v=0.72*(Math.pow(2*(t-0.5),2)-0.5)+gauss(r)*0.10; }
      else { v=gauss(r)*0.15; }
      var isBig=false, ov=0;
      if(kind==="outlier"&&bigIdx.hasOwnProperty(i)){ v=bigIdx[i]; isBig=true; }
      svg.appendChild(E("circle",{cx:cx(x).toFixed(1),cy:cy(v).toFixed(1),r:isBig?4.6:3,
        fill:AC,"fill-opacity":isBig?0.95:0.7,
        stroke:isBig?BG:"none","stroke-width":isBig?1.6:0}));
      if(isBig){svg.appendChild(E("circle",{cx:cx(x).toFixed(1),cy:cy(v).toFixed(1),r:8,
        fill:"none",stroke:AC,"stroke-width":1.4,"stroke-opacity":0.6}));}
    }

    // osie ramki
    svg.appendChild(E("line",{x1:pL,y1:pT,x2:pL,y2:pB,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("line",{x1:pL,y1:pB,x2:pR,y2:pB,stroke:AX,"stroke-width":1.3}));

    // podpisy osi
    svg.appendChild(E("text",{x:pL-8,y:mid+3.5,"text-anchor":"end","font-size":10,fill:MUT},"0"));
    svg.appendChild(E("text",{x:pL-20,y:mid,"text-anchor":"middle","font-size":10,fill:MUT,
      transform:"rotate(-90 "+(pL-20)+" "+mid+")"},"reszty eᵢ"));
    svg.appendChild(E("text",{x:(pL+pR)/2,y:pB+16,"text-anchor":"middle","font-size":10,fill:MUT},"wartości dopasowane ŷ"));
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    // wiersz górny
    panel(52,336,58,200,"--v-teal","ok",
      "Zdrowy rozrzut","losowa chmura wokół 0",true,"poprawny",1013);
    panel(414,684,58,200,"--v-orange","hetero",
      "Heteroskedastyczność","„lejek” — rozrzut rośnie",false,"problem",2027);
    // wiersz dolny
    panel(52,336,268,410,"--v-amber","nonlin",
      "Nieliniowość","wygięty wzór (U)",false,"problem",3041);
    panel(414,684,268,410,"--v-orange","outlier",
      "Outlier / gruby ogon","pojedyncze skrajne reszty",false,"problem",4057);
  }
  document.addEventListener("themechange",render);
  render();
})();
</script>
