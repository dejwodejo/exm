<figure class="viz" id="f07">
  <div class="viz-head">
    <p class="viz-title">Współliniowość predyktorów i VIF</p>
    <p class="viz-sub">Dwa predyktory x₁ i x₂ o korelacji r. Im bliżej r = 1, tym bardziej chmura punktów spłaszcza się do linii — kolumny X niosą tę samą informację. Miarą jest VIF = 1/(1−r²): pokazuje, ile razy rośnie wariancja estymatora β̂ względem sytuacji bez współliniowości.</p>
  </div>
  <div class="viz-body">
    <svg id="f07-svg" viewBox="0 0 680 360" role="img" aria-label="Wykres rozrzutu x1 vs x2, którego chmura punktów robi się coraz bardziej liniowa gdy korelacja r rośnie; obok żywy odczyt VIF = 1/(1-r kwadrat) z progami ostrzegawczymi"></svg>
  </div>
  <div class="viz-controls">
    <label>Korelacja r(x₁, x₂)
      <input id="f07-r" type="range" min="0" max="0.99" step="0.01" value="0.5">
      <span class="val" id="f07-rv">0.50</span>
    </label>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      <b>R² = r² = <span id="f07-r2">–</span></b> · <b>VIF = 1/(1−r²) = <span id="f07-vif">–</span></b> · <b id="f07-flag">–</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> współliniowość <i>nie psuje</i> predykcji modelu jako całości (ŷ i R² pozostają dobre), ale destabilizuje pojedyncze β̂ — VIF-krotnie rozdmuchuje ich wariancję, przez co współczynniki stają się niepewne, chwiejne i trudne do interpretacji. Progi kciuka: VIF > 5 niepokojące, VIF > 10 poważny problem.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f07-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  var W=680,H=360,L=48,R=210,T=22,B=44, x0=L,x1=W-R,y0=H-B,y1=T, vmin=0,vmax=12;
  var cx=function(x){return x0+(x-vmin)/(vmax-vmin)*(x1-x0);};
  var cy=function(v){return y0-(v-vmin)/(vmax-vmin)*(y0-y1);};
  // seeded PRNG -> stały układ szumu bazowego (identyczny po przełączeniu motywu)
  function mul(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}
  var N=90, Z1=[], Z2=[], rnd=mul(20260705);
  for(var k=0;k<N;k++){ Z1.push(gauss(rnd)); Z2.push(gauss(rnd)); }
  var MEAN=6, SD=1.9;
  var slider=document.getElementById("f07-r");

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var r=parseFloat(slider.value);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),AM=cvar("--v-amber"),
        TE=cvar("--v-teal"),BG=cvar("--bg2");
    var r2=r*r, vif=1/(1-r2);
    // kolor stanu wg progów VIF
    var state = vif>10 ? {c:OR, t:"poważny problem"} : (vif>5 ? {c:AM, t:"niepokojące"} : {c:BL, t:"OK"});

    // siatka + osie
    var g;
    for(g=0;g<=vmax;g+=2){
      svg.appendChild(E("line",{x1:x0,y1:cy(g),x2:x1,y2:cy(g),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("line",{x1:cx(g),y1:y0,x2:cx(g),y2:y1,stroke:GRID,"stroke-width":1}));
      if(g>0){
        svg.appendChild(E("text",{x:x0-8,y:cy(g)+4,"text-anchor":"end","font-size":10,fill:MUT},String(g)));
        svg.appendChild(E("text",{x:cx(g),y:y0+16,"text-anchor":"middle","font-size":10,fill:MUT},String(g)));
      }
    }
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x1,y2:y0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x0,y2:y1,stroke:AX,"stroke-width":1.4}));
    // podpisy osi
    svg.appendChild(E("text",{x:(x0+x1)/2,y:H-8,"text-anchor":"middle","font-size":12,"font-weight":700,fill:INK2},"x₁"));
    svg.appendChild(E("text",{x:14,y:(y0+y1)/2,"text-anchor":"middle","font-size":12,"font-weight":700,fill:INK2,transform:"rotate(-90 14 "+((y0+y1)/2)+")"},"x₂"));

    // linia regresji x2 na x1: x2 ≈ mean + r*(x1-mean) (bo równe SD) — oś współliniowości
    var xa=vmin, xb=vmax;
    var la=MEAN+r*(xa-MEAN), lb=MEAN+r*(xb-MEAN);
    svg.appendChild(E("line",{x1:cx(xa),y1:cy(la),x2:cx(xb),y2:cy(lb),
      stroke:state.c,"stroke-width":1.6,"stroke-dasharray":"6 5",opacity:.75}));

    // punkty: x1 = mean + SD*z1 ; x2 = mean + SD*(r*z1 + sqrt(1-r²)*z2)  -> korelacja = r
    var s=Math.sqrt(1-r2),i,ax,bx;
    for(i=0;i<N;i++){
      ax=MEAN+SD*Z1[i];
      bx=MEAN+SD*(r*Z1[i]+s*Z2[i]);
      if(ax<vmin||ax>vmax||bx<vmin||bx>vmax) continue;
      svg.appendChild(E("circle",{cx:cx(ax),cy:cy(bx),r:4.4,fill:state.c,"fill-opacity":.55,
        stroke:BG,"stroke-width":1}));
    }

    // ---- panel odczytu VIF po prawej ----
    var px=x1+22, pw=W-20-(x1+22), pyt=T+6;
    svg.appendChild(E("rect",{x:px,y:pyt,width:pw,height:150,rx:8,fill:BG,stroke:GRID,"stroke-width":1}));
    svg.appendChild(E("text",{x:px+pw/2,y:pyt+22,"text-anchor":"middle","font-size":11.5,"font-weight":700,fill:INK2},"Odczyt VIF"));
    svg.appendChild(E("text",{x:px+pw/2,y:pyt+58,"text-anchor":"middle","font-size":30,"font-weight":800,fill:state.c},
      (vif>99?"99+":vif.toFixed(1))));
    svg.appendChild(E("text",{x:px+pw/2,y:pyt+78,"text-anchor":"middle","font-size":10.5,fill:MUT},"= 1/(1−r²)"));
    // pasek stanu
    var bx0=px+16, bw=pw-32, bby=pyt+96, bh=10;
    svg.appendChild(E("rect",{x:bx0,y:bby,width:bw,height:bh,rx:5,fill:GRID}));
    var frac=Math.min(1, Math.log(vif)/Math.log(20)); // skala log, 20 -> pełny
    svg.appendChild(E("rect",{x:bx0,y:bby,width:Math.max(4,bw*frac),height:bh,rx:5,fill:state.c}));
    svg.appendChild(E("text",{x:px+pw/2,y:pyt+128,"text-anchor":"middle","font-size":12,"font-weight":800,fill:state.c},state.t));

    // legenda progów pod panelem
    var lyt=pyt+150+16, rowH=17;
    var rows=[["VIF < 5  komfort",BL],["VIF > 5  niepokojące",AM],["VIF > 10  poważny problem",OR]];
    for(i=0;i<rows.length;i++){
      var yy=lyt+i*rowH;
      svg.appendChild(E("rect",{x:px+2,y:yy-8,width:11,height:11,rx:2,fill:rows[i][1]}));
      svg.appendChild(E("text",{x:px+18,y:yy+1,"font-size":10,fill:MUT},rows[i][0]));
    }

    // odczyty tekstowe
    document.getElementById("f07-rv").textContent=r.toFixed(2);
    document.getElementById("f07-r2").textContent=r2.toFixed(2);
    var vf=document.getElementById("f07-vif"); vf.textContent=(vif>999?"∞":vif.toFixed(1));
    var flag=document.getElementById("f07-flag");
    flag.textContent=state.t;
    flag.style.color=state.c;
  }

  slider.addEventListener("input",render);
  document.addEventListener("themechange",render);
  render();
})();
</script>
