<figure class="viz" id="v06">
          <div class="viz-head">
            <p class="viz-title">
              Klasyka vs Big Data: linijka skali i lustro paradygmatów
            </p>
            <p class="viz-sub">
              Przesuń rozmiar danych (GB → PB). Wskaźnik na linijce mówi, po
              której stronie progu jesteś, a tabela podświetla właściwą kolumnę.
              Włącz streaming, by zobaczyć, że o Big Data decyduje nie tylko
              Volume.
            </p>
          </div>
          <div class="viz-body">
            <svg
              id="v06-svg"
              viewBox="0 0 680 340"
              role="img"
              aria-label="Lustrzana tabela klasycznej analizy i Big Data z linijką rozmiaru danych"
            ></svg>
          </div>
          <div class="viz-controls">
            <label
              >Rozmiar danych
              <input
                id="v06-r"
                type="range"
                min="0"
                max="6"
                step="0.01"
                value="1.5"
              />
              <span class="val" id="v06-rv">30 GB</span>
            </label>
            <span
              class="toggle"
              id="v06-stream"
              role="button"
              tabindex="0"
              aria-pressed="false"
              >Streaming (Velocity)</span
            >
            <span
              style="
                font-family: var(--mono);
                font-size: 12px;
                color: var(--ink2);
              "
            >
              werdykt: <b id="v06-verdict">–</b>
            </span>
          </div>
          <figcaption>
            <b>Sedno:</b> granica jest mieszana — próg ilościowy to ok.
            <b>1 TB</b> (jeden vs wiele węzłów), ale gdy dochodzi wysoka
            <i>Velocity</i> (streaming) albo <i>Variety</i>, zmiana paradygmatu
            (rozproszenie, BASE, schema-on-read) bywa konieczna nawet przy
            mniejszym wolumenie. Sam wzrost
            \(n\)
            to wciąż klasyka.
          </figcaption>
        </figure>
        <script>
          (function () {
            "use strict";
            var NS = "http://www.w3.org/2000/svg",
              svg = document.getElementById("v06-svg");
            var cvar = function (n) {
              return getComputedStyle(document.documentElement)
                .getPropertyValue(n)
                .trim();
            };
            function E(n, a, t) {
              var e = document.createElementNS(NS, n);
              for (var k in a) e.setAttribute(k, a[k]);
              if (t != null) e.textContent = t;
              return e;
            }

            // ---- dane ilustracyjne (z tabeli synteza, sekcja 9) ----
            var ROWS = [
              [
                "Dane",
                "próba reprezentatywna",
                "N≈all (wyczerpujące względem źródła)",
              ],
              ["Skalowanie", "pionowe (scale-up)", "poziome (scale-out)"],
              ["Lokalizacja", "w RAM jednej maszyny", "rozproszone (klaster)"],
              ["Spójność", "ACID", "BASE (eventual)"],
              ["Schemat", "schema-on-write (ETL)", "schema-on-read (ELT)"],
              ["Cel", "wnioskowanie o param.", "predykcja / wzorce"],
              ["Narzędzia", "pandas · NumPy · R", "Spark · Flink · Kafka"],
            ];
            // znaczniki linijki: log10(GB) -> etykieta
            var TICKS = [
              [0, "1 GB"],
              [1, "10 GB"],
              [2, "100 GB"],
              [3, "1 TB"],
              [4, "10 TB"],
              [5, "100 TB"],
              [6, "1 PB"],
            ];

            var W = 680,
              H = 340;
            var RX0 = 40,
              RX1 = 640,
              RY = 52; // linijka (track)
            var xr = function (v) {
              return RX0 + (v / 6) * (RX1 - RX0);
            };

            // geometria tabeli
            var LX = 36,
              LW = 250,
              CX = 286,
              CW = 108,
              GX = 394,
              GW = 250;
            var HY = 92,
              RH = 31,
              TY = HY + 22; // start wierszy pod nagłówkiem

            function fmtSize(logv) {
              var gb = Math.pow(10, logv);
              var v, u;
              if (gb >= 1e6) {
                v = gb / 1e6;
                u = "PB";
              } else if (gb >= 1000) {
                v = gb / 1000;
                u = "TB";
              } else {
                v = gb;
                u = "GB";
              }
              var s =
                v >= 100
                  ? String(Math.round(v))
                  : v >= 10
                    ? String(Math.round(v))
                    : (Math.round(v * 10) / 10).toFixed(1);
              return s + " " + u;
            }

            function render() {
              while (svg.firstChild) svg.removeChild(svg.firstChild);
              var INK = cvar("--ink"),
                INK2 = cvar("--ink2"),
                MUT = cvar("--muted"),
                BG2 = cvar("--bg2"),
                RULE = cvar("--rule"),
                BL = cvar("--v-blue"),
                TE = cvar("--v-teal"),
                AM = cvar("--v-amber");

              var val = parseFloat(document.getElementById("v06-r").value);
              var stream =
                document
                  .getElementById("v06-stream")
                  .getAttribute("aria-pressed") === "true";

              // strefa wg progów: <10GB klasyka, 10GB–1TB granica, >1TB Big Data; streaming wymusza Big Data
              var zone = stream
                ? "big"
                : val < 1
                  ? "classic"
                  : val < 3
                    ? "trans"
                    : "big";
              var cLvl = zone === "classic" ? 1 : zone === "trans" ? 0.5 : 0;
              var gLvl = zone === "big" ? 1 : zone === "trans" ? 0.5 : 0;

              // ===== LINIJKA: pasma stref =====
              var bands = [
                [0, 1, BL],
                [1, 3, AM],
                [3, 6, TE],
              ];
              for (var i = 0; i < bands.length; i++) {
                var x = xr(bands[i][0]),
                  w = xr(bands[i][1]) - x;
                svg.appendChild(
                  E("rect", {
                    x: x,
                    y: RY - 4,
                    width: w,
                    height: 8,
                    fill: bands[i][2],
                    "fill-opacity": 0.3,
                  }),
                );
              }
              svg.appendChild(
                E("line", {
                  x1: RX0,
                  y1: RY,
                  x2: RX1,
                  y2: RY,
                  stroke: cvar("--v-axis"),
                  "stroke-width": 1.4,
                }),
              );
              // znaczniki + etykiety
              for (i = 0; i < TICKS.length; i++) {
                var tx = xr(TICKS[i][0]);
                svg.appendChild(
                  E("line", {
                    x1: tx,
                    y1: RY - 5,
                    x2: tx,
                    y2: RY + 5,
                    stroke: MUT,
                    "stroke-width": 1,
                  }),
                );
                svg.appendChild(
                  E(
                    "text",
                    {
                      x: tx,
                      y: RY + 18,
                      "text-anchor": "middle",
                      "font-size": 10,
                      fill: MUT,
                    },
                    TICKS[i][1],
                  ),
                );
              }
              // próg Big Data (1 TB) — gdzie klasyka ustępuje
              var pth = xr(3);
              svg.appendChild(
                E("line", {
                  x1: pth,
                  y1: RY - 18,
                  x2: pth,
                  y2: RY + 6,
                  stroke: INK,
                  "stroke-width": 1.3,
                  "stroke-dasharray": "3 3",
                }),
              );
              svg.appendChild(
                E(
                  "text",
                  {
                    x: pth,
                    y: RY - 22,
                    "text-anchor": "middle",
                    "font-size": 10,
                    "font-weight": 700,
                    fill: INK,
                  },
                  "próg ≈ 1 TB",
                ),
              );

              // wskaźnik pozycji
              var px = xr(val);
              svg.appendChild(
                E("path", {
                  d: "M" + px + " " + (RY - 6) + " l -6 -9 l 12 0 z",
                  fill: INK,
                }),
              );
              var lblCol = zone === "classic" ? BL : zone === "big" ? TE : AM;
              // etykieta rozmiaru nad wskaźnikiem (przycięta do krawędzi)
              var lx = Math.max(RX0 + 26, Math.min(RX1 - 26, px));
              svg.appendChild(
                E(
                  "text",
                  {
                    x: lx,
                    y: RY - 20,
                    "text-anchor": "middle",
                    "font-size": 11.5,
                    "font-weight": 700,
                    fill: lblCol,
                  },
                  fmtSize(val),
                ),
              );

              // ===== NAGŁÓWKI KOLUMN =====
              function header(x, w, txt, col, lvl, anchor) {
                var t = E(
                  "text",
                  {
                    x: x,
                    y: HY + 6,
                    "text-anchor": anchor,
                    "font-size": 12,
                    "font-weight": 700,
                    fill: col,
                    opacity: (0.5 + 0.5 * lvl).toFixed(2),
                  },
                  txt,
                );
                svg.appendChild(t);
              }
              header(LX + LW - 6, LW, "◄ Klasyczna analiza", BL, cLvl, "end");
              header(GX + 6, GW, "Big Data ►", TE, gLvl, "start");

              // ===== WIERSZE (lustro) =====
              for (i = 0; i < ROWS.length; i++) {
                var y = TY + i * RH;
                var cOp = 0.42 + 0.58 * cLvl,
                  gOp = 0.42 + 0.58 * gLvl;
                // lewa komórka (klasyka)
                svg.appendChild(
                  E("rect", {
                    x: LX,
                    y: y,
                    width: LW,
                    height: RH - 6,
                    rx: 5,
                    fill: BL,
                    "fill-opacity": (0.05 + 0.14 * cLvl).toFixed(3),
                    stroke: cLvl === 1 ? BL : RULE,
                    "stroke-width": cLvl === 1 ? 1.6 : 1,
                  }),
                );
                svg.appendChild(
                  E(
                    "text",
                    {
                      x: LX + LW - 10,
                      y: y + (RH - 6) / 2 + 4,
                      "text-anchor": "end",
                      "font-size": 11.5,
                      fill: INK,
                      opacity: cOp.toFixed(2),
                    },
                    ROWS[i][1],
                  ),
                );
                // środek (wymiar)
                svg.appendChild(
                  E("rect", {
                    x: CX,
                    y: y,
                    width: CW,
                    height: RH - 6,
                    rx: 5,
                    fill: BG2,
                    stroke: RULE,
                    "stroke-width": 1,
                  }),
                );
                svg.appendChild(
                  E(
                    "text",
                    {
                      x: CX + CW / 2,
                      y: y + (RH - 6) / 2 + 4,
                      "text-anchor": "middle",
                      "font-size": 11,
                      "font-weight": 700,
                      fill: INK2,
                    },
                    ROWS[i][0],
                  ),
                );
                // prawa komórka (Big Data)
                svg.appendChild(
                  E("rect", {
                    x: GX,
                    y: y,
                    width: GW,
                    height: RH - 6,
                    rx: 5,
                    fill: TE,
                    "fill-opacity": (0.05 + 0.14 * gLvl).toFixed(3),
                    stroke: gLvl === 1 ? TE : RULE,
                    "stroke-width": gLvl === 1 ? 1.6 : 1,
                  }),
                );
                svg.appendChild(
                  E(
                    "text",
                    {
                      x: GX + 10,
                      y: y + (RH - 6) / 2 + 4,
                      "text-anchor": "start",
                      "font-size": 11.5,
                      fill: INK,
                      opacity: gOp.toFixed(2),
                    },
                    ROWS[i][2],
                  ),
                );
              }

              // ===== odczyty na żywo =====
              document.getElementById("v06-rv").textContent = fmtSize(val);
              var vtxt = stream
                ? "Streaming (Velocity) → Big Data mimo Volume"
                : zone === "classic"
                  ? "klasyka wystarczy (pandas/R, jeden węzeł)"
                  : zone === "trans"
                    ? "strefa graniczna (Polars/Dask/DuckDB)"
                    : "potrzebny Big Data (Spark/Flink, klaster)";
              var vel = document.getElementById("v06-verdict");
              vel.textContent = vtxt;
              vel.style.color = stream
                ? cvar("--v-teal")
                : zone === "classic"
                  ? cvar("--v-blue")
                  : zone === "big"
                    ? cvar("--v-teal")
                    : cvar("--v-amber");
            }

            document.getElementById("v06-r").addEventListener("input", render);
            var st = document.getElementById("v06-stream");
            function toggleStream() {
              st.setAttribute(
                "aria-pressed",
                st.getAttribute("aria-pressed") === "true" ? "false" : "true",
              );
              render();
            }
            st.addEventListener("click", toggleStream);
            st.addEventListener("keydown", function (e) {
              if (e.key === " " || e.key === "Enter") {
                e.preventDefault();
                toggleStream();
              }
            });
            document.addEventListener("themechange", render);
            render();
          })();
        </script>
