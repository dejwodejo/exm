<figure class="viz" id="v07">
  <div class="viz-head">
    <p class="viz-title">Potok WordCount: split → map → shuffle/sort → reduce → wynik</p>
    <p class="viz-sub">Krok po kroku prześledź, jak pary „słowo, 1” są emitowane, grupowane po kluczu i kierowane do właściwego reducera.</p>
  </div>
  <div class="viz-body">
    <svg id="v07-svg" viewBox="0 0 680 300" role="img" aria-label="Interaktywny diagram przepływu potoku WordCount w MapReduce"></svg>
  </div>
  <div class="viz-controls">
    <span class="toggle" id="v07-play" role="button" tabindex="0" aria-pressed="false">▶ Odtwórz</span>
    <span class="toggle" id="v07-prev" role="button" tabindex="0" aria-pressed="false">‹ Wstecz</span>
    <span class="toggle" id="v07-next" role="button" tabindex="0" aria-pressed="false">Dalej ›</span>
    <label>Etap
      <input id="v07-step" type="range" min="0" max="4" step="1" value="0">
      <span class="val" id="v07-stepv">0 · Split</span>
    </label>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)" id="v07-read">–</span>
  </div>
  <figcaption><b>Sedno:</b> shuffle &amp; sort zbiera wszystkie wartości danego klucza i przesyła je do jednego reducera. Combiner może wcześniej policzyć lokalne sumy, bo ich ponowne sumowanie nie zmieni wyniku.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v07-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}

  // ---- dane ilustracyjne (deterministyczne) ----
  // D1 = "kot pies kot", D2 = "pies kot ryba"  =>  kot:3, pies:2, ryba:1
  var docs=[
    {label:"D1", text:"kot pies kot", cy:96},
    {label:"D2", text:"pies kot ryba", cy:200}
  ];
  var pairs=[ // wyjście map: (słowo, 1), po jednym wierszu
    {key:"kot", doc:0, y:60},
    {key:"pies",doc:0, y:98},
    {key:"kot", doc:0, y:136},
    {key:"pies",doc:1, y:174},
    {key:"kot", doc:1, y:212},
    {key:"ryba",doc:1, y:250}
  ];
  var keys=[ // po shuffle: grupy wg klucza
    {k:"kot",  vals:[1,1,1], sum:3, red:0, gy:80,  oy:96},
    {k:"pies", vals:[1,1],   sum:2, red:1, gy:158, oy:212},
    {k:"ryba", vals:[1],     sum:1, red:0, gy:236, oy:150}
  ];
  var redY=[112, 210]; // środki reducerów R0, R1

  var stageNames=["Split","Map","Shuffle & sort","Reduce","Wynik"];
  var reads=[
    "2 dokumenty → 2 input splity",
    "emisja 6 par (słowo, 1)",
    "6 par → 3 klucze; sort wg klucza",
    "3 klucze → 2 reducery (part(k) mod 2)",
    "(kot,3) · (pies,2) · (ryba,1)"
  ];

  // geometria kolumn
  var DOC_R=134, MAP_L=150, MAP_R=246, GRP_L=298, GRP_R=390, RED_L=446, RED_R=542, OUT_L=598;
  var headers=[{x:87,s:0},{x:198,s:1},{x:344,s:2},{x:494,s:3},{x:636,s:4}];

  var step=document.getElementById("v07-step");
  var timer=null, reduceM=false;

  function reduced(){return window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;}

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    reduceM=reduced();
    var cur=parseInt(step.value,10);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),BG2=cvar("--bg2"),
        RULE=cvar("--rule"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),AM=cvar("--v-amber");
    var col={kot:BL,pies:OR,ryba:TE};
    function op(s){return cur<s?0.12:(cur>s?0.8:1);}
    var flow=[]; // ruchome kropki na wierzchu

    function conn(x1,y1,x2,y2,c,s){
      var o=op(s);
      svg.appendChild(E("line",{x1:x1,y1:y1,x2:x2,y2:y2,stroke:c,"stroke-width":(cur===s?2.2:1.3),opacity:o,"stroke-linecap":"round"}));
      if(cur===s && !reduceM && o>0.5){
        var dot=E("circle",{r:3.1,fill:c,stroke:BG2,"stroke-width":1});
        var m=document.createElementNS(NS,"animateMotion");
        m.setAttribute("dur","1.15s");m.setAttribute("repeatCount","indefinite");
        m.setAttribute("path","M"+x1+" "+y1+"L"+x2+" "+y2);
        dot.appendChild(m);flow.push(dot);
      }
    }
    function chip(x,y,w,h,s,accent){
      var hot=cur===s;
      return E("rect",{x:x,y:y-h/2,width:w,height:h,rx:6,fill:BG2,
        stroke:hot?accent:RULE,"stroke-width":hot?2:1.2,opacity:op(s)});
    }

    // nagłówki kolumn
    headers.forEach(function(h){
      svg.appendChild(E("text",{x:h.x,y:20,"text-anchor":"middle","font-size":11.5,
        "font-weight":700,fill:cur===h.s?INK:MUT,opacity:cur<h.s?0.4:1},stageNames[h.s]));
    });

    // stage1: linie doc -> pary
    pairs.forEach(function(p){conn(DOC_R,docs[p.doc].cy,MAP_L,p.y,col[p.key],1);});
    // stage2: linie pary -> grupy (krzyżujące, kolor wg klucza)
    var gy={}; keys.forEach(function(k){gy[k.k]=k.gy;});
    pairs.forEach(function(p){conn(MAP_R,p.y,GRP_L,gy[p.key],col[p.key],2);});
    // stage3: linie grupa -> właściwy reducer (partycjonowanie, krzyżują się)
    keys.forEach(function(k){conn(GRP_R,k.gy,RED_L,redY[k.red],col[k.k],3);});
    // stage4: linie reducer -> wynik
    keys.forEach(function(k){conn(RED_R,redY[k.red],OUT_L,k.oy,col[k.k],4);});

    // --- kolumna 0: dokumenty ---
    docs.forEach(function(d){
      svg.appendChild(chip(40,d.cy,94,50,0,AM));
      svg.appendChild(E("text",{x:87,y:d.cy-9,"text-anchor":"middle","font-size":11,"font-weight":700,fill:INK,opacity:op(0)},d.label));
      svg.appendChild(E("text",{x:87,y:d.cy+10,"text-anchor":"middle","font-size":9.5,"font-family":cvar("--mono"),fill:INK2,opacity:op(0)},"“"+d.text+"”"));
    });

    // --- kolumna 1: map (pary) ---
    pairs.forEach(function(p){
      svg.appendChild(chip(MAP_L,p.y,96,28,1,col[p.key]));
      svg.appendChild(E("text",{x:MAP_L+48,y:p.y+4,"text-anchor":"middle","font-size":11,"font-family":cvar("--mono"),fill:INK,opacity:op(1)},"("+p.key+", 1)"));
    });

    // --- kolumna 2: shuffle (grupy wg klucza) ---
    keys.forEach(function(k){
      svg.appendChild(chip(GRP_L,k.gy,92,40,2,col[k.k]));
      svg.appendChild(E("text",{x:GRP_L+46,y:k.gy-6,"text-anchor":"middle","font-size":11,"font-weight":700,fill:col[k.k],opacity:op(2)},k.k));
      svg.appendChild(E("text",{x:GRP_L+46,y:k.gy+12,"text-anchor":"middle","font-size":10,"font-family":cvar("--mono"),fill:INK2,opacity:op(2)},"["+k.vals.join(", ")+"]"));
    });

    // --- kolumna 3: reduce (sumowanie w reducerach) ---
    var r0=keys.filter(function(k){return k.red===0;}), r1=keys.filter(function(k){return k.red===1;});
    // R0
    svg.appendChild(chip(RED_L,redY[0],96,54,3,AM));
    svg.appendChild(E("text",{x:RED_L+48,y:redY[0]-16,"text-anchor":"middle","font-size":10.5,"font-weight":700,fill:INK,opacity:op(3)},"Reducer 0"));
    r0.forEach(function(k,i){
      svg.appendChild(E("text",{x:RED_L+48,y:redY[0]-1+i*15,"text-anchor":"middle","font-size":9.5,"font-family":cvar("--mono"),fill:col[k.k],opacity:op(3)},k.k+": "+k.vals.join("+")+"="+k.sum));
    });
    // R1
    svg.appendChild(chip(RED_L,redY[1],96,40,3,AM));
    svg.appendChild(E("text",{x:RED_L+48,y:redY[1]-8,"text-anchor":"middle","font-size":10.5,"font-weight":700,fill:INK,opacity:op(3)},"Reducer 1"));
    r1.forEach(function(k){
      svg.appendChild(E("text",{x:RED_L+48,y:redY[1]+10,"text-anchor":"middle","font-size":9.5,"font-family":cvar("--mono"),fill:col[k.k],opacity:op(3)},k.k+": "+k.vals.join("+")+"="+k.sum));
    });
    // etykieta partycjonowania między shuffle a reduce
    svg.appendChild(E("text",{x:(GRP_R+RED_L)/2,y:284,"text-anchor":"middle","font-size":9,"font-family":cvar("--mono"),fill:MUT,opacity:op(3)},"part(k) mod 2"));

    // --- kolumna 4: wynik ---
    keys.forEach(function(k){
      svg.appendChild(chip(OUT_L,k.oy,78,30,4,col[k.k]));
      svg.appendChild(E("text",{x:OUT_L+39,y:k.oy+4,"text-anchor":"middle","font-size":11,"font-weight":700,"font-family":cvar("--mono"),fill:INK,opacity:op(4)},"("+k.k+", "+k.sum+")"));
    });

    // strzałka przepływu
    svg.appendChild(E("text",{x:340,y:296,"text-anchor":"middle","font-size":9.5,fill:MUT},"przepływ danych →"));

    // ruchome kropki na wierzchu
    flow.forEach(function(d){svg.appendChild(d);});

    // odczyt
    document.getElementById("v07-stepv").textContent=cur+" · "+stageNames[cur];
    document.getElementById("v07-read").textContent=reads[cur];
  }

  // ---- kontrolki ----
  function setStep(v){v=Math.max(0,Math.min(4,v));step.value=v;render();}
  function stopPlay(){if(timer){clearInterval(timer);timer=null;}play.setAttribute("aria-pressed","false");play.textContent="▶ Odtwórz";}
  var play=document.getElementById("v07-play");
  function startPlay(){
    if(parseInt(step.value,10)>=4)setStep(0);
    play.setAttribute("aria-pressed","true");play.textContent="⏸ Pauza";
    timer=setInterval(function(){
      var v=parseInt(step.value,10);
      if(v>=4){stopPlay();return;}
      setStep(v+1);
    },1300);
  }
  function togglePlay(){if(timer)stopPlay();else startPlay();}
  play.addEventListener("click",togglePlay);
  play.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();togglePlay();}});

  var prev=document.getElementById("v07-prev"), next=document.getElementById("v07-next");
  function goPrev(){stopPlay();setStep(parseInt(step.value,10)-1);}
  function goNext(){stopPlay();setStep(parseInt(step.value,10)+1);}
  prev.addEventListener("click",goPrev);
  next.addEventListener("click",goNext);
  prev.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();goPrev();}});
  next.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();goNext();}});
  step.addEventListener("input",function(){stopPlay();render();});

  document.addEventListener("themechange",render);
  render();
})();
</script>
