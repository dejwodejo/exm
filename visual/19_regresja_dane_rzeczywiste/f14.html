<figure class="viz" id="f14">
  <div class="viz-head">
    <p class="viz-title">Transformacja log(y): prostowanie nieliniowości i stabilizacja wariancji</p>
    <p class="viz-sub">Te same dane w dwóch skalach. W skali surowej y rośnie wykładniczo, a rozrzut „rozwiera się” z x (lejek — heteroskedastyczność). Po log(y) zależność jest ~liniowa, a rozrzut stały (homoskedastyczność). Przełącz skalę osi y.</p>
  </div>
  <div class="viz-body">
    <svg id="f14-svg" viewBox="0 0 680 360" role="img" aria-label="Wykres rozrzutu tych samych danych: w skali y punkty tworzą wygiętą krzywą z rosnącym lejkiem rozrzutu, po transformacji log(y) układają się liniowo ze stałym rozrzutem"></svg>
  </div>
  <div class="viz-controls">
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">Skala osi y:</span>
    <span class="toggle" id="f14-raw" role="button" tabindex="0" aria-pressed="true">y (surowe)</span>
    <span class="toggle" id="f14-log" role="button" tabindex="0" aria-pressed="false">log(y)</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      rozrzut reszt: <b id="f14-note">–</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> gdy y zależy od x multiplikatywnie (błąd rośnie proporcjonalnie do poziomu), log(y) jednocześnie „prostuje” krzywą do linii i wyrównuje wariancję — jedna transformacja usuwa i nieliniowość, i heteroskedastyczność.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f14-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  function mul(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}

  var W=680,H=360,L=52,R=24,T=50,B=48;
  var x0=L,x1=W-R,y0=H-B,y1=T, xmin=0.4,xmax=10.2;
  var cx=function(x){return x0+(x-xmin)/(xmax-xmin)*(x1-x0);};

  // model log-liniowy: log(y) = c + m*x + N(0, s)  =>  y = exp(...) rośnie wykładniczo,
  // a błąd multiplikatywny daje „lejek” w skali surowej.
  var c0=0.40, m0=0.30, s0=0.30, N=90;
  var DATA=(function(){
    var r=mul(20260705), a=[],i,x,ly;
    for(i=0;i<N;i++){ x=1+r()*9; ly=c0+m0*x+gauss(r)*s0; a.push([x,ly]); }
    return a;
  })();
  // OLS na (x, log y) — te same współczynniki opisują trend w obu skalach
  var FIT=(function(){
    var n=DATA.length,sx=0,sy=0,sxy=0,sxx=0,i;
    for(i=0;i<n;i++){sx+=DATA[i][0];sy+=DATA[i][1];sxy+=DATA[i][0]*DATA[i][1];sxx+=DATA[i][0]*DATA[i][0];}
    var m=(sxy-sx*sy/n)/(sxx-sx*sx/n), c=sy/n-m*sx/n, ss=0,e;
    for(i=0;i<n;i++){e=DATA[i][1]-(c+m*DATA[i][0]); ss+=e*e;}
    return {c:c,m:m,s:Math.sqrt(ss/(n-2))};
  })();

  var mode="raw";
  var bRaw=document.getElementById("f14-raw"),
      bLog=document.getElementById("f14-log"),
      note=document.getElementById("f14-note");

  function conf(){
    if(mode==="raw") return {ymin:0, ymax:45, ticks:[0,10,20,30,40], ylab:"y", fmt:function(v){return String(v);},
      f:function(ly){return Math.exp(ly);}, acc:"--v-blue"};
    return {ymin:0, ymax:4.2, ticks:[0,1,2,3,4], ylab:"log(y)", fmt:function(v){return v.toFixed(0);},
      f:function(ly){return ly;}, acc:"--v-teal"};
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var K=conf();
    var GRID=cvar("--v-grid"),AX=cvar("--v-axis"),MUT=cvar("--muted"),INK=cvar("--ink"),
        INK2=cvar("--ink2"),AC=cvar(K.acc),OR=cvar("--v-orange"),BG=cvar("--bg2");
    var cy=function(v){return y0-(v-K.ymin)/(K.ymax-K.ymin)*(y0-y1);};
    var clamp=function(v){return Math.max(K.ymin,Math.min(K.ymax,v));};
    var i,g,xx,ly;

    // siatka pozioma + etykiety osi y
    for(i=0;i<K.ticks.length;i++){g=K.ticks[i];
      svg.appendChild(E("line",{x1:x0,y1:cy(g),x2:x1,y2:cy(g),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:x0-8,y:cy(g)+3.5,"text-anchor":"end","font-size":10,fill:MUT},K.fmt(g)));}
    for(g=2;g<=10;g+=2){svg.appendChild(E("text",{x:cx(g),y:y0+16,"text-anchor":"middle","font-size":10,fill:MUT},String(g)));}

    // pasmo ±2σ (w skali surowej rozwiera się w „lejek”, po log stałej szerokości)
    var up="",dn="";
    for(i=0;i<=60;i++){xx=xmin+i/60*(xmax-xmin); ly=FIT.c+FIT.m*xx;
      up+=(i?"L":"M")+cx(xx).toFixed(1)+" "+cy(clamp(K.f(ly+2*FIT.s))).toFixed(1);}
    for(i=60;i>=0;i--){xx=xmin+i/60*(xmax-xmin); ly=FIT.c+FIT.m*xx;
      dn+="L"+cx(xx).toFixed(1)+" "+cy(clamp(K.f(ly-2*FIT.s))).toFixed(1);}
    svg.appendChild(E("path",{d:up+dn+"Z",fill:AC,"fill-opacity":0.13,stroke:"none"}));

    // linia trendu: krzywa exp(...) w skali surowej, prosta w skali log
    var d="";
    for(i=0;i<=60;i++){xx=xmin+i/60*(xmax-xmin); ly=FIT.c+FIT.m*xx;
      d+=(i?"L":"M")+cx(xx).toFixed(1)+" "+cy(clamp(K.f(ly))).toFixed(1);}
    svg.appendChild(E("path",{d:d,fill:"none",stroke:OR,"stroke-width":2.6,"stroke-linecap":"round","stroke-linejoin":"round"}));

    // punkty
    for(i=0;i<DATA.length;i++){
      var v=clamp(K.f(DATA[i][1]));
      svg.appendChild(E("circle",{cx:cx(DATA[i][0]).toFixed(1),cy:cy(v).toFixed(1),r:3.4,
        fill:AC,"fill-opacity":0.72,stroke:BG,"stroke-width":0.8}));
    }

    // osie
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x1,y2:y0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:x0,y1:y0,x2:x0,y2:y1,stroke:AX,"stroke-width":1.4}));

    // podpisy osi (etykieta y przerysowywana przy przełączeniu)
    svg.appendChild(E("text",{x:(x0+x1)/2,y:H-8,"text-anchor":"middle","font-size":11,fill:MUT},"x"));
    svg.appendChild(E("text",{x:x0-40,y:(y0+y1)/2,"text-anchor":"middle","font-size":12,"font-weight":700,
      fill:INK2,transform:"rotate(-90 "+(x0-40)+" "+((y0+y1)/2)+")"},K.ylab));

    // etykieta trybu + trend
    svg.appendChild(E("text",{x:(x0+x1)/2,y:T-30,"text-anchor":"middle","font-size":12.5,"font-weight":700,fill:INK2},
      mode==="raw"?"Skala surowa: y = exp(β₀+β₁x)":"Skala log: log(y) = β₀ + β₁x"));
    svg.appendChild(E("text",{x:(x0+x1)/2,y:T-15,"text-anchor":"middle","font-size":10.5,fill:MUT},
      mode==="raw"?"wygięta krzywa + rozrzut rosnący z x („lejek”)":"~liniowa + stały rozrzut wokół prostej"));

    // legenda pasma / trendu
    var lx=x1-146, ly2=y1+6;
    svg.appendChild(E("rect",{x:lx,y:ly2-9,width:14,height:11,fill:AC,"fill-opacity":0.13}));
    svg.appendChild(E("text",{x:lx+18,y:ly2,"font-size":9.5,fill:MUT},"pasmo ±2σ"));
    svg.appendChild(E("line",{x1:lx,y1:ly2+13,x2:lx+14,y2:ly2+13,stroke:OR,"stroke-width":2.6}));
    svg.appendChild(E("text",{x:lx+18,y:ly2+16,"font-size":9.5,fill:MUT},"trend log-liniowy"));

    note.textContent = mode==="raw" ? "rośnie z x (lejek)" : "stały (~σ)";
  }

  function setMode(m){
    mode=m;
    bRaw.setAttribute("aria-pressed", m==="raw"?"true":"false");
    bLog.setAttribute("aria-pressed", m==="log"?"true":"false");
    render();
  }
  bRaw.addEventListener("click",function(){setMode("raw");});
  bLog.addEventListener("click",function(){setMode("log");});
  function key(m){return function(ev){if(ev.key===" "||ev.key==="Enter"){ev.preventDefault();setMode(m);}};}
  bRaw.addEventListener("keydown",key("raw"));
  bLog.addEventListener("keydown",key("log"));

  document.addEventListener("themechange",render);
  render();
})();
</script>
