<figure class="viz" id="f18">
  <div class="viz-head">
    <p class="viz-title">Bias–variance tradeoff: niedouczenie ↔ przeuczenie</p>
    <p class="viz-sub">Dopasowujemy wielomian stopnia d metodą najmniejszych kwadratów. Suwakiem zwiększaj złożoność: mały d = prosta linia, która nie chwyta kształtu (bias); duży d = pofalowana krzywa przechodząca przez szum (variance). Po prawej: błąd treningowy RMSE spada monotonicznie, a błąd testowy ma minimum — to optymalny stopień.</p>
  </div>
  <div class="viz-body">
    <svg id="f18-svg" viewBox="0 0 700 340" role="img" aria-label="Po lewej: punkty treningowe i testowe z dopasowanym wielomianem stopnia d. Po prawej: krzywe RMSE treningowego (malejące) i testowego (w kształcie litery U) w funkcji stopnia, z zaznaczonym bieżącym stopniem i optimum."></svg>
  </div>
  <div class="viz-controls">
    <label>Stopień wielomianu d
      <input id="f18-d" type="range" min="1" max="12" step="1" value="4">
      <span class="val" id="f18-dv">4</span>
    </label>
    <span class="toggle" id="f18-opt" role="button" tabindex="0" aria-pressed="true">Pokaż krzywą optymalną</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      RMSE<sub>train</sub>=<b id="f18-rtr">–</b> · RMSE<sub>test</sub>=<b id="f18-rte">–</b> · <b id="f18-stat">–</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> zbyt prosty model niedoucza się, a zbyt złożony dopasowuje szum. Złożoność wybieramy według najmniejszego błędu walidacyjnego, nie treningowego.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f18-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  function mul(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}

  var W=700,H=340,T=48,B=42, y0=H-B, y1=T, DMAX=12;
  var xmax=10, ymin=-5, ymax=11;
  // lewy panel (rozrzut + dopasowanie)
  var LX0=46, LX1=336;
  var lcx=function(x){return LX0+x/xmax*(LX1-LX0);};
  var lcy=function(v){return y0-(v-ymin)/(ymax-ymin)*(y0-y1);};
  // prawy panel (krzywe RMSE)
  var RX0=412, RX1=684;
  var rcx=function(d){return RX0+(d-1)/(DMAX-1)*(RX1-RX0);};

  // --- dane: prawdziwa funkcja + szum, zbiór treningowy i testowy ---
  var trueF=function(x){return 3*Math.sin(0.9*x)+0.35*x+1;};
  var sig=1.15, r=mul(20240705), i;
  var trX=[],trY=[],teX=[],teY=[];
  for(i=0;i<22;i++)trX.push(0.3+9.4*r());
  trX.sort(function(a,b){return a-b;});
  for(i=0;i<22;i++)trY.push(trueF(trX[i])+gauss(r)*sig);
  for(i=0;i<12;i++)teX.push(0.5+9.0*r());
  teX.sort(function(a,b){return a-b;});
  for(i=0;i<12;i++)teY.push(trueF(teX[i])+gauss(r)*sig);

  // --- dopasowanie wielomianu przez równania normalne (Vandermonde, x znormalizowane) ---
  function solve(A,b,n){
    var i,j,k,p,f,piv,tmp;
    for(k=0;k<n;k++){
      p=k; for(i=k+1;i<n;i++) if(Math.abs(A[i][k])>Math.abs(A[p][k])) p=i;
      tmp=A[k];A[k]=A[p];A[p]=tmp; tmp=b[k];b[k]=b[p];b[p]=tmp;
      piv=A[k][k]||1e-12;
      for(i=k+1;i<n;i++){ f=A[i][k]/piv; for(j=k;j<n;j++)A[i][j]-=f*A[k][j]; b[i]-=f*b[k]; }
    }
    var x=new Array(n);
    for(i=n-1;i>=0;i--){ var s=b[i]; for(j=i+1;j<n;j++)s-=A[i][j]*x[j]; x[i]=s/(A[i][i]||1e-12); }
    return x;
  }
  function fit(xs,ys,deg){
    var n=xs.length,m=deg+1,ii,jj,kk,A=[],bb=[];
    for(ii=0;ii<m;ii++){A[ii]=[];for(jj=0;jj<m;jj++)A[ii][jj]=0;bb[ii]=0;}
    for(kk=0;kk<n;kk++){
      var u=(xs[kk]-5)/5, p=[1]; for(ii=1;ii<m;ii++)p[ii]=p[ii-1]*u;
      for(ii=0;ii<m;ii++){ bb[ii]+=p[ii]*ys[kk]; for(jj=0;jj<m;jj++)A[ii][jj]+=p[ii]*p[jj]; }
    }
    for(ii=0;ii<m;ii++)A[ii][ii]+=1e-7; // znikoma stabilizacja numeryczna
    return solve(A,bb,m);
  }
  function evalP(c,x){var u=(x-5)/5,s=0,p=1,k;for(k=0;k<c.length;k++){s+=c[k]*p;p*=u;}return s;}
  function rmse(c,xs,ys){var s=0,k;for(k=0;k<xs.length;k++){var e=ys[k]-evalP(c,xs[k]);s+=e*e;}return Math.sqrt(s/xs.length);}

  // precompute per stopień (niezależne od motywu)
  var COEF=[],RTR=[],RTE=[],d;
  for(d=1;d<=DMAX;d++){var c=fit(trX,trY,d);COEF[d]=c;RTR[d]=rmse(c,trX,trY);RTE[d]=rmse(c,teX,teY);}
  var DOPT=1; for(d=2;d<=DMAX;d++) if(RTE[d]<RTE[DOPT]) DOPT=d;
  var rmax=0; for(d=1;d<=DMAX;d++){ if(RTR[d]>rmax)rmax=RTR[d]; if(RTE[d]>rmax)rmax=RTE[d]; }
  rmax*=1.12;
  var rcy=function(v){return y0-(Math.min(v,rmax)/rmax)*(y0-y1);};

  var slider=document.getElementById("f18-d"),
      optTgl=document.getElementById("f18-opt");

  function curvePath(c){
    var s="",k,N=220;
    for(k=0;k<=N;k++){ var x=k/N*xmax, v=evalP(c,x);
      s+=(k?"L":"M")+lcx(x).toFixed(1)+" "+lcy(v).toFixed(1); }
    return s;
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),
        AM=cvar("--v-amber"),BG=cvar("--bg2");
    var dcur=parseInt(slider.value,10), showOpt=optTgl.getAttribute("aria-pressed")==="true";
    var g;

    // clip dla krzywych lewego panelu (żeby pofalowania nie wychodziły poza panel)
    var defs=E("defs",{}); var cp=E("clipPath",{id:"f18-clip"});
    cp.appendChild(E("rect",{x:LX0,y:y1,width:LX1-LX0,height:y0-y1})); defs.appendChild(cp); svg.appendChild(defs);

    // ===== LEWY PANEL =====
    svg.appendChild(E("text",{x:(LX0+LX1)/2,y:T-30,"text-anchor":"middle","font-size":12,"font-weight":700,fill:INK2},"Dopasowanie: stopień d = "+dcur));
    svg.appendChild(E("text",{x:(LX0+LX1)/2,y:T-16,"text-anchor":"middle","font-size":10,fill:MUT},
      dcur<DOPT?"za prosty — niedouczenie (bias)":(dcur>DOPT?"za złożony — przeuczenie (variance)":"blisko optimum")));
    for(g=ymin;g<=ymax;g+=4){ svg.appendChild(E("line",{x1:LX0,y1:lcy(g),x2:LX1,y2:lcy(g),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:LX0-6,y:lcy(g)+3.5,"text-anchor":"end","font-size":9,fill:MUT},String(g))); }
    for(g=0;g<=xmax;g+=2){ svg.appendChild(E("text",{x:lcx(g),y:y0+15,"text-anchor":"middle","font-size":9,fill:MUT},String(g))); }

    // krzywa optymalna (odniesienie)
    if(showOpt&&dcur!==DOPT)
      svg.appendChild(E("path",{d:curvePath(COEF[DOPT]),fill:"none",stroke:TE,"stroke-width":1.8,
        "stroke-dasharray":"5 4",opacity:.85,"clip-path":"url(#f18-clip)"}));
    // krzywa bieżąca
    svg.appendChild(E("path",{d:curvePath(COEF[dcur]),fill:"none",stroke:OR,"stroke-width":2.6,
      "stroke-linejoin":"round","stroke-linecap":"round","clip-path":"url(#f18-clip)"}));

    // punkty testowe (×) i treningowe (○)
    for(i=0;i<teX.length;i++){ var tx=lcx(teX[i]),ty=lcy(Math.max(ymin,Math.min(ymax,teY[i]))),s=4;
      svg.appendChild(E("line",{x1:tx-s,y1:ty-s,x2:tx+s,y2:ty+s,stroke:MUT,"stroke-width":1.8}));
      svg.appendChild(E("line",{x1:tx-s,y1:ty+s,x2:tx+s,y2:ty-s,stroke:MUT,"stroke-width":1.8})); }
    for(i=0;i<trX.length;i++)
      svg.appendChild(E("circle",{cx:lcx(trX[i]),cy:lcy(Math.max(ymin,Math.min(ymax,trY[i]))),r:3.4,
        fill:BL,"fill-opacity":.85,stroke:BG,"stroke-width":1}));

    svg.appendChild(E("line",{x1:LX0,y1:y0,x2:LX1,y2:y0,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("line",{x1:LX0,y1:y0,x2:LX0,y2:y1,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("text",{x:(LX0+LX1)/2,y:H-4,"text-anchor":"middle","font-size":10,fill:MUT},"x"));

    // legenda lewa
    var lgx=LX0+8, lgy=y1+10;
    svg.appendChild(E("circle",{cx:lgx+4,cy:lgy,r:3.4,fill:BL,stroke:BG,"stroke-width":1}));
    svg.appendChild(E("text",{x:lgx+12,y:lgy+3.5,"font-size":9.5,fill:INK2},"train"));
    svg.appendChild(E("line",{x1:lgx+52,y1:lgy-3,x2:lgx+60,y2:lgy+3,stroke:MUT,"stroke-width":1.8}));
    svg.appendChild(E("line",{x1:lgx+52,y1:lgy+3,x2:lgx+60,y2:lgy-3,stroke:MUT,"stroke-width":1.8}));
    svg.appendChild(E("text",{x:lgx+66,y:lgy+3.5,"font-size":9.5,fill:INK2},"test"));

    // ===== PRAWY PANEL =====
    svg.appendChild(E("text",{x:(RX0+RX1)/2,y:T-30,"text-anchor":"middle","font-size":12,"font-weight":700,fill:INK2},"RMSE vs stopień"));
    svg.appendChild(E("text",{x:(RX0+RX1)/2,y:T-16,"text-anchor":"middle","font-size":10,fill:MUT},"train spada · test w kształcie U"));
    for(g=0;g<=4;g++){ var gv=rmax*g/4;
      svg.appendChild(E("line",{x1:RX0,y1:rcy(gv),x2:RX1,y2:rcy(gv),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:RX0-6,y:rcy(gv)+3.5,"text-anchor":"end","font-size":9,fill:MUT},gv.toFixed(1))); }
    for(d=2;d<=DMAX;d+=2) svg.appendChild(E("text",{x:rcx(d),y:y0+15,"text-anchor":"middle","font-size":9,fill:MUT},String(d)));

    // pasmo/marker optimum
    svg.appendChild(E("line",{x1:rcx(DOPT),y1:y1,x2:rcx(DOPT),y2:y0,stroke:TE,"stroke-width":1.6,"stroke-dasharray":"4 4",opacity:.9}));
    svg.appendChild(E("text",{x:rcx(DOPT),y:y1-3,"text-anchor":"middle","font-size":9,"font-weight":700,fill:TE},"optimum "+DOPT));
    // marker bieżącego stopnia
    svg.appendChild(E("line",{x1:rcx(dcur),y1:y1,x2:rcx(dcur),y2:y0,stroke:AM,"stroke-width":1.6,opacity:.85}));

    // krzywe RMSE
    var ptr="",pte="";
    for(d=1;d<=DMAX;d++){ ptr+=(d>1?"L":"M")+rcx(d).toFixed(1)+" "+rcy(RTR[d]).toFixed(1);
      pte+=(d>1?"L":"M")+rcx(d).toFixed(1)+" "+rcy(RTE[d]).toFixed(1); }
    svg.appendChild(E("path",{d:ptr,fill:"none",stroke:BL,"stroke-width":2.2}));
    svg.appendChild(E("path",{d:pte,fill:"none",stroke:OR,"stroke-width":2.2}));
    for(d=1;d<=DMAX;d++){ svg.appendChild(E("circle",{cx:rcx(d),cy:rcy(RTR[d]),r:2.6,fill:BL}));
      svg.appendChild(E("rect",{x:rcx(d)-2.4,y:rcy(RTE[d])-2.4,width:4.8,height:4.8,fill:OR})); }
    // podświetlenie punktu optimum na krzywej testowej
    svg.appendChild(E("circle",{cx:rcx(DOPT),cy:rcy(RTE[DOPT]),r:5,fill:"none",stroke:TE,"stroke-width":2.2}));
    // podświetlenie bieżącego stopnia
    svg.appendChild(E("circle",{cx:rcx(dcur),cy:rcy(RTR[dcur]),r:4,fill:BL,stroke:BG,"stroke-width":1.5}));
    svg.appendChild(E("rect",{x:rcx(dcur)-3.6,y:rcy(RTE[dcur])-3.6,width:7.2,height:7.2,fill:OR,stroke:BG,"stroke-width":1.5}));

    svg.appendChild(E("line",{x1:RX0,y1:y0,x2:RX1,y2:y0,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("line",{x1:RX0,y1:y0,x2:RX0,y2:y1,stroke:AX,"stroke-width":1.3}));
    svg.appendChild(E("text",{x:(RX0+RX1)/2,y:H-4,"text-anchor":"middle","font-size":10,fill:MUT},"stopień wielomianu d"));

    // legenda prawa
    var rgx=RX0+10, rgy=y1+10;
    svg.appendChild(E("line",{x1:rgx,y1:rgy,x2:rgx+16,y2:rgy,stroke:BL,"stroke-width":2.2}));
    svg.appendChild(E("text",{x:rgx+21,y:rgy+3.5,"font-size":9.5,fill:INK2},"RMSE train"));
    svg.appendChild(E("line",{x1:rgx,y1:rgy+13,x2:rgx+16,y2:rgy+13,stroke:OR,"stroke-width":2.2}));
    svg.appendChild(E("text",{x:rgx+21,y:rgy+16.5,"font-size":9.5,fill:INK2},"RMSE test"));

    // odczyty
    document.getElementById("f18-dv").textContent=dcur;
    document.getElementById("f18-rtr").textContent=RTR[dcur].toFixed(2);
    document.getElementById("f18-rte").textContent=RTE[dcur].toFixed(2);
    document.getElementById("f18-stat").textContent=(dcur<DOPT?"niedouczenie":(dcur>DOPT?"przeuczenie":"optimum"));
  }

  slider.addEventListener("input",render);
  function toggleOpt(){optTgl.setAttribute("aria-pressed",optTgl.getAttribute("aria-pressed")==="true"?"false":"true");render();}
  optTgl.addEventListener("click",toggleOpt);
  optTgl.addEventListener("keydown",function(ev){if(ev.key===" "||ev.key==="Enter"){ev.preventDefault();toggleOpt();}});
  document.addEventListener("themechange",render);
  render();
})();
</script>
