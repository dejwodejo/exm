<figure class="viz" id="f16">
  <div class="viz-head">
    <p class="viz-title">Leverage × reszta = wpływ; odległość Cooka łączy oba</p>
    <p class="viz-sub">Przeciągnij pomarańczowy punkt w <b>obu</b> osiach (albo użyj suwaków). W lewo–prawo sterujesz <b>leverage</b> (rośnie, im dalej x od x̄), w górę–dół sterujesz <b>resztą</b> (odległością od prostej). Prosta OLS (dopasowana do wszystkich punktów) reaguje; przerywana to dopasowanie bez ruchomego punktu. Panel po prawej pokazuje, że <b>odległość Cooka Dᵢ</b> jest duża tylko wtedy, gdy leverage i reszta są jednocześnie wysokie.</p>
  </div>
  <div class="viz-body">
    <svg id="f16-svg" viewBox="0 0 700 340" role="img" aria-label="Po lewej chmura punktów z prostą OLS i przeciąganym punktem wpływowym; po prawej mapa leverage kontra standaryzowana reszta z konturami stałej odległości Cooka"></svg>
  </div>
  <div class="viz-controls">
    <label>Pozycja x punktu (leverage)
      <input id="f16-px" type="range" min="1" max="13.5" step="0.1" value="11">
      <span class="val" id="f16-pxv">11.0</span>
    </label>
    <label>Pozycja y punktu (reszta)
      <input id="f16-py" type="range" min="1" max="21" step="0.1" value="16.3">
      <span class="val" id="f16-pyv">16.3</span>
    </label>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      leverage h = <b id="f16-h">–</b> · |reszta| = <b id="f16-e">–</b> · Cook Dᵢ = <b id="f16-d">–</b> · <b id="f16-verdict">–</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> sam wysoki leverage (x daleko od reszty) <i>bez</i> dużej reszty to punkt niegroźny — leży blisko prostej i jej nie rusza; dopiero <i>iloczyn</i> leverage i reszty daje realny wpływ, a odległość Cooka Dᵢ ∝ (reszta²)·h/(1−h)² łączy oba w jedną liczbę.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("f16-svg");
  if(!svg) return;
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  function mul(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function gauss(r){var u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307*v);}

  var W=700,H=340,T=30,B=44;
  // panel lewy: chmura + prosta
  var Lx0=44,Lx1=398,Ly0=H-B,Ly1=T, xmaxL=14, ymaxL=22;
  var cxL=function(x){return Lx0+x/xmaxL*(Lx1-Lx0);};
  var cyL=function(v){return Ly0-v/ymaxL*(Ly0-Ly1);};
  var invxL=function(px){return (px-Lx0)/(Lx1-Lx0)*xmaxL;};
  var invyL=function(py){return (Ly0-py)/(Ly0-Ly1)*ymaxL;};
  // panel prawy: leverage vs |std reszta|
  var Rx0=472,Rx1=676,Ry0=H-B,Ry1=T, hmax=0.6, rmax=6;
  var cxR=function(h){return Rx0+h/hmax*(Rx1-Rx0);};
  var cyR=function(r){return Ry0-r/rmax*(Ry0-Ry1);};

  // stałe tło: n punktów rozrzuconych wokół prostej y = 2 + 1.3x
  var BG=[], rng=mul(4321), i;
  for(i=0;i<28;i++){var bx=2+6*rng(); BG.push([bx, 2+1.3*bx+gauss(rng)*1.15]);}

  var sx=document.getElementById("f16-px"), sy=document.getElementById("f16-py");

  function ols(P){
    var n=P.length,Sx=0,Sy=0,Sxy=0,Sxx=0,k;
    for(k=0;k<n;k++){Sx+=P[k][0];Sy+=P[k][1];Sxy+=P[k][0]*P[k][1];Sxx+=P[k][0]*P[k][0];}
    var b=(Sxy-Sx*Sy/n)/(Sxx-Sx*Sx/n), a=Sy/n-b*Sx/n;
    return {a:a,b:b};
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),
        AM=cvar("--v-amber"),BGc=cvar("--bg2");

    var px=parseFloat(sx.value), py=parseFloat(sy.value);
    var all=BG.concat([[px,py]]), n=all.length, idx=n-1;

    // dopasowania
    var full=ols(all), clean=ols(BG);

    // statystyki dźwigni / reszt względem pełnego dopasowania
    var xbar=0,k; for(k=0;k<n;k++)xbar+=all[k][0]; xbar/=n;
    var Sxx=0; for(k=0;k<n;k++)Sxx+=(all[k][0]-xbar)*(all[k][0]-xbar);
    var sse=0, res=[]; for(k=0;k<n;k++){var e=all[k][1]-(full.a+full.b*all[k][0]); res.push(e); sse+=e*e;}
    var s2=sse/(n-2), s=Math.sqrt(s2);
    function lev(x){return 1/n+(x-xbar)*(x-xbar)/Sxx;}
    function stdres(k){var h=lev(all[k][0]); return res[k]/(s*Math.sqrt(1-h));}
    function cook(k){var h=lev(all[k][0]), r=stdres(k); return r*r/2*h/(1-h);}

    var hP=lev(px), eP=res[idx], rP=stdres(idx), dP=cook(idx), thr=4/n;

    // ===== PANEL LEWY =====
    var g;
    for(g=0;g<=ymaxL;g+=4){svg.appendChild(E("line",{x1:Lx0,y1:cyL(g),x2:Lx1,y2:cyL(g),stroke:GRID,"stroke-width":1}));
      svg.appendChild(E("text",{x:Lx0-7,y:cyL(g)+3.5,"text-anchor":"end","font-size":9,fill:MUT},String(g)));}
    for(g=0;g<=xmaxL;g+=2){svg.appendChild(E("text",{x:cxL(g),y:Ly0+15,"text-anchor":"middle","font-size":9,fill:MUT},String(g)));}
    svg.appendChild(E("line",{x1:Lx0,y1:Ly0,x2:Lx1,y2:Ly0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:Lx0,y1:Ly0,x2:Lx0,y2:Ly1,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("text",{x:(Lx0+Lx1)/2,y:H-6,"text-anchor":"middle","font-size":10.5,fill:MUT},"x"));
    svg.appendChild(E("text",{x:Lx0-30,y:(Ly0+Ly1)/2,"text-anchor":"middle","font-size":10.5,fill:MUT,transform:"rotate(-90 "+(Lx0-30)+" "+((Ly0+Ly1)/2)+")"},"y"));
    svg.appendChild(E("text",{x:Lx0+4,y:Ly1+11,"font-size":11,"font-weight":700,fill:INK2},"chmura + prosta OLS"));

    // linia x̄
    svg.appendChild(E("line",{x1:cxL(xbar),y1:Ly0,x2:cxL(xbar),y2:Ly1,stroke:MUT,"stroke-width":1,"stroke-dasharray":"3 4",opacity:.7}));
    svg.appendChild(E("text",{x:cxL(xbar),y:Ly1+22,"text-anchor":"middle","font-size":9.5,fill:MUT},"x̄"));

    // prosta bez punktu (odniesienie)
    svg.appendChild(E("line",{x1:cxL(0),y1:cyL(clean.a),x2:cxL(xmaxL),y2:cyL(clean.a+clean.b*xmaxL),
      stroke:MUT,"stroke-width":1.6,"stroke-dasharray":"5 4",opacity:.85}));
    svg.appendChild(E("text",{x:cxL(xmaxL)-3,y:cyL(clean.a+clean.b*xmaxL)-5,"text-anchor":"end","font-size":9.5,fill:MUT},"bez punktu"));

    // odcinek reszty ruchomego punktu
    var yhat=full.a+full.b*px;
    svg.appendChild(E("line",{x1:cxL(px),y1:cyL(py),x2:cxL(px),y2:cyL(yhat),stroke:OR,"stroke-width":2,"stroke-dasharray":"2 3",opacity:.9}));

    // prosta OLS (wszystkie punkty)
    svg.appendChild(E("line",{x1:cxL(0),y1:cyL(full.a),x2:cxL(xmaxL),y2:cyL(full.a+full.b*xmaxL),
      stroke:INK,"stroke-width":2.6,"stroke-linecap":"round"}));
    svg.appendChild(E("text",{x:cxL(0)+4,y:cyL(full.a)-6,"font-size":9.5,"font-weight":700,fill:INK2},"OLS"));

    // punkty tła
    for(k=0;k<BG.length;k++)svg.appendChild(E("circle",{cx:cxL(BG[k][0]),cy:cyL(BG[k][1]),r:4,fill:BL,"fill-opacity":.85}));
    // ruchomy punkt
    svg.appendChild(E("circle",{cx:cxL(px),cy:cyL(py),r:8,fill:OR,stroke:BGc,"stroke-width":2,style:"cursor:move"}));
    svg.appendChild(E("text",{x:cxL(px),y:cyL(py)-13,"text-anchor":"middle","font-size":10,"font-weight":700,fill:OR},"przeciągnij ✥"));

    // ===== PANEL PRAWY: leverage vs |std reszta| z konturami Cooka =====
    for(g=0;g<=rmax;g+=1){svg.appendChild(E("line",{x1:Rx0,y1:cyR(g),x2:Rx1,y2:cyR(g),stroke:GRID,"stroke-width":1}));
      if(g%2===0)svg.appendChild(E("text",{x:Rx0-6,y:cyR(g)+3.5,"text-anchor":"end","font-size":9,fill:MUT},String(g)));}
    var hg; for(hg=0;hg<=hmax+1e-9;hg+=0.1){svg.appendChild(E("text",{x:cxR(hg),y:Ry0+15,"text-anchor":"middle","font-size":9,fill:MUT},hg.toFixed(1)));}
    svg.appendChild(E("line",{x1:Rx0,y1:Ry0,x2:Rx1,y2:Ry0,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:Rx0,y1:Ry0,x2:Rx0,y2:Ry1,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("text",{x:(Rx0+Rx1)/2,y:H-6,"text-anchor":"middle","font-size":10.5,fill:MUT},"leverage h"));
    svg.appendChild(E("text",{x:Rx0-30,y:(Ry0+Ry1)/2,"text-anchor":"middle","font-size":10.5,fill:MUT,transform:"rotate(-90 "+(Rx0-30)+" "+((Ry0+Ry1)/2)+")"},"|reszta stand.|"));
    svg.appendChild(E("text",{x:Rx0+4,y:Ry1+11,"font-size":11,"font-weight":700,fill:INK2},"wpływ = leverage × reszta"));

    // kontur stałej odległości Cooka: r = sqrt(D·2·(1-h)/h)
    function contour(D,col,dash,lab){
      var d="",first=true,h;
      for(h=0.02;h<=hmax+1e-9;h+=0.005){
        var r=Math.sqrt(D*2*(1-h)/h);
        if(r>rmax+2)continue;
        d+=(first?"M":"L")+cxR(h).toFixed(1)+" "+cyR(Math.min(r,rmax)).toFixed(1);
        first=false;
      }
      svg.appendChild(E("path",{d:d,fill:"none",stroke:col,"stroke-width":1.6,"stroke-dasharray":dash,opacity:.9}));
      // etykieta blisko prawego brzegu
      var hl=hmax*0.86, rl=Math.min(Math.sqrt(D*2*(1-hl)/hl),rmax-0.3);
      svg.appendChild(E("text",{x:cxR(hl),y:cyR(rl)-4,"text-anchor":"middle","font-size":9,fill:col,"font-weight":700},lab));
    }
    // strefa wpływu (D>1) — lekkie tło pod krzywą wysokich D w prawym górnym rogu
    (function(){
      var d="M "+cxR(hmax)+" "+cyR(rmax)+" ", h;
      for(h=hmax;h>=0.02;h-=0.005){var r=Math.sqrt(1*2*(1-h)/h); if(r>rmax){d+="L "+cxR(h)+" "+cyR(rmax)+" "; continue;} d+="L "+cxR(h)+" "+cyR(r)+" ";}
      d+="L "+cxR(hmax)+" "+cyR(rmax)+" Z";
      svg.appendChild(E("path",{d:d,fill:AM,"fill-opacity":.12,stroke:"none"}));
    })();
    contour(0.5,TE,"4 3","D=0.5");
    contour(1.0,AM,"0","D=1");

    // punkty tła w przestrzeni (h,|r|)
    for(k=0;k<BG.length;k++){var hh=lev(all[k][0]), rr=Math.abs(stdres(k));
      if(hh<=hmax&&rr<=rmax)svg.appendChild(E("circle",{cx:cxR(hh),cy:cyR(Math.min(rr,rmax)),r:2.6,fill:BL,"fill-opacity":.55}));}
    // ruchomy punkt w przestrzeni (h,|r|)
    var hClip=Math.min(hP,hmax), rClip=Math.min(Math.abs(rP),rmax);
    // linie pomocnicze do osi
    svg.appendChild(E("line",{x1:cxR(hClip),y1:Ry0,x2:cxR(hClip),y2:cyR(rClip),stroke:OR,"stroke-width":1,"stroke-dasharray":"2 3",opacity:.6}));
    svg.appendChild(E("line",{x1:Rx0,y1:cyR(rClip),x2:cxR(hClip),y2:cyR(rClip),stroke:OR,"stroke-width":1,"stroke-dasharray":"2 3",opacity:.6}));
    svg.appendChild(E("circle",{cx:cxR(hClip),cy:cyR(rClip),r:6.5,fill:OR,stroke:BGc,"stroke-width":2}));

    // ===== odczyty =====
    document.getElementById("f16-pxv").textContent=px.toFixed(1);
    document.getElementById("f16-pyv").textContent=py.toFixed(1);
    document.getElementById("f16-h").textContent=hP.toFixed(3);
    document.getElementById("f16-e").textContent=Math.abs(eP).toFixed(2);
    document.getElementById("f16-d").textContent=dP.toFixed(3);
    var v=document.getElementById("f16-verdict");
    if(dP>thr){v.textContent="WPŁYWOWY (Dᵢ > 4/n = "+thr.toFixed(3)+")"; v.style.color=OR;}
    else {v.textContent="mały wpływ (Dᵢ ≤ 4/n = "+thr.toFixed(3)+")"; v.style.color=TE;}
  }

  // suwaki
  sx.addEventListener("input",render);
  sy.addEventListener("input",render);

  // przeciąganie punktu (obie osie) w panelu lewym
  var dragging=false;
  function nearPoint(ev){
    var r=svg.getBoundingClientRect();
    var mx=(ev.clientX-r.left)/r.width*W, my=(ev.clientY-r.top)/r.height*H;
    var dx=mx-cxL(parseFloat(sx.value)), dy=my-cyL(parseFloat(sy.value));
    return Math.sqrt(dx*dx+dy*dy)<24;
  }
  function toData(ev){
    var r=svg.getBoundingClientRect();
    var mx=(ev.clientX-r.left)/r.width*W, my=(ev.clientY-r.top)/r.height*H;
    var nx=Math.max(1,Math.min(13.5,invxL(mx)));
    var ny=Math.max(1,Math.min(21,invyL(my)));
    sx.value=nx.toFixed(1); sy.value=ny.toFixed(1);
  }
  svg.addEventListener("pointerdown",function(ev){
    if(nearPoint(ev)){dragging=true;svg.setPointerCapture(ev.pointerId);toData(ev);render();ev.preventDefault();}
  });
  svg.addEventListener("pointermove",function(ev){if(dragging){toData(ev);render();}});
  function end(){dragging=false;}
  svg.addEventListener("pointerup",end);
  svg.addEventListener("pointercancel",end);

  document.addEventListener("themechange",render);
  render();
})();
</script>
