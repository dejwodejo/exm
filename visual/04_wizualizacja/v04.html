<figure class="viz" id="v04">
  <div class="viz-head">
    <p class="viz-title">Kwartet Anscombe'a — statystyki kłamią, kształt nie</p>
    <p class="viz-sub">Cztery zbiory o <b>identycznych</b> statystykach opisowych, lecz zupełnie różnych kształtach. Najedź na punkt, aby odczytać wartości; włącz „pokaż statystyki”, aby zobaczyć te same liczby w każdym panelu.</p>
  </div>
  <div class="viz-body">
    <svg id="v04-svg" viewBox="0 0 680 360" role="img" aria-label="Cztery wykresy rozrzutu kwartetu Anscombe'a o identycznych statystykach i tej samej prostej regresji"></svg>
  </div>
  <div class="viz-controls">
    <span class="toggle" id="v04-line" role="button" tabindex="0" aria-pressed="true">Wspólna prosta ŷ = 3 + 0,5·x</span>
    <span class="toggle" id="v04-stats" role="button" tabindex="0" aria-pressed="false">Pokaż statystyki</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)" id="v04-read">Najedź na punkt, aby odczytać (x; y).</span>
  </div>
  <figcaption><b>Sedno:</b> te same liczby, cztery różne światy — I liniowy, II krzywoliniowy (prosta nie pasuje), III liniowy z jednym outlierem na y ciągnącym prostą, IV cała zależność wisi na jednym punkcie o skrajnym x (wysoki leverage). Dlatego: <b>rysuj, zanim policzysz</b>.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v04-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  function pl(v,d){return (typeof d==="undefined"?v.toFixed(1):v.toFixed(d)).replace(".",",");}

  // --- dane (kwartet Anscombe'a, na sztywno) ---
  var xC=[10,8,13,9,11,14,6,4,12,7,5];
  var xIV=[8,8,8,8,8,8,8,19,8,8,8];
  var panels=[
    {id:"I",  sub:"liniowy",             x:xC,  y:[8.04,6.95,7.58,8.81,8.33,9.96,7.24,4.26,10.84,4.82,5.68], mark:-1},
    {id:"II", sub:"krzywoliniowy",       x:xC,  y:[9.14,8.14,8.74,8.77,9.26,8.10,6.13,3.10,9.13,7.26,4.74],  mark:-1},
    {id:"III",sub:"outlier na y",        x:xC,  y:[7.46,6.77,12.74,7.11,7.81,8.84,6.08,5.39,8.15,6.42,5.73], mark:2},
    {id:"IV", sub:"wysoki leverage (x)", x:xIV, y:[6.58,5.76,7.71,8.84,8.47,7.04,5.25,12.50,5.56,7.91,6.89], mark:7}
  ];
  // wspólne statystyki (identyczne dla wszystkich): x̄=9,0 · ȳ=7,5 · r=0,816 · ŷ=3+0,5x
  var reg=function(x){return 3+0.5*x;};

  // --- geometria: wspólna skala dla wszystkich paneli ---
  var DX=[3,20], DY=[2,13.5];
  var colX=[46,390], rowY=[34,206], pw=250, ph=122;

  var readEl=document.getElementById("v04-read");
  var tipData=null;

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),
        GRID=cvar("--v-grid"),AX=cvar("--v-axis"),BG=cvar("--bg2"),
        BL=cvar("--v-blue"),OR=cvar("--v-orange"),AM=cvar("--v-amber");
    var showLine=document.getElementById("v04-line").getAttribute("aria-pressed")==="true";
    var showStats=document.getElementById("v04-stats").getAttribute("aria-pressed")==="true";

    panels.forEach(function(p,i){
      var ox=colX[i%2], oy=rowY[i<2?0:1];
      var sx=function(v){return ox+(v-DX[0])/(DX[1]-DX[0])*pw;};
      var sy=function(v){return oy+ph-(v-DY[0])/(DY[1]-DY[0])*ph;};

      // ramka + siatka
      svg.appendChild(E("rect",{x:ox,y:oy,width:pw,height:ph,fill:"none",stroke:GRID,"stroke-width":1,rx:4}));
      for(var gx=5;gx<=15;gx+=5){svg.appendChild(E("line",{x1:sx(gx),y1:oy,x2:sx(gx),y2:oy+ph,stroke:GRID,"stroke-width":1,opacity:.5}));}
      for(var gy=4;gy<=12;gy+=4){svg.appendChild(E("line",{x1:ox,y1:sy(gy),x2:ox+pw,y2:sy(gy),stroke:GRID,"stroke-width":1,opacity:.5}));}
      svg.appendChild(E("line",{x1:ox,y1:oy+ph,x2:ox+pw,y2:oy+ph,stroke:AX,"stroke-width":1.3}));

      // tytuł panelu
      svg.appendChild(E("text",{x:ox,y:oy-8,"font-size":12.5,"font-weight":700,fill:INK},"Zbiór "+p.id));
      svg.appendChild(E("text",{x:ox+pw,y:oy-8,"text-anchor":"end","font-size":11,fill:MUT},p.sub));

      // wspólna prosta regresji
      if(showLine){
        svg.appendChild(E("line",{x1:sx(DX[0]),y1:sy(reg(DX[0])),x2:sx(DX[1]),y2:sy(reg(DX[1])),
          stroke:OR,"stroke-width":2.4,"stroke-linecap":"round",opacity:.9}));
      }

      // punkty
      for(var k=0;k<p.x.length;k++){
        var special=(k===p.mark);
        var c=E("circle",{cx:sx(p.x[k]).toFixed(1),cy:sy(p.y[k]).toFixed(1),
          r:special?5.4:4.4, fill:special?AM:BL, stroke:BG,"stroke-width":1.6,
          tabindex:0, role:"img", "aria-label":"Zbiór "+p.id+", x "+pl(p.x[k])+", y "+pl(p.y[k],2)});
        c.style.cursor="pointer";
        (function(pid,px,py,sp){
          function on(){ tipData={pid:pid,x:px,y:py,special:sp}; readEl.textContent="Zbiór "+pid+" · ("+pl(px)+"; "+pl(py,2)+")"+(sp?" — punkt kluczowy":""); drawTip(sx,sy); }
          function off(){ tipData=null; readEl.textContent="Najedź na punkt, aby odczytać (x; y)."; drawTip(sx,sy); }
          c.addEventListener("mouseenter",on); c.addEventListener("mouseleave",off);
          c.addEventListener("focus",on); c.addEventListener("blur",off);
        })(p.id,p.x[k],p.y[k],special);
        svg.appendChild(c);
        if(special){
          svg.appendChild(E("text",{x:sx(p.x[k])+(p.id==="IV"?-8:8),y:sy(p.y[k])-8,
            "text-anchor":p.id==="IV"?"end":"start","font-size":10,"font-weight":700,fill:AM},
            p.id==="III"?"outlier":"leverage"));
        }
      }

      // panel statystyk (identyczne liczby w każdym zbiorze)
      if(showStats){
        var bx=ox+6, by=oy+6, bw=150, bh=34;
        svg.appendChild(E("rect",{x:bx,y:by,width:bw,height:bh,rx:5,fill:BG,stroke:GRID,"stroke-width":1,opacity:.95}));
        svg.appendChild(E("text",{x:bx+8,y:by+14,"font-size":10,"font-family":cvar("--mono"),fill:INK},"x̄=9,0  ȳ=7,5  r=0,816"));
        svg.appendChild(E("text",{x:bx+8,y:by+27,"font-size":10,"font-family":cvar("--mono"),fill:INK2},"ŷ = 3 + 0,5·x"));
      }
    });

    // globalne etykiety osi (małe wielokrotności — wspólna skala)
    svg.appendChild(E("text",{x:340,y:352,"text-anchor":"middle","font-size":11,fill:MUT},"x → (ta sama skala we wszystkich panelach)"));

    // warstwa tooltipa (na wierzchu) — odtwarzana wg aktywnego panelu
    drawTip();
  }

  var tipG=null;
  function drawTip(){
    if(tipG&&tipG.parentNode)tipG.parentNode.removeChild(tipG);
    tipG=null;
    if(!tipData)return;
    // znajdź panel i skalę
    var idx=-1; panels.forEach(function(p,i){if(p.id===tipData.pid)idx=i;});
    if(idx<0)return;
    var ox=colX[idx%2], oy=rowY[idx<2?0:1];
    var sx=ox+(tipData.x-DX[0])/(DX[1]-DX[0])*pw;
    var sy=oy+ph-(tipData.y-DY[0])/(DY[1]-DY[0])*ph;
    var INK=cvar("--ink"),BG=cvar("--bg2"),AM=cvar("--v-amber"),GRID=cvar("--v-grid");
    var label="("+pl(tipData.x)+"; "+pl(tipData.y,2)+")";
    var w=label.length*6.4+16, h=20;
    var tx=sx-w/2; if(tx<ox)tx=ox; if(tx+w>ox+pw)tx=ox+pw-w;
    var ty=sy-h-10; if(ty<oy)ty=sy+10;
    var g=E("g",{});
    g.appendChild(E("circle",{cx:sx.toFixed(1),cy:sy.toFixed(1),r:7,fill:"none",stroke:AM,"stroke-width":2}));
    g.appendChild(E("rect",{x:tx.toFixed(1),y:ty.toFixed(1),width:w.toFixed(1),height:h,rx:5,fill:BG,stroke:GRID,"stroke-width":1}));
    g.appendChild(E("text",{x:(tx+w/2).toFixed(1),y:(ty+14).toFixed(1),"text-anchor":"middle","font-size":11,"font-family":cvar("--mono"),fill:INK},label));
    svg.appendChild(g);
    tipG=g;
  }

  function bindToggle(id){
    var t=document.getElementById(id);
    function tog(){t.setAttribute("aria-pressed",t.getAttribute("aria-pressed")==="true"?"false":"true");render();}
    t.addEventListener("click",tog);
    t.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();tog();}});
  }
  bindToggle("v04-line");
  bindToggle("v04-stats");
  document.addEventListener("themechange",render);
  render();
})();
</script>
