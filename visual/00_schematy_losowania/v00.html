<figure class="viz" id="v00">
  <div class="viz-head">
    <p class="viz-title">Cztery schematy, ta sama populacja i ten sam n</p>
    <p class="viz-sub">Populacja N=64 (siatka 8×8) w 4 warstwach po 16 jednostek. Każdy panel losuje n=16 innym schematem — porównaj pokrycie warstw i efekt projektu (DEFF).</p>
  </div>
  <div class="viz-body">
    <svg id="v00-svg" viewBox="0 0 680 300" role="img" aria-label="Małe wielokrotności: cztery schematy losowania na tej samej populacji 8x8 z podziałem na cztery warstwy"></svg>
  </div>
  <div class="viz-controls">
    <span class="toggle" id="v00-all"  role="button" tabindex="0" aria-pressed="true">Wszystkie</span>
    <span class="toggle" id="v00-srs"  role="button" tabindex="0" aria-pressed="false">SRS proste</span>
    <span class="toggle" id="v00-str"  role="button" tabindex="0" aria-pressed="false">Warstwowe</span>
    <span class="toggle" id="v00-sys"  role="button" tabindex="0" aria-pressed="false">Systematyczne</span>
    <span class="toggle" id="v00-clu"  role="button" tabindex="0" aria-pressed="false">Grupowe</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)" id="v00-read">Ten sam n=16 w każdym panelu — o precyzji decyduje wyłącznie struktura doboru.</span>
  </div>
  <figcaption><b>Sedno:</b> przy tej samej liczebności próby n to <b>struktura doboru</b>, a nie n, decyduje o precyzji — warstwowe równomiernie pokrywa warstwy (DEFF&lt;1), grupowe zostawia całe warstwy puste (DEFF&gt;1).</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v00-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}

  // --- dane deterministyczne: N=64 (8x8), 4 warstwy po 16 (pasma 2 wierszy), n=16, k=N/n=4 ---
  var GRID=8, CELL=14, GAP=1;
  function warstwa(idx){return Math.floor(Math.floor(idx/GRID)/2);} // 0..3 -> A,B,C,D
  function counts(sel){var c=[0,0,0,0];sel.forEach(function(i){c[warstwa(i)]++;});return c;}

  var SCHEMES=[
    {key:"srs", name:"SRS proste", deff:"DEFF = 1", tone:"neu",
     sel:[1,3,6,8,13, 18,27,30, 33,36,41,45, 49,52,58,60],
     note:"losowo, bez gwarancji balansu warstw"},
    {key:"str", name:"Warstwowe", deff:"DEFF < 1", tone:"good",
     sel:[1,4,11,14, 17,21,26,29, 33,38,42,46, 49,53,58,62],
     note:"po 4 z każdej warstwy — pełne, równe pokrycie"},
    {key:"sys", name:"Systematyczne", deff:"DEFF ≈ 1", tone:"neu",
     sel:[1,5,9,13,17,21,25,29,33,37,41,45,49,53,57,61],
     note:"co k=4 jednostka — tu ukryta stratyfikacja"},
    {key:"clu", name:"Grupowe", deff:"DEFF > 1", tone:"bad",
     sel:[0,1,8,9, 4,5,12,13, 18,19,26,27, 22,23,30,31],
     note:"całe warstwy C i D pozostają nieobjęte"}
  ];

  var order=["all","srs","str","sys","clu"];
  var idMap={all:"v00-all",srs:"v00-srs",str:"v00-str",sys:"v00-sys",clu:"v00-clu"};
  var active="all", hovered=null;

  // layout: 4 panele w rzędzie
  var PX=[8,178,348,518], STRIDE=170, PANELW=158;
  var gridW=GRID*CELL, GX0=function(p){return PX[p]+(PANELW-gridW)/2;};
  var GY=52, COVY=GY+GRID*CELL+16, COVH=11;

  function drawPanel(p, cols, S, emph){
    var W=[cvar("--v-blue"),cvar("--v-orange"),cvar("--v-teal"),cvar("--v-amber")];
    var INK=cvar("--ink"), MUT=cvar("--muted"), BG=cvar("--bg2"), RULE=cvar("--rule");
    var toneCol = S.tone==="good"?cvar("--v-teal") : S.tone==="bad"?cvar("--v-orange") : cvar("--muted");
    var px=PX[p], gx=GX0(p);
    var g=E("g",{opacity:emph?1:0.32});

    // tytuł
    g.appendChild(E("text",{x:px+PANELW/2,y:22,"text-anchor":"middle","font-size":12.5,"font-weight":700,fill:INK},S.name));
    // badge DEFF
    g.appendChild(E("rect",{x:gx,y:28,width:gridW,height:16,rx:8,fill:"none",stroke:toneCol,"stroke-width":1.4}));
    g.appendChild(E("text",{x:px+PANELW/2,y:39.5,"text-anchor":"middle","font-size":11,"font-weight":700,"font-family":cvar("--mono"),fill:toneCol},S.deff));

    // siatka 8x8
    var selSet={}; S.sel.forEach(function(i){selSet[i]=1;});
    for(var idx=0;idx<64;idx++){
      var r=Math.floor(idx/GRID), c=idx%GRID, w=warstwa(idx);
      var x=gx+c*CELL, y=GY+r*CELL, on=selSet[idx];
      g.appendChild(E("rect",{x:x,y:y,width:CELL-GAP,height:CELL-GAP,rx:2,
        fill:W[w], "fill-opacity":on?1:0.16,
        stroke:on?INK:"none","stroke-width":on?1.1:0}));
    }

    // pasek pokrycia warstw (stacked, suma=16)
    var cx=gx, cnt=cols;
    g.appendChild(E("text",{x:gx,y:COVY-4,"font-size":9.5,fill:MUT},"pokrycie warstw"));
    for(var w2=0;w2<4;w2++){
      var seg=cnt[w2]/16*gridW;
      if(seg>0){
        g.appendChild(E("rect",{x:cx,y:COVY,width:seg,height:COVH,fill:W[w2],"fill-opacity":.9}));
        cx+=seg;
      }
    }
    g.appendChild(E("rect",{x:gx,y:COVY,width:gridW,height:COVH,rx:1,fill:"none",stroke:RULE,"stroke-width":1}));
    // liczności A/B/C/D
    var lbl="A"+cnt[0]+"  B"+cnt[1]+"  C"+cnt[2]+"  D"+cnt[3];
    g.appendChild(E("text",{x:px+PANELW/2,y:COVY+COVH+13,"text-anchor":"middle","font-size":10,"font-family":cvar("--mono"),fill:MUT},lbl));

    svg.appendChild(g);

    // przezroczysty obszar hover
    var hit=E("rect",{x:px,y:8,width:PANELW,height:COVY+COVH+18,fill:"transparent",style:"cursor:pointer"});
    hit.addEventListener("mouseenter",function(){hovered=S.key;render();});
    hit.addEventListener("mouseleave",function(){hovered=null;render();});
    hit.addEventListener("click",function(){setActive(S.key);});
    svg.appendChild(hit);
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var eff = hovered || active;
    for(var p=0;p<4;p++){
      var S=SCHEMES[p];
      var emph = (eff==="all") || (eff===S.key);
      drawPanel(p, counts(S.sel), S, emph);
    }
    // legenda warstw
    var W=[cvar("--v-blue"),cvar("--v-orange"),cvar("--v-teal"),cvar("--v-amber")];
    var names=["warstwa A","warstwa B","warstwa C","warstwa D"];
    var MUT=cvar("--muted"), lx=8, ly=290;
    for(var i=0;i<4;i++){
      svg.appendChild(E("rect",{x:lx,y:ly-9,width:11,height:11,rx:2,fill:W[i]}));
      svg.appendChild(E("text",{x:lx+16,y:ly,"font-size":11,fill:MUT},names[i]));
      lx+=Math.floor(names[i].length*6.4)+40;
    }
    // podpis populacji
    svg.appendChild(E("text",{x:672,y:290,"text-anchor":"end","font-size":11,fill:MUT},"N=64 · n=16 · k=4"));

    // odczyt kontrolek + aria
    order.forEach(function(k){document.getElementById(idMap[k]).setAttribute("aria-pressed", active===k?"true":"false");});
    var read=document.getElementById("v00-read"), effK=hovered||active;
    if(effK==="all"){
      read.textContent="Ten sam n=16 w każdym panelu — o precyzji decyduje wyłącznie struktura doboru.";
    } else {
      var S=SCHEMES.filter(function(s){return s.key===effK;})[0], c=counts(S.sel);
      read.textContent=S.name+": pokrycie A/B/C/D = "+c[0]+"/"+c[1]+"/"+c[2]+"/"+c[3]+" · "+S.deff+" — "+S.note+".";
    }
  }

  function setActive(k){active=k;hovered=null;render();}
  order.forEach(function(k){
    var el=document.getElementById(idMap[k]);
    el.addEventListener("click",function(){setActive(k);});
    el.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();setActive(k);}});
  });
  document.addEventListener("themechange",render);
  render();
})();
</script>
