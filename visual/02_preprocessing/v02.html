<figure class="viz" id="v02">
  <div class="viz-head">
    <p class="viz-title">Ten sam zbiór, trzy skalowania: co dzieje się z rozdzielczością inlierów</p>
    <p class="viz-sub">Dziesięć „normalnych” punktów + jeden outlier, narysowane na wspólnej osi jednostek po min-max, z-score i robust. Przesuń outlier w prawo i zobacz, jak inliery zlepiają się w jeden punkt przy min-max/z-score, a robust je rozdziela.</p>
  </div>
  <div class="viz-body">
    <svg id="v02-svg" viewBox="0 0 680 340" role="img" aria-label="Trzy osie liczbowe: te same punkty po skalowaniu min-max, z-score i robust; rozstęp inlierów wynosi około 0,08, 0,28 i 1,60 jednostki"></svg>
  </div>
  <div class="viz-controls">
    <label>Pozycja outliera x
      <input id="v02-o" type="range" min="6" max="100" step="1" value="50">
      <span class="val" id="v02-ov">50</span>
    </label>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      rozstęp inlierów: min-max <b id="v02-mm">–</b> · z-score <b id="v02-z">–</b> · robust <b id="v02-r">–</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> wszystkie trzy to przekształcenia afiniczne, więc układ punktów jest ten sam — różni się tylko jednostka. Min-max wtłacza dane w <span style="font-family:var(--mono)">[0,1]</span> i zlepia inliery (rozstęp ≈ 0,08); z-score skaluje przez σ nadmuchane przez outlier (≈ 0,28); robust używa mediany i IQR odpornych na outlier, więc inliery zostają rozdzielone (≈ 1,60) niezależnie od tego, jak daleko odjedzie outlier.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v02-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}

  // — stałe dane ilustracyjne (10 inlierów, rozstęp 4, mediana 3, IQR 2,5) —
  var INL=[1.0,1.3,1.4,1.6,2.5,3.0,3.6,3.9,4.1,5.0];

  function mean(a){var s=0,i;for(i=0;i<a.length;i++)s+=a[i];return s/a.length;}
  function std(a){var m=mean(a),s=0,i;for(i=0;i<a.length;i++)s+=(a[i]-m)*(a[i]-m);return Math.sqrt(s/(a.length-1));}
  function quant(sorted,p){var n=sorted.length,pos=p*(n-1),lo=Math.floor(pos),hi=Math.ceil(pos),f=pos-lo;return sorted[lo]+(sorted[hi]-sorted[lo])*f;}

  // geometria: wspólna oś jednostek dla wszystkich trzech paneli
  var W=680,H=340,x0=100,x1=662, D0=-1.6,D1=3.5, SPAN=D1-D0, PW=x1-x0;
  var X=function(u){return x0+(u-D0)/SPAN*PW;};
  var PY=[100,168,236];               // linie bazowe paneli
  var GY0=60, GY1=270;                 // zakres pionowych siatek
  var GRIDU=[-1,0,1,2,3];

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),
        AX=cvar("--v-axis"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),BG=cvar("--bg2");

    var O=parseFloat(document.getElementById("v02-o").value);
    var data=INL.concat([O]).slice().sort(function(a,b){return a-b;});
    var mn=data[0], mx=data[data.length-1];
    var mu=mean(data), sd=std(data);
    var med=quant(data,0.5), q1=quant(data,0.25), q3=quant(data,0.75), iqr=q3-q1;

    // pionowe linie odniesienia (wspólna skala) + etykiety osi
    var i,g;
    for(i=0;i<GRIDU.length;i++){
      g=GRIDU[i];
      var emph=(g===0);
      svg.appendChild(E("line",{x1:X(g),y1:GY0,x2:X(g),y2:GY1,stroke:emph?AX:GRID,"stroke-width":emph?1.3:1,opacity:emph?.8:1}));
      svg.appendChild(E("text",{x:X(g),y:GY1+18,"text-anchor":"middle","font-size":10.5,fill:MUT},String(g)));
    }
    svg.appendChild(E("text",{x:(x0+x1)/2,y:H-8,"text-anchor":"middle","font-size":11,fill:MUT},"wartość po skalowaniu — wspólna skala jednostek →"));

    var panels=[
      {name:"min-max", unit:"zakres [0,1]", f:function(x){return (x-mn)/(mx-mn);}},
      {name:"z-score", unit:"1 jedn. = σ", f:function(x){return (x-mu)/sd;}},
      {name:"robust",  unit:"1 jedn. = IQR", f:function(x){return (x-med)/iqr;}}
    ];
    var reads=[];

    for(i=0;i<panels.length;i++){
      var p=panels[i], y=PY[i];
      var tv=INL.map(p.f);
      var tmin=Math.min.apply(null,tv), tmax=Math.max.apply(null,tv), rng=tmax-tmin;
      var tout=p.f(O);
      reads.push(rng);

      // etykieta panelu (nazwa + jednostka) po lewej
      svg.appendChild(E("text",{x:x0-14,y:y-3,"text-anchor":"end","font-size":12.5,"font-weight":700,fill:INK},p.name));
      svg.appendChild(E("text",{x:x0-14,y:y+12,"text-anchor":"end","font-size":9.5,fill:MUT},p.unit));

      // linia bazowa panelu
      svg.appendChild(E("line",{x1:x0,y1:y,x2:x1,y2:y,stroke:AX,"stroke-width":1.3}));

      // klamra rozstępu inlierów
      var bx0=X(Math.max(tmin,D0)), bx1=X(Math.min(tmax,D1)), by=y-20;
      if(bx1-bx0<2){bx0-=1;bx1+=1;}
      svg.appendChild(E("line",{x1:bx0,y1:by,x2:bx1,y2:by,stroke:TE,"stroke-width":1.6}));
      svg.appendChild(E("line",{x1:bx0,y1:by,x2:bx0,y2:by+5,stroke:TE,"stroke-width":1.6}));
      svg.appendChild(E("line",{x1:bx1,y1:by,x2:bx1,y2:by+5,stroke:TE,"stroke-width":1.6}));
      svg.appendChild(E("text",{x:(bx0+bx1)/2,y:by-5,"text-anchor":"middle","font-size":11,"font-weight":700,fill:TE},"rozstęp "+rng.toFixed(2)));

      // punkty inlierów (półprzezroczyste — nakładanie pokazuje zlepienie)
      for(g=0;g<tv.length;g++){
        var ux=tv[g]; if(ux<D0-0.05||ux>D1+0.05)continue;
        svg.appendChild(E("circle",{cx:X(ux),cy:y,r:4.6,fill:BL,opacity:.62,stroke:BG,"stroke-width":1}));
      }

      // outlier
      if(tout<=D1){
        svg.appendChild(E("circle",{cx:X(tout),cy:y,r:6,fill:OR,stroke:BG,"stroke-width":1.6}));
        svg.appendChild(E("text",{x:X(tout),y:y-11,"text-anchor":"middle","font-size":9.5,"font-weight":700,fill:OR},"outlier"));
      }else{
        // poza skalą w prawo — strzałka przy krawędzi
        svg.appendChild(E("path",{d:"M"+(x1-13)+" "+(y-6)+" L"+(x1-1)+" "+y+" L"+(x1-13)+" "+(y+6)+" Z",fill:OR}));
        svg.appendChild(E("text",{x:x1-18,y:y-11,"text-anchor":"end","font-size":9.5,"font-weight":700,fill:OR},"outlier "+tout.toFixed(0)+"→"));
      }
    }

    // odczyty na żywo
    document.getElementById("v02-ov").textContent=O.toFixed(0);
    document.getElementById("v02-mm").textContent=reads[0].toFixed(2);
    document.getElementById("v02-z").textContent=reads[1].toFixed(2);
    document.getElementById("v02-r").textContent=reads[2].toFixed(2);
  }

  document.getElementById("v02-o").addEventListener("input",render);
  document.addEventListener("themechange",render);
  render();
})();
</script>
