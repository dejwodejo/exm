<figure class="viz" id="v13">
  <div class="viz-head">
    <p class="viz-title">Podobieństwo kosinusowe: kąt, nie długość</p>
    <p class="viz-sub">Dwa dokumenty jako wektory w przestrzeni dwóch termów (osie = waga TF-IDF). Obracaj wektor dok. B i zmieniaj jego długość — cos θ zależy tylko od kąta między kierunkami.</p>
  </div>
  <div class="viz-body">
    <svg id="v13-svg" viewBox="0 0 680 340" role="img" aria-label="Dwa wektory dokumentów w przestrzeni dwóch termów; kąt między nimi wyznacza podobieństwo kosinusowe"></svg>
  </div>
  <div class="viz-controls">
    <label>Kąt wektora dok. B
      <input id="v13-ang" type="range" min="0" max="90" step="1" value="60">
      <span class="val" id="v13-angv">60°</span>
    </label>
    <label>Długość dok. B (liczność termów)
      <input id="v13-len" type="range" min="1.2" max="4.8" step="0.1" value="3.0">
      <span class="val" id="v13-lenv">3.0</span>
    </label>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      θ=<b id="v13-theta">–</b> · <b>cos θ=<span id="v13-cos">–</span></b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> kąt między wektorami wyznacza podobieństwo — wydłużenie dokumentu (dłuższy wektor) nie zmienia kierunku, więc cos θ pozostaje ten sam. Dla nieujemnych wag TF-IDF kąt mieści się w [0°, 90°], a cos θ w [0, 1].</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v13-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}
  var Ox=60, Oy=300, SC=46, MAXW=5;           // origin, px na jednostkę wagi, zakres osi
  var AX_A=18, LEN_A=4.2;                       // dok. A: kąt stały, długość stała
  var DEG=Math.PI/180;
  function pt(len,angDeg){var r=angDeg*DEG;return [Ox+len*SC*Math.cos(r), Oy-len*SC*Math.sin(r)];}

  function arrow(g,tip,angDeg,color,w){
    g.appendChild(E("line",{x1:Ox,y1:Oy,x2:tip[0].toFixed(1),y2:tip[1].toFixed(1),stroke:color,"stroke-width":w,"stroke-linecap":"round"}));
    var s;for(var i=0;i<2;i++){s=(i?1:-1)*22;var a=(angDeg+s)*DEG;
      g.appendChild(E("line",{x1:tip[0].toFixed(1),y1:tip[1].toFixed(1),
        x2:(tip[0]-13*Math.cos(a)).toFixed(1),y2:(tip[1]+13*Math.sin(a)).toFixed(1),
        stroke:color,"stroke-width":w,"stroke-linecap":"round"}));}
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),GRID=cvar("--v-grid"),AX=cvar("--v-axis"),
        BL=cvar("--v-blue"),OR=cvar("--v-orange"),TE=cvar("--v-teal"),AM=cvar("--v-amber"),
        BG=cvar("--bg2"),RULE=cvar("--rule");

    var angB=parseFloat(document.getElementById("v13-ang").value);
    var lenB=parseFloat(document.getElementById("v13-len").value);
    var theta=Math.abs(AX_A-angB);
    var cosv=Math.cos(theta*DEG);

    // --- lewa część: przestrzeń wektorowa ---
    for(var g=1;g<=MAXW;g++){                    // siatka
      var gx=Ox+g*SC, gy=Oy-g*SC;
      svg.appendChild(E("line",{x1:Ox,y1:gy,x2:Ox+MAXW*SC,y2:gy,stroke:GRID,"stroke-width":1,opacity:.6}));
      svg.appendChild(E("line",{x1:gx,y1:Oy,x2:gx,y2:Oy-MAXW*SC,stroke:GRID,"stroke-width":1,opacity:.6}));
      svg.appendChild(E("text",{x:Ox-7,y:gy+4,"text-anchor":"end","font-size":9.5,fill:MUT},String(g)));
      svg.appendChild(E("text",{x:gx,y:Oy+14,"text-anchor":"middle","font-size":9.5,fill:MUT},String(g)));
    }
    svg.appendChild(E("line",{x1:Ox,y1:Oy,x2:Ox+MAXW*SC,y2:Oy,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("line",{x1:Ox,y1:Oy,x2:Ox,y2:Oy-MAXW*SC,stroke:AX,"stroke-width":1.4}));
    svg.appendChild(E("text",{x:Ox+MAXW*SC,y:Oy+30,"text-anchor":"end","font-size":11,fill:INK2},"waga TF-IDF: term A →"));
    svg.appendChild(E("text",{x:Ox-2,y:Oy-MAXW*SC-8,"text-anchor":"middle","font-size":11,fill:INK2},"term B ↑"));

    // łuk kąta między wektorami
    var lo=Math.min(AX_A,angB), hi=Math.max(AX_A,angB), rr=42, dArc="";
    for(var i=0;i<=30;i++){var a=(lo+(hi-lo)*i/30)*DEG;
      dArc+=(i?"L":"M")+(Ox+rr*Math.cos(a)).toFixed(1)+" "+(Oy-rr*Math.sin(a)).toFixed(1);}
    svg.appendChild(E("path",{d:dArc,fill:"none",stroke:AM,"stroke-width":2}));
    var mid=(lo+hi)/2*DEG;
    svg.appendChild(E("text",{x:(Ox+(rr+16)*Math.cos(mid)).toFixed(1),y:(Oy-(rr+16)*Math.sin(mid)+4).toFixed(1),
      "text-anchor":"middle","font-size":11,"font-weight":700,fill:AM},"θ"));

    // wektory
    var tipA=pt(LEN_A,AX_A), tipB=pt(lenB,angB);
    arrow(svg,tipA,AX_A,BL,3);
    arrow(svg,tipB,angB,OR,3);
    svg.appendChild(E("circle",{cx:Ox,cy:Oy,r:3.5,fill:INK}));
    svg.appendChild(E("text",{x:(tipA[0]+10).toFixed(1),y:(tipA[1]-2).toFixed(1),"font-size":11,"font-weight":700,fill:BL},"dok. A"));
    svg.appendChild(E("text",{x:(tipB[0]+8).toFixed(1),y:(tipB[1]-3).toFixed(1),"font-size":11,"font-weight":700,fill:OR},"dok. B"));

    // --- prawa część: miernik podobieństwa ---
    var px0=380, px1=650, by=196, bh=30;
    svg.appendChild(E("text",{x:px0,y:70,"font-size":12,"font-weight":700,fill:INK},"podobieństwo kosinusowe"));
    svg.appendChild(E("text",{x:px0,y:88,"font-size":11,fill:MUT},"cos θ = ⟨A,B⟩ / (‖A‖·‖B‖)"));
    // duży odczyt
    svg.appendChild(E("text",{x:px0,y:150,"font-size":40,"font-weight":700,fill:TE},cosv.toFixed(3)));
    svg.appendChild(E("text",{x:px0,y:172,"font-size":11,fill:INK2},"θ = "+theta.toFixed(0)+"°"));
    // pasek 0..1
    svg.appendChild(E("rect",{x:px0,y:by,width:px1-px0,height:bh,rx:5,fill:BG,stroke:RULE,"stroke-width":1}));
    svg.appendChild(E("rect",{x:px0,y:by,width:((px1-px0)*Math.max(0,cosv)).toFixed(1),height:bh,rx:5,fill:TE}));
    svg.appendChild(E("text",{x:px0,y:by+bh+15,"font-size":9.5,fill:MUT},"0 (prostopadłe)"));
    svg.appendChild(E("text",{x:px1,y:by+bh+15,"text-anchor":"end","font-size":9.5,fill:MUT},"1 (ten sam kierunek)"));
    svg.appendChild(E("text",{x:px0,y:by+bh+38,"font-size":10.5,fill:INK2},"długość wektora ≠ podobieństwo:"));
    svg.appendChild(E("text",{x:px0,y:by+bh+53,"font-size":10.5,fill:INK2},"dłuższy dokument, ten sam kierunek → to samo cos θ"));

    document.getElementById("v13-angv").textContent=angB.toFixed(0)+"°";
    document.getElementById("v13-lenv").textContent=lenB.toFixed(1);
    document.getElementById("v13-theta").textContent=theta.toFixed(0)+"°";
    document.getElementById("v13-cos").textContent=cosv.toFixed(3);
  }
  document.getElementById("v13-ang").addEventListener("input",render);
  document.getElementById("v13-len").addEventListener("input",render);
  document.addEventListener("themechange",render);
  render();
})();
</script>
