<figure class="viz" id="v11">
  <div class="viz-head">
    <p class="viz-title">Przepływ w przód i wstecz</p>
    <p class="viz-sub">Przełącz tor obliczeń i zobacz, jak aktywacje tworzą predykcję, a informacja o błędzie wraca do wcześniejszych warstw. Sigmoid może ją tłumić, ReLU zwykle przepuszcza skuteczniej.</p>
  </div>
  <div class="viz-body">
    <svg id="v11-svg" viewBox="0 0 680 340" role="img" aria-label="Diagram małej sieci neuronowej z przepływem aktywacji w przód i błędu wstecz oraz wykresem funkcji aktywacji i jej pochodnej"></svg>
  </div>
  <div class="viz-controls">
    <span class="toggle" id="v11-mode" role="button" tabindex="0" aria-pressed="false">Tor: w przód (a⁽ˡ⁾)</span>
    <span class="toggle" id="v11-act" role="button" tabindex="0" aria-pressed="false">Aktywacja: sigmoid</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      skala gradientu przez 3 warstwy: <b id="v11-read">–</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> w przód warstwy tworzą kolejne reprezentacje, a wstecz reguła łańcuchowa rozdziela odpowiedzialność za błąd między wagi. Wielokrotne mnożenie przez małe pochodne powoduje zanik gradientu.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v11-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}

  // ---- układ sieci (wejście -> 2 warstwy ukryte -> wyjście) ----
  var layers=[
    {name:"wejście", ys:[140,215], x:78,  sym:"a⁽⁰⁾=x"},
    {name:"ukryta 1", ys:[105,175,245], x:185, sym:"a⁽¹⁾"},
    {name:"ukryta 2", ys:[105,175,245], x:292, sym:"a⁽²⁾"},
    {name:"wyjście", ys:[175], x:399, sym:"a⁽³⁾=ŷ"}
  ];
  var dsym=["", "δ⁽¹⁾", "δ⁽²⁾", "δ⁽³⁾"];
  var R=13;

  // ---- inset: funkcja aktywacji i pochodna ----
  var px0=470, px1=652, pyT=64, pyB=284, hgt=pyB-pyT;
  function xz(z){return px0+(z+6)/12*(px1-px0);}
  function yv(v){return pyB-(v+0.3)/1.6*hgt;}            // v w [-0.3,1.3] -> pole; poza tym przycinane clipem
  function actG(z,relu){return relu?Math.max(0,z):1/(1+Math.exp(-z));}
  function actGp(z,relu){if(relu)return z>0?1:0;var s=1/(1+Math.exp(-z));return s*(1-s);}
  function curve(fn,relu){var d="",f=true;for(var z=-6;z<=6.0001;z+=0.15){d+=(f?"M":"L")+xz(z).toFixed(1)+" "+yv(fn(z,relu)).toFixed(1);f=false;}return d;}

  function tri(x,y,dir,fill){ // dir:+1 grot w prawo, -1 w lewo
    var p=dir>0?(x+","+y+" "+(x-9)+","+(y-5)+" "+(x-9)+","+(y+5)):(x+","+y+" "+(x+9)+","+(y-5)+" "+(x+9)+","+(y+5));
    return E("polygon",{points:p,fill:fill});
  }

  function render(){
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    var back=document.getElementById("v11-mode").getAttribute("aria-pressed")==="true";
    var relu=document.getElementById("v11-act").getAttribute("aria-pressed")==="true";
    var INK=cvar("--ink"),INK2=cvar("--ink2"),MUT=cvar("--muted"),BG=cvar("--bg2"),
        RULE=cvar("--rule"),BL=cvar("--v-blue"),OR=cvar("--v-orange"),
        TE=cvar("--v-teal"),AM=cvar("--v-amber"),GRID=cvar("--v-grid"),AX=cvar("--v-axis");
    var flow=back?OR:BL;

    // separator sieć | inset
    svg.appendChild(E("line",{x1:452,y1:40,x2:452,y2:300,stroke:RULE,"stroke-width":1,"stroke-dasharray":"3 4"}));

    // wzór aktualnego toru
    var f=back? "δ⁽ˡ⁾=(W⁽ˡ⁺¹⁾ᵀδ⁽ˡ⁺¹⁾)⊙φ′(z⁽ˡ⁾)"
              : "z⁽ˡ⁾=W⁽ˡ⁾a⁽ˡ⁻¹⁾+b⁽ˡ⁾,  a⁽ˡ⁾=φ(z⁽ˡ⁾)";
    svg.appendChild(E("text",{x:20,y:26,"font-family":"var(--mono)","font-size":11.5,"font-weight":700,fill:flow},f));

    // ---- krawędzie (pełne połączenia) ----
    for(var l=0;l<layers.length-1;l++){
      var A=layers[l],Bl=layers[l+1];
      for(var i=0;i<A.ys.length;i++)for(var j=0;j<Bl.ys.length;j++){
        svg.appendChild(E("line",{x1:A.x+R,y1:A.ys[i],x2:Bl.x-R,y2:Bl.ys[j],stroke:flow,"stroke-width":1.3,opacity:0.5}));
      }
    }

    // ---- strzałki kierunku toru nad kolumnami ----
    var gaps=[131,238,345], ay=48;
    for(var g=0;g<gaps.length;g++){
      if(!back){ svg.appendChild(E("line",{x1:gaps[g]-22,y1:ay,x2:gaps[g]+18,y2:ay,stroke:flow,"stroke-width":2.4}));
                 svg.appendChild(tri(gaps[g]+22,ay,1,flow)); }
      else     { svg.appendChild(E("line",{x1:gaps[g]+22,y1:ay,x2:gaps[g]-18,y2:ay,stroke:flow,"stroke-width":2.4}));
                 svg.appendChild(tri(gaps[g]-22,ay,-1,flow)); }
    }
    svg.appendChild(E("text",{x:back?60:410,y:ay-10,"text-anchor":back?"start":"end","font-size":11,"font-weight":700,fill:flow},
        back? "← błąd δ⁽ˡ⁾" : "aktywacje a⁽ˡ⁾ →"));

    // ---- znacznik ⊙φ′ przy warstwach ukrytych w torze wstecz ----
    if(back){
      for(var h=1;h<=2;h++){
        svg.appendChild(E("text",{x:layers[h].x,y:88,"text-anchor":"middle","font-family":"var(--mono)","font-size":10,"font-weight":700,
          fill:relu?TE:OR},"⊙φ′"));
      }
    }

    // ---- węzły ----
    for(var L=0;L<layers.length;L++){
      var ly=layers[L];
      for(var k=0;k<ly.ys.length;k++){
        svg.appendChild(E("circle",{cx:ly.x,cy:ly.ys[k],r:R,fill:BG,stroke:flow,"stroke-width":2.2}));
      }
      // podpis kolumny
      svg.appendChild(E("text",{x:ly.x,y:308,"text-anchor":"middle","font-size":10,fill:MUT},ly.name));
      svg.appendChild(E("text",{x:ly.x,y:324,"text-anchor":"middle","font-family":"var(--mono)","font-size":11,"font-weight":700,
        fill:back?(L===0?MUT:flow):flow}, back?(L===0?ly.sym:dsym[L]):ly.sym));
    }

    // ======== INSET ========
    // clip pola wykresu
    var defs=E("defs",{}); var cp=E("clipPath",{id:"v11-clip"});
    cp.appendChild(E("rect",{x:px0,y:pyT-2,width:px1-px0,height:hgt+4})); defs.appendChild(cp); svg.appendChild(defs);

    svg.appendChild(E("text",{x:px0,y:34,"font-size":10.5,"font-weight":700,fill:INK}, relu?"ReLU: φ(z)=max(0,z)":"Sigmoid: φ(z)=1/(1+e⁻ᶻ)"));

    // linie odniesienia
    var refs=[{v:0,t:"0"},{v:0.25,t:"0.25"},{v:1.0,t:"1"}];
    for(var r=0;r<refs.length;r++){
      var yy=yv(refs[r].v), sig=(refs[r].v===0.25);
      svg.appendChild(E("line",{x1:px0,y1:yy,x2:px1,y2:yy,stroke:sig?AM:GRID,"stroke-width":1,
        "stroke-dasharray":sig?"4 3":"none",opacity:sig?0.9:1}));
      svg.appendChild(E("text",{x:px0-4,y:yy+3.5,"text-anchor":"end","font-size":9.5,fill:sig?AM:MUT},refs[r].t));
    }
    // osie
    svg.appendChild(E("line",{x1:xz(0),y1:pyT,x2:xz(0),y2:pyB,stroke:AX,"stroke-width":1.2}));
    svg.appendChild(E("text",{x:xz(0)+4,y:pyB+13,"font-size":9.5,fill:MUT},"z=0"));
    svg.appendChild(E("text",{x:px1,y:pyB+13,"text-anchor":"end","font-size":9.5,fill:MUT},"z →"));

    // krzywe: φ(z) i φ′(z)
    var gc=E("g",{"clip-path":"url(#v11-clip)"});
    gc.appendChild(E("path",{d:curve(actG,relu),fill:"none",stroke:TE,"stroke-width":2.6,"stroke-linejoin":"round"}));
    gc.appendChild(E("path",{d:curve(actGp,relu),fill:"none",stroke:AM,"stroke-width":2.4,"stroke-dasharray":"5 3","stroke-linejoin":"round"}));
    svg.appendChild(gc);

    // legenda insetu
    svg.appendChild(E("line",{x1:px0,y1:pyB+26,x2:px0+16,y2:pyB+26,stroke:TE,"stroke-width":2.6}));
    svg.appendChild(E("text",{x:px0+20,y:pyB+29.5,"font-size":9.5,fill:INK2},"φ(z)"));
    svg.appendChild(E("line",{x1:px0+58,y1:pyB+26,x2:px0+74,y2:pyB+26,stroke:AM,"stroke-width":2.4,"stroke-dasharray":"5 3"}));
    svg.appendChild(E("text",{x:px0+78,y:pyB+29.5,"font-size":9.5,fill:INK2},"φ′(z) pochodna"));

    // ---- odczyt: skala gradientu ----
    var rd=document.getElementById("v11-read");
    if(relu){ rd.textContent="φ′=1 → 1³ = 1 (zachowany)"; rd.style.color=cvar("--v-teal"); }
    else    { rd.textContent="maks φ′=0.25 → 0.25³ ≈ 0.016 (tłumiony ~64×)"; rd.style.color=cvar("--v-orange"); }
  }

  // ---- kontrolki ----
  function bind(id,onLabel,offLabel,pre){
    var el=document.getElementById(id);
    function upd(){el.textContent=pre+(el.getAttribute("aria-pressed")==="true"?onLabel:offLabel);}
    function tog(){el.setAttribute("aria-pressed",el.getAttribute("aria-pressed")==="true"?"false":"true");upd();render();}
    el.addEventListener("click",tog);
    el.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();tog();}});
    upd();
  }
  bind("v11-mode","wstecz (δ⁽ˡ⁾)","w przód (a⁽ˡ⁾)","Tor: ");
  bind("v11-act","ReLU","sigmoid","Aktywacja: ");
  document.addEventListener("themechange",render);
  render();
})();
</script>
