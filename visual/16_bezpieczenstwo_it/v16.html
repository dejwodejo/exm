<figure class="viz" id="v16">
  <div class="viz-head">
    <p class="viz-title">Obrona w głąb: koncentryczne warstwy wokół rdzenia DANE</p>
    <p class="viz-sub">Klik lub najedź na warstwę (albo użyj przycisków) → zagrożenie i odpowiadająca mu kontrola. Włącz „Droga atakującego”, aby zobaczyć, ile warstw trzeba przełamać, by dotrzeć do wybranej.</p>
  </div>
  <div class="viz-body">
    <svg id="v16-svg" viewBox="0 0 680 340" role="img" aria-label="Diagram koncentryczny obrony w głąb: warstwy fizyczna, sieć, host/OS, aplikacja i rdzeń danych"></svg>
  </div>
  <div class="viz-controls">
    <span class="toggle" id="v16-L0" role="button" tabindex="0" aria-pressed="false">Fizyczna</span>
    <span class="toggle" id="v16-L1" role="button" tabindex="0" aria-pressed="false">Sieć</span>
    <span class="toggle" id="v16-L2" role="button" tabindex="0" aria-pressed="false">Host / OS</span>
    <span class="toggle" id="v16-L3" role="button" tabindex="0" aria-pressed="false">Aplikacja</span>
    <span class="toggle" id="v16-L4" role="button" tabindex="0" aria-pressed="true">Dane</span>
    <span class="toggle" id="v16-atk" role="button" tabindex="0" aria-pressed="false">Droga atakującego</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink2)">
      warstwa: <b id="v16-name">Dane</b> · do przełamania: <b id="v16-n">5</b>
    </span>
  </div>
  <figcaption><b>Sedno:</b> pojedynczy mechanizm zawodzi, więc kontrole układa się warstwami — atakujący musi pokonać wszystkie pierścienie (fizyczny, sieć, host/OS, aplikacja), zanim dosięgnie rdzenia z danymi; nawet po przełamaniu jednej warstwy szyfrowanie i kontrola dostępu na kolejnej wciąż chronią.</figcaption>
</figure>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg", svg=document.getElementById("v16-svg");
  var cvar=function(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();};
  function E(n,a,t){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);if(t!=null)e.textContent=t;return e;}

  var CX=172, CY=170;
  // pierścienie zewnętrzne→wewnętrzne; rO=promień zewn., rI=wewn.
  var LAYERS=[
    {name:"Fizyczna", tok:"--v-teal",
     zagr:["Kradzież sprzętu, dostęp do konsoli,","podmiana nośnika rozruchowego."],
     kontr:["Secure Boot + TPM (root of trust),","szyfrowanie at rest: LUKS / BitLocker."], rO:152, rI:122},
    {name:"Sieć", tok:"--v-blue",
     zagr:["DDoS, sniffing, MITM,","skanowanie i atak na porty."],
     kontr:["Firewall (nftables), IDS/IPS (Suricata),","TLS 1.3, VPN / IPsec."], rO:122, rI:92},
    {name:"Host / OS", tok:"--v-amber",
     zagr:["Eskalacja przywilejów, rootkit (Ring 0),","malware, exploit pamięci."],
     kontr:["Hardening: ASLR, DEP/NX (W⊕X), CFI;","MAC (SELinux); least privilege; EDR."], rO:92, rI:62},
    {name:"Aplikacja", tok:"--v-orange",
     zagr:["OWASP Top 10: SQLi, XSS,","CSRF, SSRF, injection."],
     kontr:["Prepared statements, walidacja wejścia,","WAF (ModSecurity), CSP, escaping."], rO:62, rI:32},
    {name:"Dane", tok:"--ink",
     zagr:["Utrata poufności, naruszenie","integralności, skasowanie danych."],
     kontr:["Szyfrowanie + HMAC/podpis (integralność),","ACL (least privilege), backup 3-2-1."], rO:32, rI:0}
  ];

  var selected=4;   // wybrana klikiem/przyciskiem
  var hover=null;   // podświetlona najechaniem

  function donut(rO,rI){
    var d="M "+(CX-rO)+" "+CY+" A "+rO+" "+rO+" 0 1 0 "+(CX+rO)+" "+CY+" A "+rO+" "+rO+" 0 1 0 "+(CX-rO)+" "+CY+" Z";
    if(rI>0) d+=" M "+(CX-rI)+" "+CY+" A "+rI+" "+rI+" 0 1 1 "+(CX+rI)+" "+CY+" A "+rI+" "+rI+" 0 1 1 "+(CX-rI)+" "+CY+" Z";
    return d;
  }
  // konwersja "#rrggbb" -> "rgba(...)"; obsługa też rgb()
  function rgba(col,a){
    col=col.trim();
    if(col.charAt(0)==="#"){
      var h=col.slice(1);
      if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
      var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
      return "rgba("+r+","+g+","+b+","+a+")";
    }
    var m=col.match(/rgba?\(([^)]+)\)/);
    if(m){var p=m[1].split(",");return "rgba("+p[0].trim()+","+p[1].trim()+","+p[2].trim()+","+a+")";}
    return col;
  }

  function render(){
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    var INK=cvar("--ink"), MUT=cvar("--muted"), BG=cvar("--bg2"), RULE=cvar("--v-grid"),
        WARN=cvar("--v-orange");
    var active = (hover!=null)?hover:selected;

    // --- pierścienie (od zewnątrz) ---
    for(var i=0;i<LAYERS.length;i++){
      var Ly=LAYERS[i], col=cvar(Ly.tok);
      var isAct=(i===active), crossed=(document.getElementById("v16-atk").getAttribute("aria-pressed")==="true" && i<=active);
      var el=E("path",{d:donut(Ly.rO,Ly.rI),"fill-rule":"evenodd",
        fill:rgba(col,isAct?0.34:0.13), stroke:col, "stroke-width":isAct?2.6:1.4,
        cursor:"pointer"});
      el.setAttribute("data-i",i);
      el.addEventListener("mouseenter",function(){hover=parseInt(this.getAttribute("data-i"),10);render();});
      el.addEventListener("mouseleave",function(){hover=null;render();});
      el.addEventListener("click",function(){setSel(parseInt(this.getAttribute("data-i"),10));});
      svg.appendChild(el);
      if(crossed){ // dodatkowy pierścień „przełamana”
        svg.appendChild(E("circle",{cx:CX,cy:CY,r:(Ly.rO+Ly.rI)/2,fill:"none",
          stroke:WARN,"stroke-width":2.2,"stroke-dasharray":"5 4",opacity:0.9,"pointer-events":"none"}));
      }
    }
    // etykiety warstw (u góry każdej opaski) — rozróżnienie nie tylko kolorem
    for(var j=0;j<LAYERS.length;j++){
      var Lj=LAYERS[j];
      if(j<LAYERS.length-1){
        var my=CY-(Lj.rO+Lj.rI)/2;
        svg.appendChild(E("text",{x:CX,y:my+4,"text-anchor":"middle","font-size":10.5,
          "font-weight":j===active?700:500, fill: j===active?INK:MUT,"pointer-events":"none"}, Lj.name.toUpperCase()));
      }
    }
    // rdzeń DANE
    svg.appendChild(E("text",{x:CX,y:CY-3,"text-anchor":"middle","font-size":12,"font-weight":700,
      fill:INK,"pointer-events":"none"},"DANE"));
    svg.appendChild(E("text",{x:CX,y:CY+11,"text-anchor":"middle","font-size":8.5,
      fill:MUT,"pointer-events":"none"},"rdzeń"));

    // --- droga atakującego ---
    var atk=document.getElementById("v16-atk").getAttribute("aria-pressed")==="true";
    if(atk){
      var yEnd=CY-(LAYERS[active].rO+LAYERS[active].rI)/2;
      svg.appendChild(E("line",{x1:CX,y1:CY-168,x2:CX,y2:yEnd+9,stroke:WARN,"stroke-width":2,
        "stroke-dasharray":"2 3","pointer-events":"none"}));
      svg.appendChild(E("path",{d:"M "+CX+" "+(yEnd+2)+" l -4 -8 l 8 0 z",fill:WARN,"pointer-events":"none"}));
      // znaczniki przekroczonych granic
      for(var k=0;k<=active;k++){
        svg.appendChild(E("line",{x1:CX-6,y1:CY-LAYERS[k].rO,x2:CX+6,y2:CY-LAYERS[k].rO,
          stroke:WARN,"stroke-width":2,"pointer-events":"none"}));
      }
      svg.appendChild(E("text",{x:CX+10,y:CY-160,"text-anchor":"start","font-size":11,"font-weight":700,
        fill:WARN,"pointer-events":"none"},"×"+(active+1)));
    }

    // --- panel informacyjny (prawa strona) ---
    var PX=352, PW=310;
    svg.appendChild(E("rect",{x:PX,y:18,width:PW,height:304,rx:10,fill:BG,stroke:RULE,"stroke-width":1}));
    var acol=cvar(LAYERS[active].tok);
    svg.appendChild(E("rect",{x:PX+16,y:36,width:6,height:20,rx:2,fill:acol}));
    svg.appendChild(E("text",{x:PX+30,y:52,"font-size":16,"font-weight":700,fill:INK},
      LAYERS[active].name==="Dane"?"Dane (rdzeń)":LAYERS[active].name));
    svg.appendChild(E("line",{x1:PX+16,y1:66,x2:PX+PW-16,y2:66,stroke:RULE,"stroke-width":1}));

    svg.appendChild(E("text",{x:PX+16,y:88,"font-size":10.5,"font-weight":700,fill:WARN,
      "letter-spacing":"0.5"},"ZAGROŻENIE"));
    LAYERS[active].zagr.forEach(function(ln,ix){
      svg.appendChild(E("text",{x:PX+16,y:107+ix*17,"font-size":12.5,fill:INK},ln));
    });

    var okc=cvar("--v-teal");
    svg.appendChild(E("text",{x:PX+16,y:160,"font-size":10.5,"font-weight":700,fill:okc,
      "letter-spacing":"0.5"},"KONTROLA"));
    LAYERS[active].kontr.forEach(function(ln,ix){
      svg.appendChild(E("text",{x:PX+16,y:179+ix*17,"font-size":12.5,fill:INK},ln));
    });

    svg.appendChild(E("line",{x1:PX+16,y1:232,x2:PX+PW-16,y2:232,stroke:RULE,"stroke-width":1}));
    svg.appendChild(E("text",{x:PX+16,y:256,"font-size":11.5,fill:MUT},"Warstw obrony do rdzenia od zewnątrz:"));
    svg.appendChild(E("text",{x:PX+16,y:281,"font-size":13,"font-weight":700,fill:INK},
      "aby dosięgnąć tej warstwy → przełamać "+(active+1)+"/5"));
    svg.appendChild(E("text",{x:PX+16,y:304,"font-size":11,fill:MUT},
      "Obrona w głąb: brak jednego „muru”, wiele warstw."));

    // --- odczyt na żywo w kontrolkach ---
    document.getElementById("v16-name").textContent=LAYERS[active].name;
    document.getElementById("v16-n").textContent=String(active+1);
    for(var b=0;b<5;b++){
      document.getElementById("v16-L"+b).setAttribute("aria-pressed", b===selected?"true":"false");
    }
  }

  function setSel(i){ selected=i; hover=null; render(); }

  for(var b=0;b<5;b++){
    (function(idx){
      var btn=document.getElementById("v16-L"+idx);
      btn.addEventListener("click",function(){setSel(idx);});
      btn.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();setSel(idx);}});
      btn.addEventListener("mouseenter",function(){hover=idx;render();});
      btn.addEventListener("mouseleave",function(){hover=null;render();});
    })(b);
  }
  var atk=document.getElementById("v16-atk");
  function tgl(){atk.setAttribute("aria-pressed",atk.getAttribute("aria-pressed")==="true"?"false":"true");render();}
  atk.addEventListener("click",tgl);
  atk.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();tgl();}});

  document.addEventListener("themechange",render);
  render();
})();
</script>
